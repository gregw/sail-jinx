<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sail-jinx — Races</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- INCLUDE _nav.html -->

<main>
  <h1>Races</h1>
  <div id="races-state" class="banner banner-info">Loading…</div>
  <table id="races-table" style="display:none;">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Date</th>
        <th>Entries</th>
        <th>Entrants</th>
        <th>TCFs</th>
        <th>Start times</th>
        <th>Starters</th>
        <th>Finishers</th>
      </tr>
    </thead>
    <tbody id="races-tbody"></tbody>
  </table>
</main>

<script src="/common.js"></script>
<script>
  // Field mappings derived from sailsys-api-reference.md §7 (GET /races/{id}/status).
  const VIS = (n) => ({0: 'draft', 1: 'published'}[n] ?? ('vis=' + n));
  const PROC = (n) => ({0: 'pending', 1: 'processing', 2: 'processed'}[n] ?? ('proc=' + n));

  function fmtDate(s) {
    if (!s) return '';
    return String(s).slice(0, 10);
  }

  function entrySummary(status) {
    if (!status) return '—';
    const total = status.entriesCount ?? 0;
    const pending = status.pendingEntriesCount ?? 0;
    return pending > 0 ? `${total} (${pending} pending)` : String(total);
  }

  (async () => {
    const state = document.getElementById('races-state');
    const table = document.getElementById('races-table');
    const tbody = document.getElementById('races-tbody');

    // URL param wins (explicit navigation from Series tab or a bookmark).
    // Otherwise fall back to the last seriesId we looked at in this browser,
    // so a bare /races.html click in the nav restores the previous view.
    const params = new URLSearchParams(location.search);
    let seriesId = params.get('seriesId');
    if (seriesId) {
      localStorage.setItem('sail-jinx.lastSeriesId', seriesId);
    } else {
      seriesId = localStorage.getItem('sail-jinx.lastSeriesId');
    }

    if (!seriesId) {
      state.className = 'banner banner-warn';
      state.innerHTML = 'No series selected. Pick a series on the <a href="/series.html">Series tab</a>.';
      return;
    }

    state.textContent = 'Loading races for series ' + seriesId + '…';

    const r = await fetchJson('/api/series/' + encodeURIComponent(seriesId) + '/races');

    if (r.status === 401) {
      state.className = 'banner banner-warn';
      state.innerHTML = 'You are not signed in. <a href="/">Sign in to SailSys</a> first.';
      return;
    }
    if (!r.ok) {
      state.className = 'banner banner-err';
      state.textContent = 'Could not load races: '
        + ((r.body && r.body.error) || ('HTTP ' + r.status));
      return;
    }

    const races = Array.isArray(r.body.races) ? r.body.races : [];
    const statusMap = r.body.status || {};

    if (!races.length) {
      state.className = 'banner banner-info';
      state.textContent = 'No races in series ' + seriesId + '.';
      return;
    }

    // A race is "finalized" once SailSys reports a non-zero resultStatus.
    // (Observed values: 0 = no results entered. We have not yet seen a HAR
    // capture of a post-results state; if the user reports a finalized race
    // not being recognised, capture the status JSON and refine this rule.)
    const isFinalized = (st) => !!(st && st.resultStatus && st.resultStatus > 0);

    let lastFinalized = -1;
    for (let i = 0; i < races.length; i++) {
      if (isFinalized(statusMap[races[i].id])) lastFinalized = i;
    }
    // The "current race" is the one immediately after the last finalized race
    // — or race 0 if nothing has been finalized yet. This is the only race the
    // RO can actively edit (TCFs, came/start/finish times); later races are
    // locked until their predecessors are finalized.
    const currentIndex = lastFinalized + 1; // races.length means "none editable"

    state.className = 'banner banner-ok';
    state.textContent = races.length + ' races in series ' + seriesId
      + (currentIndex < races.length
          ? ' — race ' + races[currentIndex].number + ' is the current race.'
          : ' — all races are finalized.');
    table.style.display = '';

    tbody.innerHTML = '';
    for (let i = 0; i < races.length; i++) {
      const race = races[i];
      const st = statusMap[race.id];
      const tr = document.createElement('tr');
      tr.dataset.raceId = String(race.id);
      tr.innerHTML = `
        <td>${esc(race.number)}</td>
        <td>${esc(race.name)}</td>
        <td>${esc(fmtDate(race.date))}</td>
        <td>${esc(entrySummary(st))}</td>
        <td>${st ? esc(VIS(st.raceEntrantVisibility)) : '—'}</td>
        <td>${st ? esc(PROC(st.handicapAndStartTimeProcessingStatus)) : '—'}</td>
        <td>${st ? esc(VIS(st.handicapAndStartTimeVisibility)) : '—'}</td>
        <td>${st ? esc(st.startersCount ?? 0) : '—'}</td>
        <td>${st ? esc(st.finishersCount ?? 0) : '—'}</td>`;

      if (i > currentIndex) {
        // Future race, gated until its predecessors are finalized.
        tr.className = 'disabled';
        tr.title = 'Locked until earlier races are finalized';
      } else if (i === currentIndex) {
        // Current race — full edit (TCFs + live timing + results).
        tr.className = 'clickable current-race';
        tr.title = 'Current race — edit TCFs, capture times, manage results';
        tr.onclick = () => {
          location.href = '/race.html?raceId=' + encodeURIComponent(race.id)
            + '&editable=1&current=1';
        };
      } else {
        // Past race — results editable (times, flags, visibility) but no
        // TCFs and no NOW/live timing affordances.
        tr.className = 'clickable';
        tr.title = 'Past race — edit results';
        tr.onclick = () => {
          location.href = '/race.html?raceId=' + encodeURIComponent(race.id) + '&editable=1';
        };
      }
      tbody.appendChild(tr);
    }
  })();
</script>
</body>
</html>
