<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sail-jinx — Races</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- INCLUDE _nav.html -->

<main>
  <h1>Races</h1>
  <div id="filter-chip" style="display:none; margin: 0 0 0.5rem;"></div>
  <div id="races-state" class="banner banner-info">Loading…</div>
  <table id="races-table" style="display:none;">
    <thead>
      <tr id="races-head"></tr>
    </thead>
    <tbody id="races-tbody"></tbody>
  </table>
</main>

<script src="/common.js"></script>
<script>
  // Field mappings derived from sailsys-api-reference.md §7 (GET /races/{id}/status).
  const VIS = (n) => ({0: 'draft', 1: 'published'}[n] ?? ('vis=' + n));
  const PROC = (n) => ({0: 'pending', 1: 'processing', 2: 'processed'}[n] ?? ('proc=' + n));

  function fmtDate(s) {
    if (!s) return '';
    return String(s).slice(0, 10);
  }

  function entrySummary(status) {
    if (!status) return '—';
    const total = status.entriesCount ?? 0;
    const pending = status.pendingEntriesCount ?? 0;
    return pending > 0 ? `${total} (${pending} pending)` : String(total);
  }

  // A race is "finalized" once SailSys reports a non-zero resultStatus
  // (resultStatus 2,3,4 = processed; published as Hidden/Provisional/Final).
  const isFinalized = (st) => !!(st && st.resultStatus && st.resultStatus > 0);

  // For a list of races (one series), find the index of the "current" race
  // — the first race after the most recent finalized one. Returns races.length
  // if every race is finalized.
  function currentIndexFor(racesGroup, statusMap) {
    let lastFinalized = -1;
    for (let i = 0; i < racesGroup.length; i++) {
      if (isFinalized(statusMap[racesGroup[i].id])) lastFinalized = i;
    }
    return lastFinalized + 1;
  }

  function renderFilterChip(seriesName, seriesId) {
    const chip = document.getElementById('filter-chip');
    if (!seriesId) {
      chip.style.display = 'none';
      chip.innerHTML = '';
      return;
    }
    chip.style.display = '';
    chip.innerHTML = '<span class="filter-chip">'
      + 'Filter: <strong>' + esc(seriesName || ('series ' + seriesId)) + '</strong>'
      + ' <a href="/races.html?all=1" title="Clear filter" class="filter-clear">×</a>'
      + '</span>';
  }

  (async () => {
    const state = document.getElementById('races-state');
    const table = document.getElementById('races-table');
    const tbody = document.getElementById('races-tbody');
    const head = document.getElementById('races-head');

    // Mode selection — see previous version for the full reasoning.
    const params = new URLSearchParams(location.search);
    const wantsAll = params.get('all') === '1';
    let seriesId = params.get('seriesId');
    if (seriesId) {
      localStorage.setItem('sail-jinx.lastSeriesId', seriesId);
    } else if (!wantsAll) {
      seriesId = localStorage.getItem('sail-jinx.lastSeriesId');
    } else {
      localStorage.removeItem('sail-jinx.lastSeriesId');
    }

    await awaitAuth();
    if (!isAdmin() && seriesId) {
      seriesId = null;
      localStorage.removeItem('sail-jinx.lastSeriesId');
    }

    const url = seriesId
      ? ('/api/series/' + encodeURIComponent(seriesId) + '/races')
      : '/api/races/current';

    // Step 1: fetch the bare race list. The server no longer bundles per-race
    // status with this response — it returns in a single round trip so we
    // can render the table skeleton instantly.
    state.textContent = seriesId
      ? ('Loading races for series ' + seriesId + '…')
      : 'Loading current races…';
    const r = await fetchJson(url);
    if (r.status === 401) {
      state.className = 'banner banner-warn';
      state.innerHTML = 'You are not signed in. <a href="/">Sign in to SailSys</a> first.';
      return;
    }
    if (!r.ok) {
      state.className = 'banner banner-err';
      state.textContent = 'Could not load races: '
        + ((r.body && r.body.error) || ('HTTP ' + r.status));
      return;
    }

    const races = Array.isArray(r.body.races) ? r.body.races : [];
    // For series-filtered fetches the response carries a top-level
    // seriesName resolved server-side (SailSys's per-series race summary
    // doesn't include it on each race). Fall back to the first race's
    // seriesName for /races/current (where each race carries its own).
    const filteredSeriesName = (seriesId && r.body.seriesName)
      || (seriesId && races[0] && races[0].seriesName)
      || null;
    renderFilterChip(filteredSeriesName, seriesId);

    if (!races.length) {
      state.className = 'banner banner-info';
      state.textContent = seriesId
        ? ('No races in series ' + seriesId + '.')
        : 'No current races found for this club.';
      return;
    }

    // Columns. `needsStatus` marks cells that depend on the per-race status
    // (start as "…" placeholders until the per-race status fetch lands).
    // `sortable` columns get a sort-toggle header; `sortValue` returns the
    // value the row should be ranked by (the display string isn't always
    // sort-friendly — e.g. Date displays "YYYY-MM-DD" but we want the full
    // ISO timestamp ordering, including times for tie-break).
    const cols = [
      { key: 'date',   label: 'Date',   sortable: true,
        sortValue: r => String(r.dateTime || r.date || ''),
        get: r => esc(fmtDate(r.date || r.dateTime)) },
      { key: 'name',   label: 'Name',   sortable: true,
        sortValue: r => String(r.name || '').toLowerCase(),
        get: r => esc(r.name) },
      { key: 'series', label: 'Series', sortable: true,
        // In /races/current the per-race seriesName is populated by SailSys.
        // In /series/{id}/races (filtered view) it isn't, so we fall back
        // to the server-resolved filteredSeriesName captured above, then
        // finally to "id N" if both are missing.
        sortValue: r => String(r.seriesName || filteredSeriesName || ('id ' + r.seriesId) || '').toLowerCase(),
        get: r => esc(r.seriesName || filteredSeriesName || ('id ' + r.seriesId)) }
    ];
    if (seriesId) {
      // Within a single-series view the # column is useful for round
      // ordering even when the chosen sort isn't by Date. Sortable so the
      // user can flip back to numeric order with one click.
      cols.push({ key: 'number', label: '#', sortable: true,
        sortValue: r => Number(r.number) || 0,
        get: r => esc(r.number) });
    }
    cols.push(
      { key: 'entries',   label: 'Entries',  needsStatus: true,
        get: (r, st) => esc(entrySummary(st)) },
      { key: 'entrants',  label: 'Entrants', needsStatus: true,
        get: (r, st) => esc(VIS(st.raceEntrantVisibility)) },
      { key: 'tcfs',      label: 'TCFs',     needsStatus: true,
        get: (r, st) => esc(PROC(st.handicapAndStartTimeProcessingStatus)) },
      { key: 'starts',    label: 'Start times', needsStatus: true,
        get: (r, st) => esc(VIS(st.handicapAndStartTimeVisibility)) },
      { key: 'starters',  label: 'Starters', needsStatus: true,
        get: (r, st) => esc(st.startersCount ?? 0) },
      { key: 'finishers', label: 'Finishers', needsStatus: true,
        get: (r, st) => esc(st.finishersCount ?? 0) }
    );

    // Sort state. Default: Date ascending — the most natural order for a
    // race list. Clicking a sortable header sets the sort key (or flips
    // direction if it's already the active key).
    let sortKey = 'date';
    let sortDir = 1;

    function compareSortValues(a, b) {
      if (typeof a === 'number' && typeof b === 'number') return a - b;
      return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' });
    }

    function sortedRaces() {
      const col = cols.find(c => c.key === sortKey);
      if (!col || !col.sortValue) return races.slice();
      return races.slice().sort((a, b) => sortDir * compareSortValues(col.sortValue(a), col.sortValue(b)));
    }

    function renderHead() {
      head.innerHTML = cols.map(c => {
        if (c.sortable) {
          const marker = (sortKey === c.key)
            ? '<span class="sort-marker">' + (sortDir > 0 ? '▲' : '▼') + '</span>'
            : '';
          return '<th class="sortable" data-key="' + c.key + '">' + esc(c.label) + marker + '</th>';
        }
        return '<th>' + esc(c.label) + '</th>';
      }).join('');
      head.querySelectorAll('th.sortable').forEach(th => {
        th.onclick = () => {
          const k = th.dataset.key;
          if (sortKey === k) sortDir = -sortDir;
          else { sortKey = k; sortDir = 1; }
          renderHead();
          renderBody();
        };
      });
    }

    state.className = 'banner banner-info';
    const totalRaces = races.length;
    let pending = totalRaces;
    state.textContent = totalRaces + ' race' + (totalRaces === 1 ? '' : 's')
      + (seriesId ? ' in series ' + seriesId : ' across all current series')
      + ' — loading status for ' + pending + '…';
    table.style.display = '';

    // statusMap holds the latest fetched status per race (or null on fetch
    // failure). A key missing from the map means the fetch is still in
    // flight — used to decide whether a needsStatus cell should be "…"
    // (loading) or "—" (failed) or the real value.
    const statusMap = {};
    const racesById = new Map();
    for (const race of races) racesById.set(String(race.id), race);

    // classification is filled in after all statuses resolve. Until then,
    // every row is plain "clickable". Once known, locked-future rows lose
    // their click and current rows get the highlight.
    let classification = null;

    // Single source of truth for tbody rendering. Called on initial paint,
    // on every sort change, and once at the end after classification is
    // determined (to apply the locked/current classes). Each call reads
    // from statusMap so partially-loaded rows continue to show "…"
    // placeholders for the cells that haven't arrived yet.
    //
    // Side-effect: stash the current visible-order race-id list in
    // sessionStorage so race.html can render Previous/Next buttons that
    // walk it. We update on every render so the order tracks the user's
    // most recent sort choice; clicking through to a race always uses
    // the order they were looking at when they clicked.
    function renderBody() {
      const orderedIds = sortedRaces().map(r => String(r.id));
      try {
        sessionStorage.setItem('sail-jinx.raceList', JSON.stringify(orderedIds));
      } catch (_) { /* private mode / quota — best effort */ }
      tbody.innerHTML = '';
      for (const race of sortedRaces()) {
        const idStr = String(race.id);
        const hasStatus = idStr in statusMap;
        const st = statusMap[idStr];
        const tr = document.createElement('tr');
        tr.dataset.raceId = idStr;
        tr.innerHTML = cols.map(c => {
          if (c.needsStatus) {
            if (!hasStatus) return '<td class="status-cell status-loading">…</td>';
            if (st == null) return '<td>—</td>';
            return '<td>' + c.get(race, st) + '</td>';
          }
          return '<td>' + c.get(race) + '</td>';
        }).join('');
        if (classification && classification.lockedIds.has(idStr)) {
          tr.className = 'disabled';
          tr.title = 'Locked until earlier races are finalized';
          tr.onclick = null;
        } else if (classification && classification.currentIds.has(idStr)) {
          tr.className = 'clickable current-race';
          tr.title = 'Current race — live timing';
          tr.onclick = () => {
            location.href = '/race.html?raceId=' + encodeURIComponent(race.id);
          };
        } else {
          tr.className = 'clickable';
          tr.title = 'Open race';
          tr.onclick = () => {
            location.href = '/race.html?raceId=' + encodeURIComponent(race.id);
          };
        }
        tbody.appendChild(tr);
      }
    }

    renderHead();
    renderBody();

    // Incremental cell update for a single race's row — used as each
    // status fetch lands so we don't redraw the whole table on every
    // arrival. Falls back to a no-op when the row isn't in the DOM yet
    // (which can't happen given the initial renderBody but is cheap to
    // guard).
    function updateRowStatus(idStr) {
      const tr = tbody.querySelector('tr[data-race-id="' + idStr + '"]');
      if (!tr) return;
      const race = racesById.get(idStr);
      const st = statusMap[idStr];
      const cells = tr.querySelectorAll('td');
      cols.forEach((c, i) => {
        if (!c.needsStatus) return;
        const td = cells[i];
        td.classList.remove('status-loading');
        td.textContent = '';
        if (st) td.innerHTML = c.get(race, st);
        else td.textContent = '—';
      });
    }

    // Step 2: fan out per-race status fetches in parallel. Each row's
    // status cells are filled as soon as that race's response arrives.
    const promises = races.map(race => {
      const idStr = String(race.id);
      return fetchJson('/api/races/' + encodeURIComponent(race.id) + '/status')
        .then(rs => {
          statusMap[idStr] = (rs.ok && rs.body && rs.body.status) ? rs.body.status : null;
          updateRowStatus(idStr);
        })
        .catch(_ => { statusMap[idStr] = null; updateRowStatus(idStr); })
        .finally(() => {
          pending--;
          if (pending > 0) {
            state.textContent = totalRaces + ' race' + (totalRaces === 1 ? '' : 's')
              + (seriesId ? ' in series ' + seriesId : ' across all current series')
              + ' — loading status for ' + pending + '…';
          }
        });
    });

    // Step 3: once every status has resolved, re-classify rows into past /
    // current / locked-future per the per-series finalized prefix, then
    // re-render the body so the new classes / click handlers apply.
    await Promise.all(promises);

    const currentIds = new Set();
    const lockedIds = new Set();
    if (seriesId) {
      const curIdx = currentIndexFor(races, statusMap);
      if (curIdx < races.length) currentIds.add(String(races[curIdx].id));
      for (let i = curIdx + 1; i < races.length; i++) lockedIds.add(String(races[i].id));
    } else {
      const bySeries = new Map();
      for (const race of races) {
        const k = String(race.seriesId);
        if (!bySeries.has(k)) bySeries.set(k, []);
        bySeries.get(k).push(race);
      }
      for (const grp of bySeries.values()) {
        grp.sort((a, b) => String(a.dateTime || a.date || '').localeCompare(String(b.dateTime || b.date || '')));
        const curIdx = currentIndexFor(grp, statusMap);
        if (curIdx < grp.length) currentIds.add(String(grp[curIdx].id));
        for (let i = curIdx + 1; i < grp.length; i++) lockedIds.add(String(grp[i].id));
      }
    }
    classification = { currentIds, lockedIds };
    renderBody();

    state.className = 'banner banner-ok';
    state.textContent = totalRaces + ' race' + (totalRaces === 1 ? '' : 's')
      + (seriesId ? ' in series ' + seriesId : ' across all current series')
      + (currentIds.size ? ' — ' + currentIds.size + ' marked as current.' : '');
  })();
</script>
</body>
</html>
