<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sail-jinx — Sign in</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- INCLUDE _nav.html -->

<main>
  <h1>SailSys sign in</h1>
  <p>Credentials are read from <code>data/config/config.yaml</code> on the server. This button
     just triggers a fresh login using those credentials and captures the session token.</p>

  <button id="login-btn" onclick="doLogin()">Sign in</button>
  <div id="result" class="banner banner-info" style="margin-top:1rem; display:none;"></div>
</main>

<script src="/common.js"></script>
<script>
  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const out = document.getElementById('result');
    btn.disabled = true;
    out.style.display = 'block';
    out.className = 'banner banner-info';
    out.textContent = 'Signing in…';
    const r = await postJson('/api/auth/login', {});
    if (r.ok) {
      out.className = 'banner banner-ok';
      out.textContent = 'Signed in as ' + r.body.email;
    } else {
      out.className = 'banner banner-err';
      out.textContent = 'Sign in failed: ' + (r.body?.error || ('HTTP ' + r.status));
    }
    btn.disabled = false;
    refreshAuthWidget();
  }
</script>
</body>
</html>
