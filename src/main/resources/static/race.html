        + esc(div.divisionName || ('Division ' + div.divisionId))
        + '</u> (' + div.entrants.length + ' boats)</div>');
      parts.push('<table style="border-collapse:collapse;margin:0.25rem 0;">'
        + '<thead><tr>'
        + '<th style="text-align:left;padding:2px 8px;">Sail#</th>'
        + '<th style="text-align:left;padding:2px 8px;">Name</th>'
        + '<th style="text-align:right;padding:2px 8px;">TCF</th>'
        + '<th style="text-align:left;padding:2px 8px;">Start</th>'
        + '<th style="text-align:right;padding:2px 8px;">Offset (s)</th>'
        + '<th style="text-align:right;padding:2px 8px;">Offset (M:SS)</th>'
        + '</tr></thead><tbody>');
      for (const e of div.entrants) {
        const sched = String(e.startTimeLocal || '');
        // Accept HH:MM with optional seconds — SailSys returns minute-only
        // startTimeLocal in some responses, and we'd rather display "16:06"
        // than the raw ISO string.
        const m = sched.match(/(?:^|[T\s])(\d{1,2}:\d{2}(?::\d{1,2})?)/);
        const hms = m ? m[1] : sched;
        const offS = (typeof e.startOffsetSeconds === 'number' && e.startOffsetSeconds >= 0)
          ? e.startOffsetSeconds : null;
        const offMs = offS == null
          ? ''
          : Math.floor(offS / 60) + ':' + String(offS % 60).padStart(2, '0');
        parts.push('<tr>'
          + '<td style="padding:2px 8px;">' + esc(e.sailNumber) + '</td>'
          + '<td style="padding:2px 8px;">' + esc(e.name) + '</td>'
          + '<td style="padding:2px 8px;text-align:right;font-family:monospace;">'
            + (typeof e.tcf === 'number' ? e.tcf.toFixed(4) : esc(e.tcf)) + '</td>'
          + '<td style="padding:2px 8px;font-family:monospace;">' + esc(hms) + '</td>'
          + '<td style="padding:2px 8px;text-align:right;font-family:monospace;">'
            + (offS == null ? '' : offS) + '</td>'
          + '<td style="padding:2px 8px;text-align:right;font-family:monospace;">'
            + esc(offMs) + '</td>'
          + '</tr>');
      }
      parts.push('</tbody></table>');
    }
    ctrlMsgHtml('banner-warn', parts.join(''));
  }

  async function doSaveCalibration(payload) {
    setControlsDisabled(true);
    const r = await postJson('/api/calibration', payload);
    setControlsDisabled(false);
    if (!r.ok) {
      ctrlMsg('banner-err',
        'Save calibration failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      return;
    }
    currentCalibration = (r.body && r.body.calibration) ? r.body.calibration : payload;
    renderControls();
    // Close the panel — a brief confirmation, then the banner is cleared
    // so Process Handicaps can take over the message area.
    ctrlMsg('banner-ok',
      'Calibration saved (V₀ = ' + currentCalibration.v0Knots.toFixed(3)
      + ' kn). Process Handicaps is now available.');
  }

  // Process start times (pursuit only). Builds the per-division payload from
  // the status-grid panel — the edited earliest start + course length where
  // the RO changed them, falling back to SailSys's current divisionTiming
  // value otherwise. POSTing this to /process both persists the values (so
  // the button is a save-if-dirty + process in one call, per the agreed
  // model) and waits for SailSys to re-stagger the per-boat start sheet.
  async function doProcess() {
    if (!currentStatus || !Array.isArray(currentStatus.divisionTiming)) {
      ctrlMsg('banner-warn', 'No divisions to process.');
      return;
    }
    // Persist any other dirty edits first (TCF / times / flags). The division
    // start + course values are sent below via /process itself.
    if (!(await ensureSaved())) return;
    const divisions = {};
    let missingCourse = false;
    for (const d of currentStatus.divisionTiming) {
      if (!d || d.divisionId == null) continue;
      const divId = String(d.divisionId);
      const start = divisionStartsMap.get(divId) || divisionScheduledStart(d.divisionId);
      const course = divisionCourseMap.has(divId)
        ? divisionCourseMap.get(divId)
        : divisionScheduledCourse(d.divisionId);
      if (course == null || !(course > 0)) missingCourse = true;
      divisions[divId] = {
        startTimeLocal: start || null,
        courseLength: (course != null && course > 0) ? course : null
      };
    }
    if (missingCourse) {
      ctrlMsg('banner-warn', 'Enter a course length for every division first.');
      return;
    }
    setControlsDisabled(true);
    ctrlMsg('banner-info', 'Saving start times + course lengths and waiting for SailSys to stagger…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process',
      { divisions });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    // Values are now committed to SailSys — clear the local edit maps so the
    // re-render against the fresh status de-dirties cleanly.
    divisionStartsMap.clear();
    divisionCourseMap.clear();
    sessionSaveForm();
    if (r.body && r.body.error) {
      // Timed out waiting for SailSys; still re-render with whatever status we got.
      renderStatus(r.body.status, raceIdGlobal);
      ctrlMsg('banner-warn', r.body.error);
    } else {
      renderStatus(r.body.status, raceIdGlobal);
      ctrlMsg('banner-ok', 'Processed. Per-boat start times re-staggered.');
    }
    // Refetch entrants — their startTimeLocal will have changed after processing.
    await loadEntrants();
  }

  function setControlsDisabled(disabled) {
    ['ctrl-process', 'ctrl-process-results', 'ctrl-calibrate', 'ctrl-handicaps',
     'ctrl-save-handicaps', 'results-status-sel'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = disabled;
    });
    document.querySelectorAll('#pub-entrants, #pub-start-times')
      .forEach(cb => { cb.disabled = disabled; });
  }

  async function loadEntrants() {
    const r = await fetchJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/entrants');
    if (!r.ok) return r;
    entrantData = (r.body && Array.isArray(r.body.entrants)) ? r.body.entrants : [];
    document.getElementById('entrants-count').textContent = '(' + entrantData.length + ')';
    document.getElementById('race-entrants').style.display = '';
    renderEntrantsHead();
    renderEntrants();
    // Controls include a duty-boat selector populated from entrantData; re-render
    // controls so the selector is up-to-date.
    renderControls();
    return r;
  }

  async function doReset() {
    // When a divergent TCF snapshot is pending (next-race handicaps or a saved
    // manual edit), RESET reverts to SailSys's current TCFs by discarding the
    // local snapshot — the job the old mismatch-banner RESET button did.
    const snap = snapshotPendingPush();
    const msg = snap
      ? 'Discard the updated TCFs and revert to the values currently in SailSys?'
      : 'Discard all unsaved edits and refetch this race from SailSys?';
    if (!confirm(msg)) return;
    // Drop the in-tab autosave so the reload doesn't immediately restore the
    // edits we're throwing away. NOW-log entries live under a separate key
    // and are preserved — they're a record of clicks the RO may still want.
    try { sessionStorage.removeItem(SESSION_KEY('form')); } catch (_) {}
    if (snap) {
      const r = await fetchJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/tcf-snapshot',
        { method: 'DELETE' });
      if (!r.ok) {
        ctrlMsg('banner-err', 'Reset failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        return;
      }
    }
    location.reload();
  }

  async function doSave() {
    const btn = document.getElementById('save-btn');
    const summary = document.getElementById('save-summary');
    btn.disabled = true;

    // Snapshot-apply short-circuit: when the only pending change is a divergent
    // local TCF snapshot (the next-race TCFs queued by the previous race's Save
    // Handicaps, or a manual edit saved locally) and there are no fresh local
    // edits, SAVE *applies* those TCFs to SailSys for this race — the job the
    // old TCF-mismatch banner's Push button did. RESET (doReset) discards the
    // snapshot.
    if (snapshotPendingPush() && dirtyTcf.size === 0 && !isTimesDirty() && dirtyFlags.size === 0) {
      const r = await applyPendingSnapshot();
      btn.disabled = false;
      return r;
    }

    const messages = [];
    let anyError = false;

    // --- TCFs first (writes to SailSys) ---
    // Skip the whole block when the series doesn't use our handicap —
    // there is no input that could populate dirtyTcf in that case, but be
    // defensive in case sessionStorage from a different mode leaked in.
    if (dirtyTcf.size > 0 && isOurHandicap) {
      if (!seriesIdForSave) {
        ctrlMsg('banner-err', 'Internal: seriesId not yet known. Reload and try again.');
        btn.disabled = false;
        return { ok: false };
      }
      function spinnakerTypeFor(boatId) {
        const e = entrantData.find(x => x.boat && x.boat.id === boatId);
        if (!e) return 1;
        const h = e.handicap && e.handicap.currentHandicaps && e.handicap.currentHandicaps[0];
        if (h && h.spinnakerType != null) return h.spinnakerType;
        if (e.division && e.division.spinnakerType != null) return e.division.spinnakerType;
        return 1;
      }
      const updates = [];
      for (const [boatId, value] of dirtyTcf) {
        updates.push({ boatId, value, spinnakerType: spinnakerTypeFor(boatId) });
      }
      summary.textContent = 'Saving ' + updates.length + ' TCF update'
        + (updates.length === 1 ? '' : 's') + '...';
      // Writes a local snapshot (source=MANUAL_EDIT). The push to SailSys
      // is NOT automatic — the SAVE/RESET banner that surfaces after this
      // call (snapshot now diverges from SailSys's entrants payload) is the
      // confirmation step before publishing. seriesId rides along so the
      // server can persist context alongside the snapshot.
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/save-tcfs',
        { updates, seriesId: seriesIdForSave });
      if (!r.ok) {
        messages.push('TCF save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        const saved = (r.body && r.body.saved) || updates.length;
        messages.push('Saved ' + saved + ' TCF update'
          + (saved === 1 ? '' : 's') + ' locally — press SAVE on the '
          + 'banner below the entrants table to publish to SailSys.');
        dirtyTcf.clear();
        // Persist the cleared dirtyTcf so a later navigation back to this
        // race doesn't rehydrate the now-saved values as fresh edits — the
        // values would just match SailSys, masking any newer snapshot
        // (e.g. one written by Process Handicaps on the previous race).
        sessionSaveForm();
      }
    }

    // --- Race times (writes to local JSON) ---
    if (isTimesDirty()) {
      const payload = currentTimesPayload();
      summary.textContent = 'Saving race times...';
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/times', payload);
      if (!r.ok) {
        messages.push('Times save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        messages.push('Saved race times.');
        originalTimesJson = JSON.stringify(payload.times);
        originalOrderJson = JSON.stringify(payload.boatOrder);
        originalDutyBoatId = payload.dutyBoatId;
      }
    }

    // --- Division starts + course lengths (writes to SailSys, both types) ---
    // Push any edited per-division start time (allocated gun for a scratch
    // start, earliest start for a pursuit race) and, for pursuit, course
    // length, directly to SailSys's divisionTiming via
    // /api/races/{id}/division-starts. This is the persist-only path — it does
    // NOT wait for the pursuit staggering pass (that's the Process start times
    // button / doProcess). After a successful push the values become the new
    // "scheduled" for the next load, so we clear the local edit maps and
    // re-render with the fresh status the handler echoed back.
    if (isDivisionStartsDirty()) {
      const divisions = {};
      for (const [divIdStr, val] of divisionStartsMap) {
        if (!val) continue;
        const sched = divisionScheduledStart(Number(divIdStr));
        const canon = reformatHHMM(val) || val;
        if (!timeStringsEqual(canon, sched)) {
          (divisions[divIdStr] = divisions[divIdStr] || {}).startTimeLocal = canon;
        }
      }
      if (isPursuit) {
        for (const [divIdStr, val] of divisionCourseMap) {
          const sched = divisionScheduledCourse(Number(divIdStr));
          if (val !== sched) {
            (divisions[divIdStr] = divisions[divIdStr] || {}).courseLength = val;
          }
        }
      }
      if (Object.keys(divisions).length > 0) {
        summary.textContent = 'Saving division starts to SailSys...';
        const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/division-starts',
          { divisions });
        if (!r.ok) {
          messages.push('Division starts save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
          anyError = true;
        } else {
          const n = Object.keys(divisions).length;
          messages.push('Saved ' + n + ' division start' + (n === 1 ? '' : 's') + ' to SailSys.');
          divisionStartsMap.clear();
          divisionCourseMap.clear();
          if (r.body && r.body.status) {
            renderStatus(r.body.status, raceIdGlobal);
          }
        }
      }
    }

    // --- Push results to SailSys (came → startedRace, finish → finishTime,
    //     flags → penalties). The start times stay local-only — SailSys
    //     handles starts via the timing/processing pipeline, not as a
    //     captured actualStart. Always push if there's anything to send.
    {
      const boats = {};
      for (const e of entrantData) {
        const id = e.boat && e.boat.id;
        if (id == null) continue;
        const t = getTimes(id);
        boats[String(id)] = {
          came: !!t.came,
          finish: t.finish || null,
          // AVG is intentionally included so the server can choose to drop
          // it (no SailSys penalty); other flags map 1:1 to penalty defs.
          flags: flagsForEntrant(e)
        };
      }
      summary.textContent = 'Pushing results to SailSys...';
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/push-results',
        { boats });
      if (!r.ok) {
        messages.push('Results push failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        messages.push('Pushed results to SailSys.');
        // SailSys-computed results are now stale (requiresResultCalculation
        // will be true). Clear the cache so the columns fall back to local
        // values, and re-render status so the Process Results button appears.
        sailsysResults = {};
        if (r.body && r.body.status) {
          renderStatus(r.body.status, raceIdGlobal);
        }
      }
    }

    btn.disabled = false;

    ctrlMsg(anyError ? 'banner-warn' : 'banner-ok', messages.join(' '));

    // Refresh TCFs from server only if any TCFs were saved (cheap re-fetch).
    // Also re-fetch the local TCF snapshot so the SAVE/RESET mismatch banner
    // can surface — /save-tcfs writes the snapshot locally but does NOT push
    // to SailSys, so on success the snapshot diverges from the entrants
    // payload and the banner should appear.
    if (dirtyTcf.size === 0 && messages.some(m => m.startsWith('Saved') && m.includes('TCF'))) {
      await loadEntrants();
      await refreshTcfSnapshot();
      renderTcfMismatchBanner();
    }
    updateSaveBar();
    return { ok: !anyError };
  }

  // Implicit save used by the workflow buttons: persist any dirty edits before
  // running the action, so the RO doesn't have to remember to SAVE first. A
  // no-op (returns success) when there is nothing to save, so a workflow button
  // never triggers a spurious SailSys push.
  //
  // Unlike the explicit Save button (which keeps the deliberate two-step for
  // manual TCF edits — save locally, then SAVE again to publish), the implicit
  // save flushes ALL the way to SailSys: it pushes any divergent snapshot too,
  // since clicking a workflow button is itself the RO's commitment. That clears
  // the SAVE bar and lets the action run against the applied TCFs.
  async function ensureSaved() {
    if (!isAnyDirty() && !snapshotPendingPush()) return true;
    setSaveBusy(true);
    try {
      if (isAnyDirty()) {
        const r = await doSave();
        if (!(r && r.ok)) return false;
      }
      if (snapshotPendingPush()) {
        const r = await applyPendingSnapshot();
        if (!(r && r.ok)) return false;
      }
      return true;
    } finally {
      setSaveBusy(false);
    }
  }

  // Visually mark the bottom SAVE bar as busy while a save (explicit or the
  // implicit save behind a workflow button) is in flight, so the RO can see the
  // action is underway and doesn't click again. Forces the bar visible.
  function setSaveBusy(busy) {
    const bar = document.getElementById('save-bar');
    const btn = document.getElementById('save-btn');
    const reset = document.getElementById('reset-btn');
    if (busy && bar) bar.style.display = '';
    if (btn) {
      btn.disabled = busy;
      btn.textContent = busy ? 'Saving…' : 'Save';
    }
    if (reset) reset.disabled = busy;
  }

  // Applies the divergent local TCF snapshot to SailSys — the next-race TCFs
  // queued by the previous race's Save Handicaps, or a manual TCF edit saved
  // locally — the job the old TCF-mismatch banner's Push button did. Refreshes
  // in place (no reload) so an implicit save can carry on with the applied
  // TCFs. On success the snapshot matches SailSys, so the SAVE bar clears.
  async function applyPendingSnapshot() {
    setSaveBusy(true);
    ctrlMsg('banner-info', 'Applying updated TCFs to SailSys…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/push-handicaps', {});
    if (!r.ok) {
      ctrlMsg('banner-err', 'Apply failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setSaveBusy(false);
      return { ok: false };
    }
    // SailSys now holds the new TCFs. Refetch entrants so sailsysTcf reflects
    // them, re-read the snapshot (now matching, or gone), and repaint so the
    // divergence highlight and SAVE bar clear.
    await loadEntrants();
    recomputeSailsysTcf();
    await refreshTcfSnapshot();
    renderEntrants();
    setSaveBusy(false);
    ctrlMsg('banner-ok', 'Updated TCFs applied to SailSys.');
    updateSaveBar();
    return { ok: true };
  }

  // Rebuilds sailsysTcf from the current entrantData — SailSys's TCF per boat,
  // read from the configured handicap row (not currentHandicaps[0], since boats
  // with multiple handicaps may not list ours first). Called on load and after
  // any in-place entrants refetch so the snapshot-divergence diff stays honest.
  function recomputeSailsysTcf() {
    sailsysTcf = new Map();
    for (const e of entrantData) {
      const id = e.boat && e.boat.id;
      if (id == null) continue;
      const list = (e.handicap && Array.isArray(e.handicap.currentHandicaps))
        ? e.handicap.currentHandicaps : [];
      let v = null;
      for (const h of list) {
        const defId = h && h.definition && h.definition.id;
        if (configHandicapId == null || defId === configHandicapId) {
          v = Number(h.value);
          break;
        }
      }
      if (v == null && list.length > 0) v = Number(list[0].value);
      if (v != null && !isNaN(v)) sailsysTcf.set(String(id), v);
    }
  }

  // Re-fetches the local TCF snapshot and updates snapshotTcf + snapshotMeta
  // in place. Used after a /save-tcfs write so the banner can show without a
  // full page reload.
  async function refreshTcfSnapshot() {
    const r = await fetchJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/tcf-snapshot');
    snapshotTcf = new Map();
    snapshotMeta = null;
    if (r && r.ok && r.body && r.body.snapshot) {
      const snap = r.body.snapshot;
      snapshotMeta = {
        savedAt: snap.savedAt || null,
        source: snap.source || null,
        sourceRaceId: snap.sourceRaceId || null,
        sourceRaceNumber: (snap.sourceRaceNumber != null) ? snap.sourceRaceNumber : null
      };
      if (Array.isArray(snap.tcfs)) {
        for (const t of snap.tcfs) {
          if (t && t.boatId != null && t.value != null)
            snapshotTcf.set(String(t.boatId), Number(t.value));
        }
      }
    }
  }

  function snapshotTimes(saved) {
    timesMap = new Map();
    if (saved && saved.times) {
      for (const [id, t] of Object.entries(saved.times)) {
        // Normalise legacy "HH:MM:SS.sss" → "HH:MM:SS" on load so the dirty
        // baseline matches what we'll re-serialize.
        timesMap.set(String(id), {
          came: !!t.came,
          actualStart: t.actualStart ? (reformatTime(t.actualStart) || t.actualStart) : null,
          finish: t.finish ? (reformatTime(t.finish) || t.finish) : null
        });
      }
    }
    boatOrder = (saved && Array.isArray(saved.boatOrder)) ? saved.boatOrder.map(String) : [];
    dutyBoatId = (saved && saved.dutyBoatId) ? String(saved.dutyBoatId) : null;
    // divisionStartsMap is in-memory only — populated either by user edits
    // (this session) or by sessionRestoreForm from sessionStorage. Server
    // JSON no longer carries it; SailSys's divisionTiming is the source.
    divisionStartsMap = new Map();
    // Seed empty entries for any entrants we haven't seen yet so getTimes works.
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      if (!timesMap.has(id)) timesMap.set(id, emptyTimes());
    }
    // Snapshot for dirty detection — use the same shape currentTimesPayload produces.
    const payload = currentTimesPayload();
    originalTimesJson = JSON.stringify(payload.times);
    originalOrderJson = JSON.stringify(payload.boatOrder);
    originalDutyBoatId = payload.dutyBoatId;
  }

  // NOW log section is current-race-only — live timing isn't relevant when
  // editing a finalized race's results. Hidden by default; revealed below
  // (after status loads and we know isCurrentRace) by updateNowLogSection.
  document.getElementById('now-log').style.display = 'none';

  function updateNowLogSection() {
    const section = document.getElementById('now-log');
    if (isCurrentRace) {
      section.style.display = '';
      renderNowLog();
    } else {
      section.style.display = 'none';
    }
  }

  // Previous / Next race navigation. Reads the visible-order race list
  // that races.html stashes in sessionStorage on every render. Buttons
  // are greyed out when at an edge or when no list is available (e.g. a
  // direct/deep link, or sessionStorage cleared). The list itself is the
  // last sorted order the user saw on the Races page.
  function setupRaceNav(raceId) {
    const prevBtn = document.getElementById('race-prev-btn');
    const nextBtn = document.getElementById('race-next-btn');
    if (!prevBtn || !nextBtn) return;
    let list = null;
    try {
      const raw = sessionStorage.getItem('sail-jinx.raceList');
      if (raw) list = JSON.parse(raw);
    } catch (_) { /* private mode — silent */ }
    if (!Array.isArray(list) || list.length === 0) {
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      prevBtn.title = 'No race list — open this page via the Races tab to enable navigation';
      nextBtn.title = prevBtn.title;
      return;
    }
    const idx = list.indexOf(String(raceId));
    const prevId = idx > 0 ? list[idx - 1] : null;
    const nextId = (idx >= 0 && idx < list.length - 1) ? list[idx + 1] : null;
    prevBtn.disabled = !prevId;
    nextBtn.disabled = !nextId;
    if (prevId) {
      prevBtn.title = 'Open race ' + prevId;
      prevBtn.onclick = () => {
        location.href = '/race.html?raceId=' + encodeURIComponent(prevId);
      };
    } else {
      prevBtn.title = idx < 0
        ? 'This race is not in the cached list'
        : 'No earlier race in the list';
    }
    if (nextId) {
      nextBtn.title = 'Open race ' + nextId;
      nextBtn.onclick = () => {
        location.href = '/race.html?raceId=' + encodeURIComponent(nextId);
      };
    } else {
      nextBtn.title = idx < 0
        ? 'This race is not in the cached list'
        : 'No later race in the list';
    }
  }

  // Compute isOurHandicap from the loaded entrants by checking whether any
  // entrant carries a current handicap whose definition matches the
  // configured handicapDefinitionId. SailSys's `handicap.currentHandicaps[]`
  // entries variously use `definitionId` (flat int) or `definition.id`
  // (nested object); both are checked.
  function computeIsOurHandicap() {
    if (configHandicapId == null) return false;
    const want = Number(configHandicapId);
    return entrantData.some(e => {
      const list = e && e.handicap && e.handicap.currentHandicaps;
      if (!Array.isArray(list)) return false;
      return list.some(h => {
        if (!h) return false;
        if (h.definitionId != null) return Number(h.definitionId) === want;
        if (h.definition != null) {
          const idv = (typeof h.definition === 'object') ? h.definition.id : h.definition;
          return Number(idv) === want;
        }
        return false;
      });
    });
  }

  // Compute isPursuit from the race status. The discriminator is the
  // TOP-LEVEL status.raceType (observed: 1 = Pursuit, 0 = Scratch start;
  // verified across HAR captures of races known by their SailSys-UI labels).
  // SailSys's own UI labels the 0 case "Fleet"; we use "scratch start".
  //
  // An earlier version read divisionTiming[].raceType — that field is
  // always 0 regardless of race type, so the check always reported pursuit
  // and scratch starts inherited the wrong UI (per-entrant Start column,
  // Late column, "Start times visibility" status row).
  //
  // Missing/unknown defaults to pursuit, so the initial paint (before
  // status arrives) shows the per-entrant affordances rather than briefly
  // flashing the scratch-start UI.
  function computeIsPursuit(status) {
    if (!status || status.raceType == null) return true;
    return status.raceType === 1;
  }

  // Human-readable race-type label for the status grid. Maps the SailSys
  // raceType + shortened-course flag to the local naming the club uses:
  //   raceType=0                    → "Scratch start"
  //   raceType=1, shortened=false   → "Pursuit"
  //   raceType=1, shortened=true    → "Pursuit TCF"
  // The shortened flag is per-division — any division marked shortened
  // promotes the whole race to Pursuit TCF. SailSys exposes it as
  // `shortenedCourse` on /results (per HAR) and (per the wiki) as
  // `isShortened` on /status; we check both so this works regardless of
  // which payload populated divisionTiming[].
  function computeRaceTypeLabel(status) {
    if (!status || status.raceType == null) return '';
    if (status.raceType === 0) return 'Scratch start';
    if (status.raceType !== 1) return '';
    const dts = Array.isArray(status.divisionTiming) ? status.divisionTiming : [];
    const shortened = dts.some(d => d && (d.shortenedCourse === true || d.isShortened === true));
    return shortened ? 'Pursuit TCF' : 'Pursuit';
  }

  // SailSys finishTime is an ISO-ish local string like
  // "2026-05-26T19:07:11.000". Extract the HH:MM:SS portion for the
  // canonical local-storage form used by timesMap.
  function parseSailsysFinishTime(s) {
    if (!s) return null;
    const m = String(s).match(/(?:^|T)(\d{1,2}):(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(Number(m[1])) + ':' + pad(Number(m[2])) + ':' + pad(Number(m[3]));
  }

  (async () => {
    // Reveal the status section so its message line (#status-msg) can show
    // load progress / errors before the full status arrives.
    document.getElementById('race-status').style.display = '';

    // URL param wins; otherwise the last raceId we looked at.
    let raceId = PARAMS.get('raceId');
    if (raceId) localStorage.setItem('sail-jinx.lastRaceId', raceId);
    else raceId = localStorage.getItem('sail-jinx.lastRaceId');

    if (!raceId) {
      ctrlMsgHtml('banner-warn', 'No race selected. Pick one on the <a href="/races.html">Races tab</a>.');
      return;
    }
    raceIdGlobal = raceId;
    setupRaceNav(raceId);

    ctrlMsg('banner-info', 'Loading race ' + raceId + '…');

    // Resolve auth + config first so activeCols() and the
    // isOurHandicap/isPursuit gates can settle before the first render.
    const [authData, cfg] = await Promise.all([awaitAuth(), getConfig()]);
    if (cfg && cfg.sailsys) configHandicapId = cfg.sailsys.handicapDefinitionId;

    const fetches = [
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/status'),
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/entrants'),
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/times'),
      // SailSys-computed results — best-effort. Empty/missing is fine;
      // isResultsClean() handles it and columns fall back to local values.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/computed-results'),
      // SailSys-owned per-boat came/finish — overlaid on top of local JSON
      // below so SailSys is the source of truth for those fields.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/finishers'),
      // Locally-saved Jinx handicap adjustments, if any. Lets the Next
      // Start column repaint across reloads without re-running Process
      // Handicaps. Empty/missing on a never-processed race is fine.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/pending-handicaps'),
      // Saved SailSys calibration (V₀). Required for Process Handicaps; if
      // missing the button is disabled with a hint to run Calibrate first.
      fetchJson('/api/calibration'),
      // Club-wide handicap-definition catalogue. Used to label the SailSys
      // entries in the Handicap selector.
      fetchJson('/api/handicap-definitions'),
      // Local TCF snapshot — wiki §6. Overlays SailSys's currentHandicaps
      // values once loaded; mismatch banner uses this to decide whether to
      // offer Push/Reset.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/tcf-snapshot')
    ];
    const [statusR, entrantsR, timesR, resultsR, finishersR, pendingR, calibrationR, handicapsR, snapshotR]
      = await Promise.all(fetches);
    currentCalibration = (calibrationR && calibrationR.ok && calibrationR.body)
      ? calibrationR.body.calibration : null;
    handicapDefs = (handicapsR && handicapsR.ok && handicapsR.body)
      ? (handicapsR.body.handicapDefinitions || {}) : {};

    if (statusR.status === 401 || entrantsR.status === 401) {
      ctrlMsgHtml('banner-warn', 'You are not signed in. <a href="/">Sign in to SailSys</a> first.');
      return;
    }

    if (!statusR.ok) {
      ctrlMsg('banner-err', 'Could not load status: '
        + ((statusR.body && statusR.body.error) || ('HTTP ' + statusR.status)));
      return;
    }

    renderStatus(statusR.body && statusR.body.status, raceId);

    if (!entrantsR.ok) {
      ctrlMsg('banner-err', 'Could not load entrants: '
        + ((entrantsR.body && entrantsR.body.error) || ('HTTP ' + entrantsR.status)));
      return;
    }

    entrantData = (entrantsR.body && Array.isArray(entrantsR.body.entrants))
      ? entrantsR.body.entrants : [];
    isOurHandicap = computeIsOurHandicap();

    // Capture SailSys's TCF per boat for the mismatch banner diff.
    recomputeSailsysTcf();

    // Overlay the local snapshot (if any) onto currentTcf() and prepare
    // banner copy. snapshotMeta carries savedAt/source/sourceRaceId for
    // the human-readable banner text below.
    snapshotTcf = new Map();
    snapshotMeta = null;
    if (snapshotR && snapshotR.ok && snapshotR.body && snapshotR.body.snapshot) {
      const snap = snapshotR.body.snapshot;
      snapshotMeta = {
        savedAt: snap.savedAt || null,
        source: snap.source || null,
        sourceRaceId: snap.sourceRaceId || null,
        sourceRaceNumber: (snap.sourceRaceNumber != null) ? snap.sourceRaceNumber : null
      };
      if (Array.isArray(snap.tcfs)) {
        for (const t of snap.tcfs) {
          if (t && t.boatId != null && t.value != null)
            snapshotTcf.set(String(t.boatId), Number(t.value));
        }
      }
    }

    // Restore any locally-saved Jinx handicap adjustments. Sets the Next
    // Start column up before the first render so the column appears
    // immediately on reload rather than after a paint flicker. Saved =
    // true so the SAVE button starts disabled — the user has to re-run
    // Process Handicaps to make further changes savable.
    //
    // EXCEPT when this race is currently inheriting unapplied TCFs from the
    // PREVIOUS race's handicap processing (a divergent PROCESS_HANDICAPS
    // snapshot). The Adjustment column is for the next race; any pending
    // adjustments restored here would be stale (from a past processing of
    // this race, before its results were re-done) and must not be shown.
    // They become relevant again only once this race is re-processed.
    const inheritingHandicaps = snapshotDivergent()
      && snapshotMeta && snapshotMeta.source === 'PROCESS_HANDICAPS';
    if (!inheritingHandicaps
        && pendingR && pendingR.ok && Array.isArray(pendingR.body && pendingR.body.adjustments)
        && pendingR.body.adjustments.length > 0) {
      nextStartAdjustments = new Map(
        pendingR.body.adjustments.map(a => [String(a.boatId), a]));
      nextStartSaved = true;
    }

    // Overlay SailSys finishers onto the local JSON BEFORE snapshotTimes so
    // the SailSys-derived values are the dirty baseline (not "edits"). For
    // each boat that SailSys knows about: startedRace → came (always trust
    // SailSys, since it's a boolean with no missing-vs-false distinction);
    // finishTime → finish only when SailSys has a value (else local JSON's
    // finish remains, per the source-of-truth-with-local-fallback rule).
    // A penalty entry with {averagePoints: true} marks the duty boat —
    // SailSys is the authority on who that is when we load.
    //
    // The server response wraps the saved RaceTimes record under
    // body.times, so the per-boat map is at body.times.times and the
    // metadata at body.times.{boatOrder,dutyBoatId,divisionStarts}. Local
    // JSON owns actualStart (SailSys has no equivalent field).
    const savedTimes = (timesR && timesR.ok && timesR.body.times) ? timesR.body.times : null;
    const savedInnerTimes = (savedTimes && savedTimes.times) ? savedTimes.times : {};
    // Shallow-clone so the overlay mutations don't leak back into the
    // response object (and so we can safely add boats SailSys knows about
    // but local JSON doesn't).
    const overlaidInner = Object.assign({}, savedInnerTimes);
    let sailsysDutyBoatId = null;
    if (finishersR && finishersR.ok && Array.isArray(finishersR.body.finishers)) {
      for (const f of finishersR.body.finishers) {
        const boatId = f && f.boatId != null ? String(f.boatId) : null;
        if (!boatId) continue;
        const sailFinish = parseSailsysFinishTime(f.finishTime);
        const existing = overlaidInner[boatId] || { came: false, actualStart: null, finish: null };
        overlaidInner[boatId] = {
          came: !!f.startedRace,
          actualStart: existing.actualStart || null,
          finish: sailFinish || existing.finish || null
        };
        if (Array.isArray(f.penalties)
            && f.penalties.some(p => p && p.averagePoints === true)) {
          sailsysDutyBoatId = boatId;
        }
      }
    }
    // Local-saved dutyBoatId loses to SailSys when SailSys says one —
    // SailSys is the source of truth for the duty boat once it's been
    // pushed. Local JSON's dutyBoatId still wins when SailSys has no
    // AVG-flagged boat (e.g. a never-pushed in-progress edit).
    const overlaidDutyBoatId = sailsysDutyBoatId
      || (savedTimes && savedTimes.dutyBoatId)
      || null;
    const overlaidSaved = {
      times: overlaidInner,
      boatOrder: (savedTimes && Array.isArray(savedTimes.boatOrder))
        ? savedTimes.boatOrder : [],
      dutyBoatId: overlaidDutyBoatId,
      divisionStarts: (savedTimes && savedTimes.divisionStarts) || null
    };

    // Server snapshot (with SailSys overlay) first — establishes the dirty
    // baseline. Then overlay any unsaved edits from this tab's
    // sessionStorage; those changes will correctly re-register as dirty
    // against the (now SailSys-anchored) baseline.
    snapshotTimes(overlaidSaved);
    sessionRestoreForm();
    if (isCurrentRace) {
      sessionRestoreNowLog();
      renderNowLog();
    }
    // Seed sailsysResults cache from the optional fetch. Empty if the race
    // hasn't been processed yet — that's fine; isResultsClean() handles it.
    if (resultsR && resultsR.ok && resultsR.body && resultsR.body.results) {
      sailsysResults = parseSailsysResults(resultsR.body.results);
    }
    // If the race already has results, default the entrants table sort to
    // Division (primary) + Place (secondary), both ascending. Each division
    // produces its own 1st / 2nd / 3rd in recomputePlaces, so grouping by
    // division before place gives the natural per-division podium view.
    // The manual-drag fallback only matters for races still in progress
    // where there are no places to sort by. Division column may be hidden
    // (only one division on the race) — the sort comparator still honours
    // sortStack entries regardless, so this is safe.
    if (sortStack.length === 0 && Object.keys(sailsysResults).length > 0) {
      sortStack = [{ key: 'division', dir: 1 }, { key: 'place', dir: 1 }];
    }

    ctrlMsg('banner-ok', entrantData.length + ' entrants loaded.');
    document.getElementById('entrants-count').textContent = '(' + entrantData.length + ')';
    document.getElementById('race-entrants').style.display = '';

    renderTcfMismatchBanner();

    // Hide-DNC filter: editable-only; the Came column isn't shown in read-only
    // mode so the filter has nothing to act on. Initialise from sessionStorage
    // (restored by sessionRestoreForm above) and wire the checkbox.
    if (IS_EDITABLE) {
      const toggle = document.getElementById('hide-dnc-toggle');
      const cb = document.getElementById('hide-dnc');
      toggle.style.display = '';
      cb.checked = hideDnc;
      cb.onchange = () => {
        hideDnc = cb.checked;
        renderEntrants();
        sessionSaveForm();
      };
    }
    // Show-sailsys toggle: always available (read-only too) because the
    // Sailsys Elapsed / Corrected columns are diagnostic and useful even
    // when nothing is being edited. Re-renders both head and body since
    // the column set changes.
    {
      const cb = document.getElementById('show-sailsys');
      cb.checked = showSailsys;
      cb.onchange = () => {
        showSailsys = cb.checked;
        renderEntrantsHead();
        renderEntrants();
        sessionSaveForm();
      };
    }

    renderEntrantsHead();
    renderEntrants();
    updateNowLogSection();

    document.getElementById('save-btn').onclick = doSave;
    document.getElementById('reset-btn').onclick = doReset;

    // The first renderStatus() call ran BEFORE snapshotTimes and before
    // entrantData was assigned, so its dirty baseline was empty (every field
    // looked dirty → status selector permanently disabled) and the duty-boat
    // <select> had no <option>s. Re-render now that the state is set up so
    // both controls reflect reality.
    if (currentStatus) renderStatus(currentStatus, raceIdGlobal);

    // sessionRestoreForm() may have rehydrated unsaved edits from a prior
    // tab session — surface the SAVE bar immediately if so. Without this
    // the bar only appears after the next interactive mutation.
    updateSaveBar();
  })();
</script>
</body>
</html>
