        // Re-render so Place/Points + the cell text reflect the new
        // effective set; updateSaveBar picks up the dirt and re-fires
        // the dirty-flip swap path if needed.
        renderEntrantsHead();
        renderEntrants();
        updateSaveBar();
      };
    });

    // Dismiss on outside-click or Escape. Use mousedown to fire before
    // the next focus shift — and skip clicks inside the popover itself.
    const onDocMouseDown = (ev) => {
      if (pop.contains(ev.target)) return;
      cleanup();
    };
    const onKey = (ev) => { if (ev.key === 'Escape') cleanup(); };
    function cleanup() {
      if (pop.parentNode) pop.parentNode.removeChild(pop);
      document.removeEventListener('mousedown', onDocMouseDown, true);
      document.removeEventListener('keydown', onKey, true);
      openPopoverCleanup = null;
    }
    // Wire on the next microtask so the click that opened us doesn't
    // immediately close it.
    setTimeout(() => {
      document.addEventListener('mousedown', onDocMouseDown, true);
      document.addEventListener('keydown', onKey, true);
    }, 0);
    openPopoverCleanup = cleanup;
  }

  function wireTcfInputs() {
    document.querySelectorAll('input.tcf-input').forEach(inp => {
      inp.oninput = () => {
        const id = Number(inp.dataset.boatId);
        const orig = Number(inp.dataset.original);
        const v = Number(inp.value);
        if (!isNaN(v) && v !== orig) {
          dirtyTcf.set(id, v);
          inp.classList.add('dirty');
        } else {
          dirtyTcf.delete(id);
          inp.classList.remove('dirty');
        }
        // Mark invalid when the value cannot be interpreted as a Number.
        if (isNaN(v)) inp.classList.add('invalid');
        else inp.classList.remove('invalid');
        updateSaveBar();
        sessionSaveForm();
      };
      // On blur/Enter, re-render so a TCF-mode ranking reflects the new
      // value. Using onchange (not oninput) keeps the keystroke path
      // cheap and avoids stealing focus from the field being edited.
      inp.onchange = () => {
        if (selectedHandicap === 'tcf') renderEntrants();
      };
    });
  }

  function wireTimeInputs() {
    document.querySelectorAll('input.came-input').forEach(inp => {
      inp.onchange = () => {
        const id = Number(inp.dataset.boatId);
        const t = getTimes(id);
        t.came = inp.checked;
        // Re-render this row so the time inputs enable/disable.
        renderEntrants();
        // The Course length / Process start times row hides as soon as
        // any boat is marked came (re-processing once boats have arrived
        // at the start would shuffle their staggered times). Re-render
        // the controls panel so that row hides immediately rather than
        // waiting for the next status refresh.
        renderControls();
        updateSaveBar();
        sessionSaveForm();
      };
    });
    document.querySelectorAll('input.time-input').forEach(inp => {
      // + and - bump the displayed time; = is treated the same as + (same
      // physical key on US keyboards — saves reaching for Shift on a busy
      // NOW evening). Granularity is decided by bumpTimeValue (see its
      // doc): one colon = minute, two or more = seconds. Wraps mod 24 h.
      // Unparseable values pass through without consuming the key.
      inp.onkeydown = (ev) => {
        const k = ev.key;
        // + (and = on the same physical key) and ArrowUp bump up; - and
        // ArrowDown bump down. Both arrow keys do nothing useful inside a
        // single-line text input anyway, so it's safe to repurpose them.
        const isPlus = (k === '+' || k === '=' || k === 'ArrowUp');
        const isMinus = (k === '-' || k === 'ArrowDown');
        if (!isPlus && !isMinus) return;
        const next = bumpTimeValue(inp.value, isPlus ? 1 : -1);
        if (next == null) return;
        ev.preventDefault();
        inp.value = next;
        try { inp.setSelectionRange(next.length, next.length); } catch (_) {}
        // Reuse the oninput pipeline so dirty/elapsed/late/save-bar/session
        // state all update exactly as they would for typed input.
        inp.dispatchEvent(new Event('input'));
      };
      inp.onfocus = () => {
        // Prefill empty time inputs so the RO only has to key the delta:
        //   Actual Start → "HH:MM:" from the boat's scheduled start
        //   Finish       → "HH:MM" from the most recent finish (or sched+60)
        // The prefilled marker lets blur clear the field if nothing was typed.
        if (inp.value) return;
        const id = inp.dataset.boatId;
        const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(id));
        let prefix = null;
        if (inp.dataset.field === 'actualStart') {
          prefix = startPrefix(entrant && entrant.startTimeLocal);
        } else if (inp.dataset.field === 'finish') {
          prefix = finishPrefix(entrant);
        }
        if (!prefix) return;
        inp.value = prefix;
        inp.dataset.prefilled = '1';
        // The browser places the caret based on the click coordinates AFTER
        // the focus handler returns, which would put it at position 0 for a
        // click on an empty box. Defer the caret move so it wins the race.
        setTimeout(() => {
          try { inp.setSelectionRange(prefix.length, prefix.length); } catch (_) {}
        }, 0);
      };
      inp.oninput = () => {
        // Any typing means the user took ownership of the value — drop the
        // prefilled marker so blur won't clear it.
        delete inp.dataset.prefilled;
        const id = Number(inp.dataset.boatId);
        const field = inp.dataset.field;
        const t = getTimes(id);
        t[field] = inp.value || null;
        const tr = inp.closest('tr');
        updateElapsedCell(tr, id);
        updateFlagsCell(tr, id);
        // Mark invalid while the value cannot be parsed into a canonical time.
        if (!inp.value) {
          inp.classList.remove('invalid');
        } else {
          const can = reformatTime(inp.value);
          if (can) inp.classList.remove('invalid');
          else inp.classList.add('invalid');
        }
        updateSaveBar();
        sessionSaveForm();
      };
      inp.onblur = () => {
        const id = Number(inp.dataset.boatId);
        const field = inp.dataset.field;
        const t = getTimes(id);
        if (inp.dataset.prefilled) {
          // Prefilled but unchanged — clear back to empty so the field stays
          // honest about whether a time has actually been captured.
          inp.value = '';
          t[field] = null;
          delete inp.dataset.prefilled;
          // Clearing leaves the field non-invalid.
          inp.classList.remove('invalid');
        } else {
          const canon = reformatTime(inp.value);
          if (canon) {
            inp.value = canon;
            t[field] = canon;
            if (field === 'finish') lastFinishTime = canon;
            inp.classList.remove('invalid');
          }
          // If unparseable, leave the raw text in place — oninput already
          // stored it on timesMap so the dirty state is honest.
          else {
            // Mark invalid so the user sees the problem.
            inp.classList.add('invalid');
          }
        }
        const tr = inp.closest('tr');
        updateElapsedCell(tr, id);
        updateFlagsCell(tr, id);
        updateSaveBar();
        sessionSaveForm();
      };
    });
    document.querySelectorAll('button.now-btn').forEach(btn => {
      btn.onclick = () => {
        const id = Number(btn.dataset.boatId);
        const field = btn.dataset.field;
        const now = localNow();
        const t = getTimes(id);
        t[field] = now;
        if (field === 'finish') lastFinishTime = now;
        const tr = btn.closest('tr');
        const inp = tr.querySelector('input.time-input[data-field="' + field + '"]');
        if (inp) {
          inp.value = now;
          // NOW is an explicit commit; if the user had focus and we'd
          // prefilled, the prefill is now superseded.
          delete inp.dataset.prefilled;
          // NOW provides a valid canonical time.
          inp.classList.remove('invalid');
        }
        updateElapsedCell(tr, id);
        updateFlagsCell(tr, id);
        updateSaveBar();
        sessionSaveForm();
        logNow(id, field, now);
      };
    });
  }

  function logNow(boatId, field, time) {
    const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(boatId));
    const sail = entrant && entrant.boat && entrant.boat.sailNumber;
    const name = entrant && entrant.boat && entrant.boat.name;
    nowLog.push({ time, field, sail, name });
    renderNowLog();
    sessionSaveNowLog();
  }

  // A header NOW button captures a time tied to a field (start/finish) but
  // not yet to a boat — the RO matches it up later. Distinct from logNow,
  // which records boat + field together.
  function logNowField(field) {
    nowLog.push({ time: localNow(), field });
    renderNowLog();
    sessionSaveNowLog();
  }

  function renderNowLog() {
    const list = document.getElementById('now-log-list');
    if (nowLog.length === 0) {
      list.innerHTML = '<li style="color: #888; list-style: none; margin-left: -1.5em;">(no NOW clicks yet)</li>';
      return;
    }
    // Earliest first (ascending). Sort by parsed time where possible so
    // entries read top-to-bottom from oldest to newest.
    const sorted = nowLog.slice().sort((a, b) => {
      const pa = parseTime(a.time);
      const pb = parseTime(b.time);
      if (pa != null && pb != null) return pa - pb;
      return String(a.time).localeCompare(String(b.time));
    });
    list.innerHTML = sorted.map(e => {
      // Entries from a header NOW button carry a field but no boat — render
      // " — start/finish". Boat-tied entries get " — start/finish for <boat>".
      // A displaced entry (a value bumped out of a field by a drag) carries a
      // free-text note describing where it came from; that wins the tail.
      const fld = e.field === 'actualStart' ? 'start'
                : e.field === 'finish'      ? 'finish' : null;
      const who = [e.sail, e.name].filter(Boolean).map(esc).join(' ');
      const tail = e.note
        ? (' — ' + esc(e.note))
        : (fld ? (' — ' + esc(fld) + (who ? ' for ' + who : '')) : '');
      // Each entry is draggable onto a time input field (see the document-level
      // drop handler) to set that field to this captured time. The ☰ handle
      // signals the affordance (matching the row-reorder handle).
      return '<li class="now-log-entry" draggable="true" data-time="' + esc(e.time) + '">'
        + '<span class="now-drag-handle" title="Drag onto a start/finish field">☰</span> '
        + '<code>' + esc(e.time) + '</code>' + tail + '</li>';
    }).join('');
    list.querySelectorAll('li.now-log-entry').forEach(li => {
      li.ondragstart = (ev) => {
        ev.dataTransfer.setData('text/plain', li.dataset.time);
        // A private type so the entrants-table row-reorder handlers can tell a
        // NOW-time drag apart from a row drag and leave it alone.
        ev.dataTransfer.setData('application/x-now-time', li.dataset.time);
        ev.dataTransfer.effectAllowed = 'copy';
      };
    });
  }

  // True when the in-flight drag originated from a NOW-log entry (vs an
  // entrants-table row reorder). Checked during dragover/drop, where the
  // payload itself can't be read but the type list can.
  function isNowTimeDrag(ev) {
    return !!(ev.dataTransfer && Array.from(ev.dataTransfer.types)
      .includes('application/x-now-time'));
  }

  // A value about to be overwritten by a drag is "displaced". If it isn't a
  // time already captured in the log, record it so it isn't lost — tagged with
  // a note saying which field it came out of. `entry` carries any field/boat
  // tags so the recorded value stays draggable and self-describing.
  function logDisplaced(oldValue, entry) {
    const v = (oldValue || '').trim();
    if (!v) return;
    const pv = parseTime(v);
    const dup = nowLog.some(e =>
      e.time === v || (pv != null && parseTime(e.time) === pv));
    if (dup) return;
    nowLog.push(Object.assign({ time: v }, entry));
    renderNowLog();
    sessionSaveNowLog();
  }

  // Apply a dragged NOW-log time to a target time input. The previous value is
  // displaced into the log (logDisplaced) before being overwritten. The
  // dragged entry itself stays in the log. Handles both the per-entrant
  // start/finish fields and the per-division start fields.
  function applyNowDrop(inp, draggedTime) {
    if (!draggedTime) return;

    // Per-division start field (HH:MM granularity).
    if (inp.classList.contains('division-start')) {
      const divId = inp.dataset.divId;
      const canon = reformatHHMM(draggedTime);
      if (!canon) return;
      const name = (currentStatus && Array.isArray(currentStatus.divisionTiming)
        && (currentStatus.divisionTiming.find(d => String(d.divisionId) === String(divId)) || {}).divisionName)
        || ('Div ' + divId);
      logDisplaced(inp.value, { field: 'divStart-' + divId, note: 'replaced ' + name + ' start by drag' });
      const sched = divisionScheduledStart(Number(divId)) || '';
      if (timeStringsEqual(canon, sched)) divisionStartsMap.delete(String(divId));
      else divisionStartsMap.set(String(divId), canon);
      refreshDivisionRows(divId);
      updateSaveBar();
      sessionSaveForm();
      return;
    }

    // Per-entrant start/finish field (HH:MM:SS granularity).
    const id = Number(inp.dataset.boatId);
    const field = inp.dataset.field;
    if (!field) return;
    const canon = reformatTime(draggedTime) || draggedTime;
    const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(id));
    const sail = entrant && entrant.boat && entrant.boat.sailNumber;
    const name = entrant && entrant.boat && entrant.boat.name;
    const who = [sail, name].filter(Boolean).join(' ');
    const fld = field === 'actualStart' ? 'start' : 'finish';
    logDisplaced(inp.value, { field, sail, name,
      note: 'replaced ' + fld + (who ? ' for ' + who : '') + ' by drag' });
    const t = getTimes(id);
    t[field] = canon;
    if (field === 'finish') lastFinishTime = canon;
    inp.value = canon;
    delete inp.dataset.prefilled;
    inp.classList.remove('invalid');
    const tr = inp.closest('tr');
    updateElapsedCell(tr, id);
    updateFlagsCell(tr, id);
    updateSaveBar();
    sessionSaveForm();
  }

  // Document-level drag-over/drop delegation: any (enabled) time input field
  // accepts a NOW-log entry dropped onto it. dragover must preventDefault to
  // mark the input as a valid drop target; drop preventDefault suppresses the
  // browser's own text-insertion so we set the value ourselves.
  document.addEventListener('dragover', (ev) => {
    if (!isNowTimeDrag(ev)) return;
    const inp = ev.target.closest && ev.target.closest('input.time-input');
    if (inp && !inp.disabled && !inp.readOnly) {
      ev.preventDefault();
      ev.dataTransfer.dropEffect = 'copy';
    }
  });
  document.addEventListener('drop', (ev) => {
    if (!isNowTimeDrag(ev)) return;
    const inp = ev.target.closest && ev.target.closest('input.time-input');
    if (!inp || inp.disabled || inp.readOnly) return;
    ev.preventDefault();
    applyNowDrop(inp, ev.dataTransfer.getData('text/plain'));
  });

  function updateElapsedCell(tr, boatId) {
    const cols = activeCols();
    const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(boatId));
    if (!entrant) { patchPlacesPoints(); return; }
    const cells = tr.querySelectorAll('td');

    // Delegate to the column's own get function so the cell respects the
    // current mode (Mode A → SailSys elapsedTime; Mode B → local
    // computation). Hand-rolling the computation here used to overwrite
    // the SailSys value with a local-only one during an edit.
    const elapsedIdx = cols.findIndex(c => c.key === 'elapsed');
    if (elapsedIdx >= 0 && cells[elapsedIdx]) {
      const v = cols[elapsedIdx].get(entrant);
      cells[elapsedIdx].textContent = (v == null) ? '' : String(v);
    }
    const lateIdx = cols.findIndex(c => c.key === 'late');
    if (lateIdx >= 0 && cells[lateIdx]) {
      cells[lateIdx].textContent = fmtLate(lateSeconds(entrant));
    }
    // A finish-time change rearranges Place/Points across every row. Patch
    // those cells in place rather than re-rendering — a full re-render would
    // recreate the input the user is currently typing in and steal focus.
    patchPlacesPoints();
  }

  function updateFlagsCell(tr, boatId) {
    const cols = activeCols();
    const idx = cols.findIndex(c => c.key === 'flags');
    if (idx >= 0) {
      const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(boatId));
      const flags = flagsForEntrant(entrant);
      const txt = flags.length ? flags.join(', ') : '';
      const cells = tr.querySelectorAll('td');
      if (cells[idx]) cells[idx].textContent = txt;
    }
    // Flags can affect places (e.g., OCS penalty), so re-patch places.
    patchPlacesPoints();
  }

  // In-place refresh of the Place + Points cells after a time / flag edit.
  // Delegates to each column's own `get` function so the right source-of-
  // truth wins per cell: Place falls back to local placeMap when results
  // are dirty (otherwise sailsysResults); Points returns '' whenever the
  // race state is dirty, since local computation has no notion of
  // pointscore. (Earlier this helper wrote the place value into BOTH
  // cells, which surfaced the place number as bogus "points" the moment
  // the user edited a time.)
  function patchPlacesPoints() {
    recomputePlaces();
    const cols = activeCols();
    const placeIdx = cols.findIndex(c => c.key === 'place');
    const pointsIdx = cols.findIndex(c => c.key === 'points');
    if (placeIdx < 0 && pointsIdx < 0) return;
    const placeCol = placeIdx >= 0 ? cols[placeIdx] : null;
    const pointsCol = pointsIdx >= 0 ? cols[pointsIdx] : null;
    const fmt = (v) => (typeof v === 'number' && isNaN(v)) ? '' : (v == null ? '' : String(v));
    document.querySelectorAll('#entrants-tbody tr').forEach(tr => {
      const boatId = tr.dataset.boatId;
      const entrant = entrantData.find(e => String(e.boat && e.boat.id) === boatId);
      if (!entrant) return;
      const cells = tr.querySelectorAll('td');
      if (placeCol && cells[placeIdx]) cells[placeIdx].textContent = fmt(placeCol.get(entrant));
      if (pointsCol && cells[pointsIdx]) cells[pointsIdx].textContent = fmt(pointsCol.get(entrant));
    });
  }

  // HTML5 native drag-drop: drag whole row, reorder boatOrder, re-render.
  let dragSrcId = null;
  function wireDrag() {
    document.querySelectorAll('#entrants-tbody tr').forEach(tr => {
      tr.ondragstart = (ev) => {
        dragSrcId = tr.dataset.boatId;
        tr.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', dragSrcId);
      };
      tr.ondragend = () => {
        tr.classList.remove('dragging');
        document.querySelectorAll('tr.drag-over').forEach(x => x.classList.remove('drag-over'));
      };
      tr.ondragover = (ev) => {
        // A NOW-log time drag isn't a row reorder — let it fall through to the
        // time-input drop target (no row highlight, no preventDefault here).
        if (isNowTimeDrag(ev)) return;
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('tr.drag-over').forEach(x => x.classList.remove('drag-over'));
        tr.classList.add('drag-over');
      };
      tr.ondragleave = () => {
        tr.classList.remove('drag-over');
      };
      tr.ondrop = (ev) => {
        if (isNowTimeDrag(ev)) return;
        ev.preventDefault();
        tr.classList.remove('drag-over');
        const srcId = dragSrcId;
        const dstId = tr.dataset.boatId;
        if (!srcId || srcId === dstId) return;
        // Rebuild boatOrder from the current rendered order, then move src
        // immediately before dst. Doing this BEFORE clearing sortKey means we
        // capture whatever the user currently sees as their new manual order.
        const cur = orderedEntrants().map(e => String(e.boat && e.boat.id));
        const arr = cur.filter(x => x !== srcId);
        const at = arr.indexOf(dstId);
        arr.splice(at < 0 ? arr.length : at, 0, srcId);
        // Dropping just past a row's mid-line can produce an identical visual
        // order — e.g. dragging row B onto the row immediately below it
        // re-inserts B in the same slot. Don't mark the form dirty in that
        // case; otherwise SAVE would surface "times changed" with no actual
        // change to push.
        const unchanged = arr.length === cur.length && arr.every((id, i) => id === cur[i]);
        if (unchanged) return;
        boatOrder = arr;
        // Any new manual ordering deselects the column sort.
        sortStack = [];
        renderEntrantsHead();
        renderEntrants();
        updateSaveBar();
        sessionSaveForm();
      };
    });
  }

  // Keyboard handling for inputs in the entrants table. When the user hits
  // Tab or Enter while focused on an input in the table, accept the current
  // value (trigger blur handlers/formatting) and move focus to the entry
  // immediately below in the visual order (the DOM order), preserving the
  // column index. This respects the current sort order because the tbody
  // rows are rendered in that order.
  function wireEntrantsKeyHandlers() {
    const tbody = document.getElementById('entrants-tbody');
    if (!tbody || tbody.dataset.keywired) return;
    tbody.dataset.keywired = '1';
    tbody.addEventListener('keydown', (ev) => {
      const k = ev.key;
      if (k !== 'Tab' && k !== 'Enter') return;
      const target = ev.target;
      if (!target) return;
      // Only handle relevant inputs inside the table.
      if (!target.matches('input.time-input, input.tcf-input, input.came-input')) return;
      // Intercept default Tab behaviour so we can move vertically instead of
      // horizontally. Prevent native tabbing.
      ev.preventDefault();

      // Commit the current value by blurring — existing onblur/oninput
      // handlers will take care of formatting and state updates.
      try { target.blur(); } catch (_) {}

      const tr = target.closest('tr');
      if (!tr) return;
      const rows = Array.from(tbody.querySelectorAll('tr'));
      const idx = rows.indexOf(tr);
      if (idx < 0) return;
      // Determine the TD index of the focused control so we can focus the
      // same column in the next/previous row (works even when columns are hidden
      // or reordered by sorting/dragging).
      const td = target.closest('td');
      if (!td) return;
      const tds = Array.from(tr.querySelectorAll('td'));
      const cellIndex = tds.indexOf(td);
      if (cellIndex < 0) return;

      // Support Shift+Tab to move up; otherwise move down one row. If the
      // same-column control in the immediate row is absent or disabled, walk
      // until we find a focusable control or run out of rows.
      const dir = (ev.shiftKey ? -1 : 1);
      let scanIdx = idx + dir;
      let next = null;
      while (scanIdx >= 0 && scanIdx < rows.length) {
        const candidate = rows[scanIdx];
        const nextTds = Array.from(candidate.querySelectorAll('td'));
        if (cellIndex < nextTds.length) {
          const f = nextTds[cellIndex].querySelector('input, button, select, textarea');
          if (f && !f.disabled) { next = candidate; break; }
        }
        scanIdx += dir;
      }
      if (!next) return; // nothing suitable
      // Focusable control determined during scanning above.
      const nextTds = Array.from(next.querySelectorAll('td'));
      const focusable = nextTds[cellIndex].querySelector('input, button, select, textarea');
      if (!focusable || focusable.disabled) return;

      // Move focus after a tick so blur/commit handlers run first.
      setTimeout(() => {
        try { focusable.focus(); } catch (_) {}
        // If the target is a text input, place caret at end for convenience.
        try {
          if ((focusable.classList && focusable.classList.contains('time-input'))
              || (focusable.tagName === 'INPUT' && focusable.type === 'text')) {
            const len = focusable.value ? focusable.value.length : 0;
            if (typeof focusable.setSelectionRange === 'function') focusable.setSelectionRange(len, len);
          }
        } catch (_) {}
      }, 0);
    });
  }

  // --- dirty/save plumbing ---

  function currentTimesPayload() {
    // Use the persisted boatOrder for the ids list (drag-set order, with
    // entrantData as the fallback for boats that haven't been dragged).
    // Display sort is a transient view and MUST NOT be folded into what's
    // saved — and crucially, calling orderedEntrants() here used to create
    // a recursion when sortKey was set:
    //   currentTimesPayload → orderedEntrants (sort by Place)
    //     → col.get(Place) → isResultsClean() → isAnyDirty()
    //     → isTimesDirty() → currentTimesPayload → orderedEntrants → …
    // which silently aborted the sort and left rows in their original
    // order despite the active sort marker.
    const byId = new Map(entrantData.map(e => [String(e.boat && e.boat.id), e]));
    const seen = new Set();
    const ids = [];
    for (const raw of (boatOrder || [])) {
      const id = String(raw);
      if (byId.has(id) && !seen.has(id)) { ids.push(id); seen.add(id); }
    }
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      if (!seen.has(id)) ids.push(id);
    }
    const times = {};
    for (const id of ids) {
      const t = timesMap.get(id);
      if (!t) continue;
      times[id] = { came: !!t.came, actualStart: t.actualStart || null, finish: t.finish || null };
    }
    // Note: per-division start times + course lengths are NOT bundled here —
    // they are pushed directly to SailSys's divisionTiming (via the
    // /division-starts endpoint) on Save. SailSys is the source of truth for
    // those; local JSON only holds per-boat times + order metadata.
    return {
      raceId: String(raceIdGlobal),
      boatOrder: ids,
      dutyBoatId: dutyBoatId || null,
      times
    };
  }

  function isTimesDirty() {
    if (!IS_EDITABLE) return false;
    const payload = currentTimesPayload();
    // boatOrder is intentionally NOT compared. The row order is a display
    // preference (drag-to-reorder is a transient view choice), not race
    // data — so reordering doesn't dirty the form and doesn't flip
    // Results source out of "SailSys (authoritative)". sessionStorage
    // preserves the order within the tab, and currentTimesPayload reads
    // the live boatOrder global so any genuine SAVE picks up the latest
    // arrangement for free.
    return JSON.stringify(payload.times) !== originalTimesJson
        || (payload.dutyBoatId || '') !== (originalDutyBoatId || '')
        || isDivisionStartsDirty();
  }

  let lastDirtyState = false;

  function updateSaveBar() {
    const bar = document.getElementById('save-bar');
    const summary = document.getElementById('save-summary');
    const tcfN = dirtyTcf.size;
    const timesD = isTimesDirty();
    // A divergent local TCF snapshot (next-race handicaps, or a saved manual
    // edit) is pending application to SailSys — surface it through the normal
    // SAVE bar instead of a separate banner. SAVE pushes it; RESET reverts.
    const snapPending = snapshotPendingPush();
    if (tcfN > 0 || timesD || snapPending) {
      bar.style.display = '';
      const parts = [];
      if (tcfN > 0) parts.push(tcfN + ' TCF edit' + (tcfN === 1 ? '' : 's'));
      if (timesD) parts.push('times changed');
      if (snapPending) parts.push('updated TCFs to apply');
      summary.textContent = parts.join(', ') + '.';
    } else {
      bar.style.display = 'none';
      summary.textContent = '';
    }
    // Any local edit invalidates the computed Jinx adjustments — they were
    // derived from the pre-edit results, so saving or displaying them now
    // would be misleading. Drop them and re-render so the Adjustment column
    // vanishes until Process Handicaps is re-run.
    clearAdjustmentsOnEdit();
    // Mirror the dirtiness change into the status-box Results source + Dirty
    // rows so they track the SAVE bar — flip to "Local — pending push" the
    // moment editing starts, back to "SailSys (authoritative)" / "clean" once
    // the dirt clears.
    updateResultsSource();
    updateDirtyStatus();
    // Dirty/clean flip → the Handicap selector switches between the
    // SailSys-supplied handicaps and the local Scratch/TCF/Pursuit set.
    // Re-render so the new options + Place/Points columns show up
    // immediately rather than waiting for the next render trigger.
    const nowDirty = isAnyDirty();
    if (nowDirty !== lastDirtyState) {
      lastDirtyState = nowDirty;
      renderEntrants();
      // The controls panel gates Process Handicaps on isAnyDirty() — repaint
      // it so the button flips between enabled and "SAVE the pending edits
      // first" as the user edits and saves.
      renderControls();
    }
  }

  function clearAdjustmentsOnEdit() {
    if (nextStartAdjustments.size === 0) return;
    if (!isAnyDirty()) return;
    nextStartAdjustments.clear();
    nextStartSaved = false;
    renderEntrantsHead();
    renderEntrants();
    renderControls();
  }

  function updateResultsSource() {
    const dd = document.getElementById('results-source-cell');
    if (dd) dd.innerHTML = resultsSourceCell();
  }

  // Repeat columns (sail2, name2) share their original's sort behaviour via
  // a `sortKey` override — clicking either Sail # header toggles the same sort.
  const sortKeyForCol = (c) => c.sortKey || c.key;

  function renderEntrantsHead() {
    const head = document.getElementById('entrants-head');
    const cols = activeCols();
    head.innerHTML = cols.map(c => {
      const sortable = c.sortable !== false;
      const myKey = sortKeyForCol(c);
      let marker = '';
      if (sortable) {
        const idx = sortStack.findIndex(s => s.key === myKey);
        if (idx >= 0) {
          // Primary sort: solid triangle (▲/▼). Secondary: outline (△/▽).
          // Capped at MAX_SORT_DEPTH (=2) so only those two ever render.
          const up   = idx === 0 ? '▲' : '△';
          const down = idx === 0 ? '▼' : '▽';
          const arrow = sortStack[idx].dir > 0 ? up : down;
          marker = '<span class="sort-marker">' + arrow + '</span>';
        }
      }
      // Column may carry a cellClass — apply it to the <th> too so the
      // header's text-align matches the cells (otherwise a right-aligned
      // value column gets a left-aligned label, which reads as a layout
      // bug). Sortable is just another class joined alongside.
      const classes = [];
      if (sortable) classes.push('sortable');
      if (c.cellClass) classes.push(c.cellClass);
      const cls = classes.length ? ' class="' + classes.join(' ') + '"' : '';
      // Columns flagged `now` carry a per-row NOW button; the header gets a
      // matching NOW button that captures an unattached, field-typed time
      // into the NOW log (to be matched to a boat later). Shown under the
      // same condition the row buttons are: live race, results not yet locked.
      const nowHead = (c.now && isCurrentRace && !resultsPublished)
        ? ' <button type="button" class="now-btn now-head-btn" data-field="'
          + esc(c.key) + '">NOW</button>'
        : '';
      // c.label may carry literal "<br/>" for multi-line headers — emitted
      // raw, since labels are hard-coded by us. Never use user data here.
      return '<th' + cls + ' data-key="' + myKey + '">' + c.label + marker + nowHead + '</th>';
    }).join('');
    head.querySelectorAll('th.sortable').forEach(th => {
      th.onclick = () => applySortClick(th.dataset.key);
    });
    // Header NOW buttons sit inside sortable <th>s — stop the click bubbling
    // so capturing a time doesn't also re-sort the column.
    head.querySelectorAll('button.now-head-btn').forEach(btn => {
      btn.onclick = (ev) => {
        ev.stopPropagation();
        logNowField(btn.dataset.field);
      };
    });
  }

  // Layered-sort click handling. If the clicked column is already the
  // primary key, flip its direction. Otherwise promote it to primary
  // ascending, keeping any existing sort keys as secondary tiebreakers
  // (with the previously-clicked column dropped from elsewhere in the
  // stack if it was already there — so a column never appears twice).
  // The stable nature of Array.sort then preserves the previous order
  // inside each group of equal primary values.
  function applySortClick(key) {
    if (sortStack.length > 0 && sortStack[0].key === key) {
      sortStack[0] = { key, dir: -sortStack[0].dir };
    } else {
      const filtered = sortStack.filter(s => s.key !== key);
      sortStack = [{ key, dir: 1 }, ...filtered];
      if (sortStack.length > MAX_SORT_DEPTH) sortStack.length = MAX_SORT_DEPTH;
    }
    renderEntrantsHead();
    renderEntrants();
  }

  function renderStatus(status, raceId) {
    const heading = document.getElementById('race-heading');
    document.getElementById('race-status').style.display = '';

    currentStatus = status;
    seriesIdForSave = status ? status.seriesId : null;
    // Refresh derived race-level flags every time the status arrives — they
    // can flip across the page's lifetime (e.g. publishing/unpublishing a race
    // changes the editability gates; an admin changing the race type in SailSys
    // would change isPursuit on next status fetch).
    //
    // Publication-state flags. "Current" is decided from publication state, NOT
    // from resultStatus alone: SailSys only moves resultStatus 0/1 → 2 forward
    // and never resets it, so a race that was processed once and then had its
    // results deleted stays at resultStatus=2 forever. A race is not-current
    // only once it is fully published: entrants published AND results published
    // (resultStatus >= 3, i.e. Provisional or Final — 0/1/2 are all Hidden).
    // startTimesPublished is pursuit's per-boat start-sheet publication.
    entrantsPublished = !!status && (status.raceEntrantVisibility ?? 0) === 1;
    resultsPublished = !!status && (status.resultStatus ?? 0) >= 3;
    startTimesPublished = !!status && (status.handicapAndStartTimeVisibility ?? 0) === 1;
    isCurrentRace = !!status && !(entrantsPublished && resultsPublished);
    isPursuit = computeIsPursuit(status);

    // Heading: "<date> - <race name> - <series name> (id <seriesId>)".
    // The raceId stays in the URL; race state now lives in the status box.
    const parts = [];
    if (status && status.dateTime) parts.push(fmtDate(status.dateTime));
    parts.push((status && status.name) ? status.name : ('Race ' + raceId));
    if (status && status.seriesName) {
      parts.push(status.seriesName + (status.seriesId != null ? ' (id ' + status.seriesId + ')' : ''));
    }
    heading.textContent = parts.join(' - ');

    renderStatusBox();
    renderControls();
    // Status updates can flip isCurrentRace (e.g. publishing entrants +
    // results, or unpublishing them) — keep the NOW-log section in sync.
    updateNowLogSection();
  }

  // Fixed-height status box: readout rows + a reserved message line. Pure
  // readouts (race type, processing status, results source, dirty status) —
  // all controls live in the #workflow panel (renderControls). The message
  // line (#status-msg) is left untouched here so an in-flight operation
  // message / progress bar survives a status re-render.
  function renderStatusBox() {
    const readouts = document.getElementById('status-readouts');
    if (!readouts) return;
    const s = currentStatus;

    // Race type, with a "· MYC TCF" suffix when this race is scored against
    // the handicap definition we manage (the "pursuit-TCF" flavour).
    let raceType = esc(computeRaceTypeLabel(s));
    if (isOurHandicap) raceType += ' <span style="color:#888;font-weight:normal;">· MYC TCF</span>';

    // Processing status — start-time staggering and results recalc, the two
    // SailSys-side processing pipelines the RO waits on.
    const procStatus = s ? (s.handicapAndStartTimeProcessingStatus ?? 0) : 0;
    const startProc = procStatus === 1 ? 'processing' : (procStatus >= 2 ? 'processed' : 'pending');
    const reqCalc = !!(s && s.requiresResultCalculation);
    const procParts = [];
    if (isPursuit) procParts.push('start times ' + startProc);
    procParts.push(reqCalc ? 'results recalc needed' : 'results up to date');
    const processingHtml = esc(procParts.join(' · '));

    const rows = [
      ['Race type', raceType],
      ['Processing', processingHtml],
      ['Results source', resultsSourceCell(), 'results-source-cell'],
      ['Dirty', dirtyStatusHtml(), 'dirty-status-cell']
    ];
    readouts.innerHTML = rows.map(r => {
      const k = r[0], v = r[1], ddId = r[2];
      return '<dt>' + esc(k) + '</dt><dd'
        + (ddId ? ' id="' + ddId + '"' : '') + '>' + v + '</dd>';
    }).join('');
  }

  // The "Dirty" readout: clean, or an enumerated list of why local state
  // diverges from SailSys (so the RO knows what an implicit/explicit SAVE
  // would push, and why a banner/lock is in effect). Includes unsaved Jinx
  // handicap adjustments, which a SAVE now persists alongside everything else.
  function dirtyStatusHtml() {
    const reasons = [];
    if (dirtyTcf.size > 0) reasons.push(dirtyTcf.size + ' TCF edit' + (dirtyTcf.size === 1 ? '' : 's'));
    if (isTimesDirty()) reasons.push('times changed');
    if (isDivisionStartsDirty()) reasons.push('start times / course changed');
    if (dirtyFlags.size > 0) reasons.push('flag overrides');
    // Computed-but-unsaved Jinx adjustments on THIS race (persisted by the
    // Save Handicaps button — see renderControls).
    if (nextStartAdjustments.size > 0 && !nextStartSaved) {
      reasons.push('unsaved handicap adjustments');
    }
    // A divergent local TCF snapshot pending application to SailSys for this
    // race (the next-race TCFs from the previous race's saved handicaps, or a
    // saved manual edit). This explains WHY the displayed TCFs differ from
    // SailSys and what SAVE / RESET will do.
    if (snapshotDivergent()) reasons.push(snapshotReasonText());
    if (reasons.length === 0) {
      return '<span style="color:#155724;">clean</span>';
    }
    return '<span style="color:#856404;font-weight:bold;">'
      + esc(reasons.join(', ')) + '</span>';
  }

  // Human-readable reason for a divergent TCF snapshot, naming the source race
  // for the PROCESS_HANDICAPS case and what SAVE / RESET will do.
  function snapshotReasonText() {
    const m = snapshotMeta || {};
    const admin = (typeof isAdmin === 'function') && isAdmin();
    let why;
    if (m.source === 'PROCESS_HANDICAPS') {
      const srcRace = (m.sourceRaceNumber != null) ? ('race ' + m.sourceRaceNumber)
        : (m.sourceRaceId ? ('race ' + m.sourceRaceId) : 'the previous race');
      why = 'TCFs updated by handicap processing after ' + srcRace;
    } else {
      why = 'TCFs differ from SailSys';
    }
    return why + (admin ? ' — SAVE to apply, RESET to revert' : ' — admin sign-in required to apply');
  }

  function updateDirtyStatus() {
    const dd = document.getElementById('dirty-status-cell');
    if (dd) dd.innerHTML = dirtyStatusHtml();
  }

  // Controls panel: course length + process start times, duty boat selector.
  // The course-length row is for the PRE-RACE start-time computation step;
  // once the race is under way (any boat ticked as came) or its results have
  // been published (Provisional/Final), there's no point re-running it, so
  // it's hidden in those states.
  // The ordered #workflow panel. Controls appear top-to-bottom in the order
  // an RO works a race: publish entrants → (pursuit) set + process + publish
  // start times → process + publish results → process handicaps → duty boat.
  // Each flavour (scratch / pursuit / pursuit-TCF) shows only the steps it
  // needs. Every action button saves dirty edits implicitly first (ensureSaved
  // inside the handlers), so there are no "SAVE first" gates here.
  function renderControls() {
    const panel = document.getElementById('workflow');
    if (!IS_EDITABLE || !currentStatus) {
      panel.style.display = 'none';
      panel.innerHTML = '';
      return;
    }
    const s = currentStatus;
    const admin = (typeof isAdmin === 'function') && isAdmin();
    const procStatus = s.handicapAndStartTimeProcessingStatus ?? 0;
    const processing = procStatus === 1;
    const reqCalc = !!s.requiresResultCalculation;
    const anyCame = Array.from(timesMap.values()).some(t => t && t.came);

    // --- 1. Publish entrants -------------------------------------------------
    // Ticking publishes entrants and (per the confirm dialog) freezes TCF
    // editing. Unticking reverts. Disabled while a start-time processing pass
    // is in flight.
    const entrantsTip = entrantsPublished
      ? 'TCF editing is locked while entrants are published.'
      : 'Publishing locks TCF editing for this race.';
    const entrantsRow = `
      <div class="controls-row">
        <label class="vis-toggle" title="${esc(entrantsTip)}">
          <input type="checkbox" id="pub-entrants"${entrantsPublished ? ' checked' : ''}${processing ? ' disabled' : ''}>
          Entrants published
        </label>
      </div>`;

    // --- 2. Start times (pursuit pre-race group) -----------------------------
    // Calibrate (pursuit-TCF + admin), per-division start + course inputs,
    // Process start times, publish start times. Scratch shows only the
    // per-division allocated-start inputs (no staggering / publish concept).
    const calibrateRow = (admin && isPursuit && isOurHandicap)
      ? `<div class="controls-row">
           <button id="ctrl-calibrate" type="button"
                   title="Discover SailSys's TCF→start-offset formula. Mutates start times briefly, then restores (admin only, ~1-2 min).">Calibrate</button>
         </div>`
      : '';
    // Process start times: pursuit only, until the start sheet is committed
    // (published or a boat marked came). Hidden once start times are published.
    const showProcessRow = isPursuit && !startTimesPublished && !anyCame;
    const processRow = showProcessRow
      ? `<div class="controls-row">
           <button id="ctrl-process" class="primary"${processing ? ' disabled' : ''}
                   title="Stagger the per-boat start sheet from the earliest start + course length above.">
             ${processing ? 'Processing…' : 'Process start times'}</button>
         </div>`
      : '';
    const startPublishTip = startTimesPublished
      ? 'Start times + course lengths are locked while published.'
      : 'Publishing locks the start times + course lengths.';
    const startPublishRow = isPursuit
      ? `<div class="controls-row">
           <label class="vis-toggle" title="${esc(startPublishTip)}">
             <input type="checkbox" id="pub-start-times"${startTimesPublished ? ' checked' : ''}${processing ? ' disabled' : ''}>
             Start times published
           </label>
         </div>`
      : '';
    const startGroup = calibrateRow + divisionStartRowsHtml() + processRow + startPublishRow;

    // --- 3. Process + publish results ----------------------------------------
    // Process Results is always present once there are entrants; greyed when
    // there's nothing to recalc, and removed once results are published.
    const rs = s.resultStatus ?? 0;
    // A pursuit race's results can't be processed until its start times are
    // published — the staggered start sheet has to be committed first. The
    // button is always shown (disabled with a tooltip explaining why) rather
    // than hidden, so the workflow step stays visible.
    const startsNotPublished = isPursuit && !startTimesPublished;
    const processResultsTip = resultsPublished
      ? 'Results are published — unpublish to reprocess.'
      : startsNotPublished
        ? 'Publish the start times before processing results.'
        : !reqCalc
          ? 'No results changes to process.'
          : '';
    const processResultsDisabled = (resultsPublished || !reqCalc || startsNotPublished) ? ' disabled' : '';
    const processResultsBtn =
      `<button id="ctrl-process-results" class="primary"${processResultsDisabled}`
      + (processResultsTip ? ` title="${esc(processResultsTip)}"` : '')
      + `>Process results</button>`;
    const resultsSelTitle = (reqCalc && !resultsPublished) ? ' title="Process results before publishing."' : '';
    let resultsSel = '<select id="results-status-sel"' + (reqCalc ? ' disabled' : '') + resultsSelTitle + '>';
    const curCode = resultStatusUrlCode(rs);
    for (const opt of [[0, 'Hidden'], [1, 'Provisional'], [2, 'Final']]) {
      resultsSel += '<option value="' + opt[0] + '"' + (opt[0] === curCode ? ' selected' : '')
        + '>' + esc(opt[1]) + '</option>';
    }
    resultsSel += '</select>';
    const resultsRow = `
      <div class="controls-row">
        ${processResultsBtn}
        <label>Publish results: ${resultsSel}</label>
      </div>`;

    // --- 4. Process handicaps (pursuit) --------------------------------------
    // Process Handicaps computes the next race's TCF adjustments; Save
    // Handicaps (admin + our-handicap) persists them locally and queues the
    // next race's TCF snapshot. The *application* of those TCFs happens on the
    // next race, through the normal SAVE bar (see snapshotPendingPush).
    const resultsReady = !!s.lastProcessedTime && !reqCalc;
    const haveCalibration = currentCalibration && currentCalibration.v0Knots > 0;
    const procHcDisabled = (!resultsReady || !haveCalibration) ? ' disabled' : '';
    const v0Note = haveCalibration ? ` (V₀ = ${currentCalibration.v0Knots.toFixed(3)} kn)` : '';
    const haveAdjustments = nextStartAdjustments.size > 0;
    const saveHcDisabled = (!haveAdjustments || nextStartSaved) ? ' disabled' : '';
    const saveHcLabel = nextStartSaved ? 'Saved' : 'Save Handicaps';
    const saveHcBtnHtml = (admin && isOurHandicap)
      ? `<button id="ctrl-save-handicaps" type="button"${saveHcDisabled}>${esc(saveHcLabel)}</button>`
      : '';
    const procHcHint = !resultsReady
      ? 'Process results first.'
      : !haveCalibration
        ? 'Calibrate SailSys first — Process Handicaps needs V₀.'
        : (admin && isOurHandicap)
          ? `Compute next-race TCFs from this race's results${v0Note}.`
          : !isOurHandicap
            ? `Compute Jinx adjustments for review only — this series isn't scored against MYC TCF${v0Note}.`
            : `Compute Jinx adjustments for review only — Save requires an admin login${v0Note}.`;
    const handicapsRow = isPursuit
      ? `<div class="controls-row" title="${esc(procHcHint)}">
           <button id="ctrl-handicaps" class="primary" type="button"${procHcDisabled}>Process Handicaps</button>
           ${saveHcBtnHtml}
         </div>`
      : '';

    // --- 5. Duty boat --------------------------------------------------------
    const dutyOptions = ['<option value="">(none)</option>']
      .concat(entrantData.map(e => {
        const id = e.boat && e.boat.id;
        const sail = e.boat && e.boat.sailNumber || '';
        const name = e.boat && e.boat.name || '';
        return '<option value="' + esc(id) + '"' + (String(dutyBoatId) === String(id) ? ' selected' : '') + '>'
          + esc(sail + (name ? ' ' + name : '')) + '</option>';
      }));
    const dutyRow = `
      <div class="controls-row">
        <label>Duty boat: <select id="ctrl-duty-boat">${dutyOptions.join('')}</select></label>
      </div>`;

    panel.style.display = '';
    panel.innerHTML = entrantsRow + startGroup + resultsRow + handicapsRow + dutyRow;

    // Wire division start/course inputs (when editable) and the buttons.
    wireDivisionStartInputs();
    const pubEnt = document.getElementById('pub-entrants');
    if (pubEnt) pubEnt.onchange = onTogglePublishEntrants;
    const pubStart = document.getElementById('pub-start-times');
    if (pubStart) pubStart.onchange = () => doVisibility('start-times-visibility', pubStart.checked);
    const procBtn = document.getElementById('ctrl-process');
    if (procBtn) procBtn.onclick = doProcess;
    const calBtn = document.getElementById('ctrl-calibrate');
    if (calBtn) calBtn.onclick = doCalibrate;
    const prBtn = document.getElementById('ctrl-process-results');
    if (prBtn) prBtn.onclick = doProcessResults;
    const rsSel = document.getElementById('results-status-sel');
    if (rsSel) rsSel.onchange = () => doSetResultsStatus(Number(rsSel.value));
    const hcBtn = document.getElementById('ctrl-handicaps');
    if (hcBtn) hcBtn.onclick = doProcessHandicaps;
    const saveHcBtn = document.getElementById('ctrl-save-handicaps');
    if (saveHcBtn) saveHcBtn.onclick = doSaveHandicaps;
    document.getElementById('ctrl-duty-boat').onchange = () => {
      const sel = document.getElementById('ctrl-duty-boat');
      const val = sel.value;
      dutyBoatId = val ? String(val) : null;
      // Duty boats are flagged AVG; their captured times don't count. Clear
      // came + start + finish so the row tells the truth even if the user had
      // already filled them in. (Persists on next SAVE alongside dutyBoatId.)
      if (dutyBoatId) {
        const t = getTimes(dutyBoatId);
        if (t) { t.came = false; t.actualStart = null; t.finish = null; }
      }
      renderEntrantsHead();
      renderEntrants();
      updateSaveBar();
      sessionSaveForm();
    };
  }

  // Publish-entrants toggle handler. Ticking pops a confirm warning that TCFs
  // shouldn't change once published (then publishes on OK, reverts on Cancel);
  // unticking reverts immediately with no prompt. The publish/unpublish itself
  // goes through doVisibility, whose re-render re-evaluates the TCF read-only
  // gate (entrantsPublished).
  async function onTogglePublishEntrants(ev) {
    const cb = ev.target;
    if (cb.checked) {
      const ok = confirm('Publishing entrants locks TCF editing for this race — '
        + 'TCFs should not be changed once published. Publish now?');
      if (!ok) { cb.checked = false; return; }
      await doVisibility('entrants-visibility', true);
    } else {
      await doVisibility('entrants-visibility', false);
    }
  }

  // Per-division start (and, for pursuit, course length) inputs for the
  // workflow panel. Editable HH:MM start that defaults to SailSys's current
  // divisionTiming start (allocated gun for scratch, earliest start for
  // pursuit). Rendered read-only once start times are published. The NOW
  // button captures the gun for a scratch start during live timing only.
  function divisionStartRowsHtml() {
    const s = currentStatus;
    if (!s || !Array.isArray(s.divisionTiming)) return '';
    const locked = startTimesPublished;
    let html = '';
    for (const d of s.divisionTiming) {
      if (!d || d.divisionId == null) continue;
      const divId = d.divisionId;
      const name = d.divisionName || ('Div ' + divId);
      const sched = divisionScheduledStart(divId) || '';
      const start = (divisionStartsMap.get(String(divId)) || sched || '');
      const schedCourse = divisionScheduledCourse(divId);
      const course = divisionCourseMap.has(String(divId))
        ? divisionCourseMap.get(String(divId))
        : (schedCourse != null ? schedCourse : '');
      let cell;
      if (locked) {
        cell = '<strong>' + esc(start || '—') + '</strong>'
          + (isPursuit ? ' <span style="color:#555;">course ' + esc(course === '' ? '—' : course) + ' nm</span>' : '');
      } else {
        const startDirty = (divisionStartsMap.has(String(divId))
          && !timeStringsEqual(divisionStartsMap.get(String(divId)), sched)) ? ' dirty' : '';
        const nowBtn = (!isPursuit && isCurrentRace)
          ? ('<button type="button" class="now-btn div-now-btn" data-div-id="' + esc(divId) + '">NOW</button>')
          : '';
        cell = '<span style="color:#666; margin-right:0.4rem;">sched ' + esc(sched || '—') + '</span>'
          + '<input type="text" class="time-input division-start' + startDirty + '"'
          + ' placeholder="HH:MM" data-div-id="' + esc(divId) + '"'
          + ' value="' + esc(start) + '">'
          + (nowBtn ? ' ' + nowBtn : '');
        if (isPursuit) {
          const courseDirty = (divisionCourseMap.has(String(divId))
            && divisionCourseMap.get(String(divId)) !== schedCourse) ? ' dirty' : '';
          cell += '<label style="margin-left:0.8rem; color:#555;">course '
            + '<input type="number" step="0.1" min="0" class="division-course' + courseDirty + '"'
            + ' data-div-id="' + esc(divId) + '" style="width:5em;"'
            + ' value="' + esc(course) + '"> nm</label>';
        }
      }
      html += '<div class="controls-row"><label style="min-width:8em; color:#555;">'
        + esc(name) + ' start</label>' + cell + '</div>';
    }
    return html;
  }

  function divisionBoatIds(divisionId) {
    return entrantData
      .filter(e => e && e.division && String(e.division.id) === String(divisionId))
      .map(e => String(e.boat && e.boat.id));
  }

  // After a per-division actualStart change, refresh the Elapsed/Late/Flags
  // cells for every boat in that division. Reuses the same per-cell helpers
  // the per-boat time inputs trigger.
  function refreshDivisionRows(divisionId) {
    for (const id of divisionBoatIds(divisionId)) {
      const tr = document.querySelector('#entrants-tbody tr[data-boat-id="' + id + '"]');
      if (!tr) continue;
      updateElapsedCell(tr, id);
      updateFlagsCell(tr, id);
    }
  }

  // Bump a typed time value by one minute or one second, depending on the
  // structure of the typed input. The granularity is decided purely by how
  // many colons the user has typed — not by whether the time happens to
  // parse cleanly:
  //   "HH:MM"     →  minute mode (one colon, no trailing colon)
  //   "HH:MM:"    →  SECOND mode, treated as "HH:MM:00"
  //   "HH:MM:S"   →  second mode, treated as "HH:MM:0S"
  //   "HH:MM:SS"  →  second mode
  // The trailing-colon and short-second cases are common while the user is
  // mid-type (e.g. just hit ':' to start the seconds segment); the previous
  // rule mis-classified them as minute mode.
  // Wraps modulo 24 h so the bumped value never goes negative or overflows.
  function bumpTimeValue(raw, sign) {
    if (!raw) return null;
    const colonCount = (raw.match(/:/g) || []).length;
    if (colonCount < 1) return null;
    const dayS = 86400;
    const pad = (n) => String(n).padStart(2, '0');
    if (colonCount === 1) {
      const m = raw.match(/^(\d{1,2}):(\d{1,2})$/);
      if (!m) return null;
      const total = (Number(m[1]) * 60 + Number(m[2])) * 60;
      const next = (((total + sign * 60) % dayS) + dayS) % dayS;
      return pad(Math.floor(next / 3600)) + ':' + pad(Math.floor((next % 3600) / 60));
    }
    // Two or more colons → seconds mode. Tolerate an empty seconds segment
    // ("HH:MM:" — assume :00), a single-digit seconds segment ("HH:MM:S"
    // — pad to :0S), or the standard "HH:MM:SS" with an optional ".sss"
    // suffix.
    const m = raw.match(/^(\d{1,2}):(\d{1,2}):(\d{0,2})(?:\.\d{1,3})?$/);
    if (!m) return null;
    const ssRaw = m[3] || '';
    const ss = ssRaw === '' ? 0 : Number(ssRaw.length === 1 ? '0' + ssRaw : ssRaw);
    const total = (Number(m[1]) * 60 + Number(m[2])) * 60 + ss;
    const next = (((total + sign) % dayS) + dayS) % dayS;
    return fmtElapsed(next);
  }

  // Time strings are considered equal if their parsed seconds-since-midnight
  // match. Handles "HH:MM:SS" vs "HH:MM:SS.000" vs "H:MM" etc. Used for
  // dirty detection where the same gun time can be expressed multiple ways.
  function timeStringsEqual(a, b) {
    const aEmpty = !a;
    const bEmpty = !b;
    if (aEmpty && bEmpty) return true;
    if (aEmpty || bEmpty) return false;
    const pa = parseTime(reformatTime(a) || a);
    const pb = parseTime(reformatTime(b) || b);
    if (pa == null || pb == null) return a === b;
    return pa === pb;
  }

  function wireDivisionStartInputs() {
    document.querySelectorAll('input.division-start').forEach(inp => {
      inp.onkeydown = (ev) => {
        const k = ev.key;
        // Enter commits the value by blurring — onblur runs reformatHHMM
        // (H:M → HH:MM, seconds dropped), then refreshes the dependent cells.
        if (k === 'Enter') {
          ev.preventDefault();
          try { inp.blur(); } catch (_) {}
          return;
        }
        // + (and = on the same physical key) and ArrowUp bump up; - and
        // ArrowDown bump down. Both arrow keys do nothing useful inside a
        // single-line text input anyway, so it's safe to repurpose them.
        const isPlus = (k === '+' || k === '=' || k === 'ArrowUp');
        const isMinus = (k === '-' || k === 'ArrowDown');
        if (!isPlus && !isMinus) return;
        // Minute-granularity inputs — bump by a minute. bumpTimeValue does
        // minute mode on a single-colon value.
        const next = bumpTimeValue(inp.value, isPlus ? 1 : -1);
        if (next == null) return;
        ev.preventDefault();
        inp.value = next;
        try { inp.setSelectionRange(next.length, next.length); } catch (_) {}
        inp.dispatchEvent(new Event('input'));
      };
      inp.oninput = () => {
        const divId = inp.dataset.divId;
        // Track every keystroke — the dirty check compares against the
        // SailSys-current scheduled value (timeStringsEqual), so reverting
        // back to scheduled correctly de-dirties without us having to
        // delete entries here.
        divisionStartsMap.set(String(divId), inp.value || null);
        refreshDivisionRows(divId);
        if (!inp.value) inp.classList.remove('invalid');
        else if (reformatHHMM(inp.value)) inp.classList.remove('invalid');
        else inp.classList.add('invalid');
        updateSaveBar();
        sessionSaveForm();
      };
      inp.onblur = () => {
        const divId = inp.dataset.divId;
        const canon = reformatHHMM(inp.value);
        const sched = divisionScheduledStart(Number(divId));
        if (canon) {
          inp.value = canon;
          // Once normalized, if the typed value equals scheduled we drop
          // the entry so divisionStartsMap holds only real edits.
          if (timeStringsEqual(canon, sched)) {
            divisionStartsMap.delete(String(divId));
          } else {
            divisionStartsMap.set(String(divId), canon);
          }
          inp.classList.remove('invalid');
        } else if (inp.value) {
          inp.classList.add('invalid');
        } else {
          // User cleared the input — empty == no override, treat as not edited.
          divisionStartsMap.delete(String(divId));
        }
        // Update the dirty marker on the input itself.
        const stillDirty = divisionStartsMap.has(String(divId))
          && !timeStringsEqual(divisionStartsMap.get(String(divId)), sched);
        inp.classList.toggle('dirty', !!stillDirty);
        refreshDivisionRows(divId);
        updateSaveBar();
        sessionSaveForm();
      };
    });
    // Per-division course-length inputs (pursuit only).
    document.querySelectorAll('input.division-course').forEach(inp => {
      const commit = () => {
        const divId = inp.dataset.divId;
        const sched = divisionScheduledCourse(Number(divId));
        const raw = inp.value.trim();
        if (raw === '') {
          divisionCourseMap.delete(String(divId));
          inp.classList.remove('invalid', 'dirty');
        } else {
          const n = Number(raw);
          if (!Number.isFinite(n) || n < 0) {
            inp.classList.add('invalid');
          } else {
            inp.classList.remove('invalid');
            if (n === sched) divisionCourseMap.delete(String(divId));
            else divisionCourseMap.set(String(divId), n);
            inp.classList.toggle('dirty', n !== sched);
          }
        }
        updateSaveBar();
        sessionSaveForm();
      };
      inp.oninput = commit;
      inp.onchange = commit;
    });
    document.querySelectorAll('button.div-now-btn').forEach(btn => {
      btn.onclick = () => {
        const divId = btn.dataset.divId;
        // Division start is minute-granularity — capture the current minute.
        const now = reformatHHMM(localNow());
        divisionStartsMap.set(String(divId), now);
        const inp = document.querySelector('input.division-start[data-div-id="' + divId + '"]');
        if (inp) {
          inp.value = now;
          inp.classList.remove('invalid');
          inp.classList.add('dirty');
        }
        refreshDivisionRows(divId);
        updateSaveBar();
        sessionSaveForm();
        // Log the NOW click in the session log with a div tag so the RO can
        // see it among the per-boat NOW captures.
        nowLog.push({ time: now, field: 'divStart-' + divId });
        renderNowLog();
        sessionSaveNowLog();
      };
    });
  }

  // True when any per-division start time OR (pursuit) course length differs
  // from SailSys's current divisionTiming value. Applies to both race types —
  // the start time is the allocated/earliest start, and the course length is
  // pursuit-only.
  function isDivisionStartsDirty() {
    for (const [divIdStr, val] of divisionStartsMap) {
      if (!val) continue;
      const sched = divisionScheduledStart(Number(divIdStr));
      if (!timeStringsEqual(val, sched)) return true;
    }
    for (const [divIdStr, val] of divisionCourseMap) {
      const sched = divisionScheduledCourse(Number(divIdStr));
      if (val !== sched) return true;
    }
    return false;
  }

  // Operation feedback line, inside the fixed-height status box. We never
  // toggle display (that would collapse the reserved height and make the
  // layout jump); empty text just clears the colour class.
  function ctrlMsg(cls, text) {
    const el = document.getElementById('status-msg');
    if (!el) return;
    el.className = text ? ('status-msg-text ' + cls) : 'status-msg-text';
    el.textContent = text || '';
  }

  // Like ctrlMsg but accepts trusted HTML — used for the long-running
  // Process Results progress display. Callers must hand-escape any
  // user-supplied content; here it's all hard-coded strings + numbers.
  function ctrlMsgHtml(cls, html) {
    const el = document.getElementById('status-msg');
    if (!el) return;
    el.className = 'status-msg-text ' + cls;
    el.innerHTML = html;
  }

  // Mismatch banner — shows above the entrants table when the local TCF
  // snapshot diverges from SailSys and this race is the earliest unprocessed
  // one in the series. Two buttons: Push (POST /push-handicaps + reload) and
  // Reset (DELETE /tcf-snapshot + reload). Hidden when snapshot matches or
  // when we're not on the gating race.
  function snapshotDiffersFromSailsys() {
    // Iterate the snapshot only — it represents "what we want SailSys to
    // have for these boats". Boats present in sailsysTcf but absent from
    // the snapshot are either DNC for the source race (PROCESS_HANDICAPS
    // skips them) or unrelated entries; either way the snapshot makes no
    // claim about them, so they must NOT count as a divergence (otherwise
    // the banner sticks forever after a successful push). A snapshot boat
    // that no longer appears in this race's sailsys entrants is also
    // skipped — we can't push a TCF for a boat that isn't entered.
    for (const [id, snapVal] of snapshotTcf) {
      const sailVal = sailsysTcf.get(id);
      if (sailVal == null) continue;
      if (Math.abs(snapVal - sailVal) > 1e-6) return true;
    }
    return false;
  }

  // A divergent local TCF snapshot is no longer surfaced as its own banner —
  // it's integrated into the normal flow: the status-box Dirty readout
  // explains why the TCFs differ (snapshotReasonText), and the SAVE/RESET bar
  // applies (doSave → /push-handicaps) or reverts (doReset → delete snapshot)
  // it. This refresh keeps the (now hidden) legacy banner element clear and
  // re-evaluates the SAVE bar after a TCF save changes the snapshot state.
  function renderTcfMismatchBanner() {
    const el = document.getElementById('tcf-mismatch-banner');
    if (el) { el.style.display = 'none'; el.innerHTML = ''; }
    updateSaveBar();
  }

  async function doVisibility(endpoint, published) {
    if (!(await ensureSaved())) return;
    setControlsDisabled(true);
    ctrlMsg('banner-info', (published ? 'Publishing' : 'Unpublishing') + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/' + endpoint,
      { published });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    renderStatus(r.body.status, raceIdGlobal);
    // Publication state gates input editability (TCF on entrants-publish,
    // finish/flags on results-publish) — re-render the entrants table so the
    // inputs flip between editable and read-only.
    renderEntrants();
    ctrlMsg('banner-ok', (published ? 'Published.' : 'Unpublished.'));
  }

  async function doSetResultsStatus(code) {
    if (!(await ensureSaved())) return;
    setControlsDisabled(true);
    const label = ['Hidden', 'Provisional', 'Final'][code] || ('code=' + code);
    ctrlMsg('banner-info', 'Setting results status to ' + label + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/results-status',
      { status: code });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    renderStatus(r.body.status, raceIdGlobal);
    // Results-publish gates finish / flag / came / actualStart editability —
    // re-render so those inputs flip between editable and read-only.
    renderEntrants();
    ctrlMsg('banner-ok', 'Results status set to ' + label + '.');
  }

  async function doProcessResults() {
    if (!(await ensureSaved())) return;
    setControlsDisabled(true);
    // The server holds the request open while polling SailSys for up to 90s.
    // Drive a visible elapsed-time / progress bar so the RO can see the page
    // is alive and roughly how close to timeout we are.
    const startMs = Date.now();
    const TIMEOUT_S = 90;
    const tick = setInterval(() => {
      const elapsed = (Date.now() - startMs) / 1000;
      const secs = Math.floor(elapsed);
      const pct = Math.min(100, Math.round((elapsed / TIMEOUT_S) * 100));
      const bar = '<div class="progress"><div class="progress-bar" style="width:' + pct + '%"></div></div>';
      const dot = '⏳'.repeat(((secs % 3) + 1));
      ctrlMsgHtml('banner-info',
        '<strong>' + dot + ' Processing results in SailSys…</strong> '
        + '<span style="color:#555;">' + secs + 's / ' + TIMEOUT_S + 's</span>' + bar);
    }, 500);
    try {
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process-results', {});
      clearInterval(tick);
      if (!r.ok) {
        ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        setControlsDisabled(false);
        return;
      }
      if (r.body && r.body.error) {
        // Timed out; render whatever status came back so the user can retry.
        renderStatus(r.body.status, raceIdGlobal);
        ctrlMsg('banner-warn', r.body.error);
        return;
      }
      sailsysResults = parseSailsysResults(r.body.results);
      renderStatus(r.body.status, raceIdGlobal);
      renderEntrants();
      const took = Math.round((Date.now() - startMs) / 100) / 10;
      ctrlMsg('banner-ok', 'Results processed in ' + took + 's.');
    } finally {
      clearInterval(tick);
    }
  }

  // Admin calibration probe: round-trip SailSys with a known
  // Process Handicaps — POSTs the current per-boat snapshot to the Jinx
  // engine and renders the returned Adjustment list into the Next Start
  // column. No persistence here: the values live in nextStartAdjustments and
  // register as a pending edit until a SAVE flushes them (saveHandicaps, via
  // doSave).
  async function doProcessHandicaps() {
    if (!entrantData || entrantData.length === 0) {
      ctrlMsg('banner-warn', 'No entrants loaded yet.');
      return;
    }
    if (!(await ensureSaved())) return;
    // Make sure placeMap reflects the current entrant state — doProcessHandicaps
    // can be triggered before any render pass has called recomputePlaces (e.g.,
    // immediately after loading a SailSys-authoritative race).
    recomputePlaces();
    // Build the boat snapshot. Boats with no usable TCF or no finish
    // status get DNC (engine excludes them with frozen TCF). For FIN
    // boats we also send finishPosition: in SailSys mode, the place under
    // the selected handicap; in local mode, the placeMap result (also
    // driven by the selected handicap).
    const boats = entrantData.map(e => {
      const id = e.boat && e.boat.id;
      const tcf = currentTcf(e);
      const status = jinxStatusForEntrant(e);
      const out = { boatId: String(id), currentTcf: (isNaN(tcf) ? 1.0 : tcf), status };
      if (status === 'FIN') {
        const mins = elapsedMinutesForEntrant(e);
        if (mins != null) out.elapsedMinutes = mins;
        const idStr = String(id);
        let pos = null;
        if (isResultsClean()) {
          const r = sailsysResults[idStr];
          const bh = r && r.byHandicap
            && r.byHandicap[String(selectedHandicap)];
          if (bh && bh.place != null) pos = bh.place;
        }
        if (pos == null) pos = placeMap.get(idStr);
        if (pos != null) out.finishPosition = pos;
      }
      return out;
    });
    // Default t_target_elapsed to the median actual elapsed time of
    // finishers (rounded to a whole minute). Empty fleet falls back to
    // the algorithm config's idealRaceLength (server-side default).
    const finElapsed = boats
      .filter(b => b.status === 'FIN' && typeof b.elapsedMinutes === 'number')
      .map(b => b.elapsedMinutes)
      .sort((a, b) => a - b);
    let targetElapsedMinutes = null;
    if (finElapsed.length) {
      const mid = Math.floor(finElapsed.length / 2);
      const med = (finElapsed.length & 1) === 1
        ? finElapsed[mid]
        : (finElapsed[mid - 1] + finElapsed[mid]) / 2.0;
      targetElapsedMinutes = Math.max(1, Math.round(med));
    }
    const payload = {
      seriesId: seriesIdForSave ? String(seriesIdForSave) : null,
      boats
    };
    if (targetElapsedMinutes != null) payload.targetElapsedMinutes = targetElapsedMinutes;

    setControlsDisabled(true);
    ctrlMsg('banner-info', 'Computing Jinx adjustments…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process-handicaps', payload);
    setControlsDisabled(false);
    if (!r.ok) {
      ctrlMsg('banner-err', 'Process Handicaps failed: '
        + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      return;
    }
    const list = (r.body && Array.isArray(r.body.adjustments)) ? r.body.adjustments : [];
    nextStartAdjustments = new Map(list.map(a => [String(a.boatId), a]));
    nextStartSaved = false;
    renderEntrantsHead();
    renderEntrants();
    renderControls();
    const ideal = r.body.config && r.body.config.idealRaceLength;
    const tMsg = (r.body.targetElapsedMinutes && ideal)
      ? (' (mean elapsed ' + r.body.targetElapsedMinutes + ' min vs ideal ' + ideal + ' min)')
      : (r.body.targetElapsedMinutes
          ? (' (mean elapsed ' + r.body.targetElapsedMinutes + ' min)')
          : '');
    ctrlMsg('banner-ok',
      'Computed ' + list.length + ' handicap adjustment' + (list.length === 1 ? '' : 's')
      + tMsg + '. Hover the [Adjustment] column for the breakdown. '
      + 'Press [Save Handicaps] to persist locally.');
  }

  // Save Handicaps — persist the currently-displayed adjustments locally AND
  // write the next race's TCF snapshot (server-side) from Adjustment.newTcf.
  // The application to SailSys happens on the NEXT race, where the snapshot
  // diverges from SailSys and surfaces through the normal SAVE bar (see
  // snapshotPendingPush / doSave). seriesId is required so the server can
  // locate race N+1 in this series.
  async function doSaveHandicaps() {
    if (nextStartAdjustments.size === 0) {
      ctrlMsg('banner-warn', 'Nothing to save — run Process Handicaps first.');
      return;
    }
    if (!(await ensureSaved())) return;
    const adjustments = Array.from(nextStartAdjustments.values());
    setControlsDisabled(true);
    ctrlMsg('banner-info', 'Saving ' + adjustments.length + ' handicap adjustment'
      + (adjustments.length === 1 ? '' : 's') + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/save-handicaps',
      { adjustments, seriesId: seriesIdForSave });
    setControlsDisabled(false);
    if (!r.ok) {
      ctrlMsg('banner-err', 'Save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      return;
    }
    nextStartSaved = true;
    renderControls();
    const nextRaceMsg = (r.body && r.body.nextRaceId)
      ? (' Next-race TCFs queued for race ' + r.body.nextRaceId + ' — open that race and SAVE to apply.')
      : (r.body && r.body.nextRaceSnapshotError
          ? (' (Could not queue next-race TCFs: ' + r.body.nextRaceSnapshotError + ')')
          : '');
    ctrlMsg('banner-ok', 'Saved ' + adjustments.length + ' handicap adjustment'
      + (adjustments.length === 1 ? '' : 's') + ' locally.' + nextRaceMsg);
  }

  // (courseLength=100nm, startTime=10:00) and read back the per-boat
  // staggered starts. The server hides start times + entries during the
  // run and restores them on the way out. Up to 5 minutes; in practice
  // around 1-2 minutes.
  async function doCalibrate() {
    if (!confirm(
      'Calibrate SailSys\'s TCF → start-offset formula?\n\n'
      + 'This only needs to be done occasionally. The race\'s start times '
      + 'and entrants list will be briefly hidden, course length set to '
      + '100 nm, every division started at 10:00:00, and SailSys re-run. '
      + 'Original values are restored at the end. May take up to 5 minutes.'))
      return;
    if (!(await ensureSaved())) return;
    setControlsDisabled(true);
    const startMs = Date.now();
    const TIMEOUT_S = 300;
    const tick = setInterval(() => {
      const elapsed = (Date.now() - startMs) / 1000;
      const secs = Math.floor(elapsed);
      const pct = Math.min(100, Math.round((elapsed / TIMEOUT_S) * 100));
      const bar = '<div class="progress"><div class="progress-bar" style="width:' + pct + '%"></div></div>';
      ctrlMsgHtml('banner-info',
        '<strong>Calibrating SailSys…</strong> '
        + '<span style="color:#555;">' + secs + 's elapsed</span>' + bar);
    }, 500);
    try {
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/calibrate', {});
      clearInterval(tick);
      if (!r.ok) {
        ctrlMsg('banner-err', 'Calibration failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        setControlsDisabled(false);
        return;
      }
      renderCalibration(r.body && r.body.calibration);
      // Refetch entrants — their startTimeLocal values were restored but
      // re-render keeps the table in sync with whatever SailSys settled on.
      await loadEntrants();
    } finally {
      clearInterval(tick);
      setControlsDisabled(false);
    }
  }

  function renderCalibration(cal) {
    if (!cal) {
      ctrlMsg('banner-warn', 'Calibration completed but returned no data.');
      return;
    }
    const d = cal.derivation;
    if (!d || typeof d.v0Knots !== 'number') {
      // Derivation failed — fall back to the raw per-boat table so the user
      // can see what SailSys actually returned (offsets all 0, only one
      // boat with a valid offset, no entrants, etc.). Better than a
      // dead-end warning.
      renderCalibrationFallback(cal,
        'Could not derive V₀ from this probe. Showing raw per-boat data — '
        + 'check whether SailSys actually staggered the starts.');
      return;
    }
    const dt = d.deltaSeconds;
    const dtH = (dt / 3600).toFixed(4);
    const dtHMS = Math.floor(dt / 3600) + 'h '
      + String(Math.floor((dt % 3600) / 60)).padStart(2, '0') + 'm '
      + String(dt % 60).padStart(2, '0') + 's';
    const courseStr = (typeof d.courseLengthNm === 'number')
      ? d.courseLengthNm.toFixed(0) : esc(d.courseLengthNm);
    const slowestStr = d.slowestTcf.toFixed(4);
    const fastestStr = d.fastestTcf.toFixed(4);
    const recipDiff = (1 / d.slowestTcf - 1 / d.fastestTcf);
    const v0Str = d.v0Knots.toFixed(3);

    // The Save button stashes the data attribute and the handler reads from
    // it — simpler than capturing in a closure across the innerHTML
    // assignment.
    const payload = {
      v0Knots: d.v0Knots,
      courseLengthNm: d.courseLengthNm,
      slowestTcf: d.slowestTcf,
      slowestStartOffsetSeconds: d.slowestStartOffsetSeconds,
      fastestTcf: d.fastestTcf,
      fastestStartOffsetSeconds: d.fastestStartOffsetSeconds
    };

    const html = ''
      + '<strong>Calibration complete</strong> &mdash; original timing restored.'
      + '<div style="margin-top:0.5rem;font-family:monospace;white-space:pre;">'
      +   'course D       = ' + esc(courseStr) + ' nm\n'
      +   'fastest TCF    = ' + esc(fastestStr) + '\n'
      +   'slowest TCF    = ' + esc(slowestStr) + '\n'
      +   'Δt (fast−slow) = ' + esc(dtHMS) + '  (= ' + esc(dtH) + ' h)\n'
      +   '\n'
      +   'V₀ = D / Δt × (1/TCF_slow − 1/TCF_fast)\n'
      +   '   = ' + esc(courseStr) + ' / ' + esc(dtH)
              + ' × (' + (1 / d.slowestTcf).toFixed(4)
              + ' − ' + (1 / d.fastestTcf).toFixed(4) + ')\n'
      +   '   = ' + esc(courseStr) + ' / ' + esc(dtH)
              + ' × ' + recipDiff.toFixed(4) + '\n'
      +   '   = <strong>' + esc(v0Str) + ' kn</strong>'
      + '</div>'
      + '<div style="margin-top:0.6rem;">'
      +   '<button id="ctrl-save-calibration" class="primary" type="button">Save calibration</button> '
      +   '<button id="ctrl-cancel-calibration" type="button">Dismiss</button>'
      + '</div>';
    ctrlMsgHtml('banner-ok', html);

    const saveBtn = document.getElementById('ctrl-save-calibration');
    if (saveBtn) saveBtn.onclick = () => doSaveCalibration(payload);
    const cancelBtn = document.getElementById('ctrl-cancel-calibration');
    if (cancelBtn) cancelBtn.onclick = () => ctrlMsg('', '');
  }

  // Fallback path: render the per-boat per-division table so a failed V₀
  // derivation isn't a dead end — the admin can read the offsets and
  // diagnose why (all zero, single boat, etc.).
  function renderCalibrationFallback(cal, banner) {
    const parts = [];
    parts.push('<strong>' + esc(banner) + '</strong>');
    const divisions = Array.isArray(cal.divisions) ? cal.divisions : [];
    if (divisions.length === 0) {
      parts.push('<div style="margin-top:0.4rem;color:#555;">'
        + '(SailSys returned no division data.)</div>');
    }
    for (const div of divisions) {
      parts.push('<div style="margin-top:0.6rem;"><u>'
