        const id = e.boat && e.boat.id;
        const sail = e.boat && e.boat.sailNumber || '';
        const name = e.boat && e.boat.name || '';
        return '<option value="' + esc(id) + '"' + (String(dutyBoatId) === String(id) ? ' selected' : '') + '>'
          + esc(sail + (name ? ' ' + name : '')) + '</option>';
      }));

    // Process Handicaps — back-calculate next-race TCFs from this race's
    // results via the Jinx algorithm. The result lands in the Next Start
    // column of the entrants table and is held locally; the admin SAVE
    // button persists it to disk. Pushing back to SailSys is a separate
    // step (not yet implemented). Race-officer accounts see a note
    // directing them to an admin. Only shown once SailSys has finished
    // its own result processing — there's nothing to back-calculate from
    // before then. Also gated on isOurHandicap: when the series uses a
    // different default handicap, this app has no business computing
    // replacements for it.
    const admin = (typeof isAdmin === 'function') && isAdmin();
    const resultsReady = !!s.lastProcessedTime && !s.requiresResultCalculation;
    const haveAdjustments = nextStartAdjustments.size > 0;
    const saveDisabled = (!haveAdjustments || nextStartSaved) ? ' disabled' : '';
    const saveLabel = nextStartSaved ? 'Saved' : 'Save Handicaps';
    // Gate Process Handicaps on a saved calibration: the engine projects
    // TCFs using V₀, so without a calibration we have nothing to compute
    // with. Surface that explicitly rather than silently producing wrong
    // TCFs.
    const haveCalibration = currentCalibration && currentCalibration.v0Knots > 0;
    const procDisabled = haveCalibration ? '' : ' disabled';
    const procHint = haveCalibration
      ? `Compute next-race TCFs from this race's results (V₀ = ${currentCalibration.v0Knots.toFixed(3)} kn).`
      : 'Calibrate SailSys first — Process Handicaps needs V₀.';
    const handicapsHtml = (resultsReady && isOurHandicap)
      ? (admin
          ? `<div class="controls-row">
               <button id="ctrl-handicaps" class="primary" type="button"${procDisabled}>Process Handicaps</button>
               <button id="ctrl-save-handicaps" type="button"${saveDisabled}>${esc(saveLabel)}</button>
               <span style="color:#888;">${esc(procHint)}</span>
             </div>`
          : `<div class="controls-row">
               <span style="color:#555;">Next-race handicaps need to be processed by an admin user.</span>
             </div>`)
      : '';

    // Calibrate — admin probe to discover how SailSys converts (courseLength,
    // TCF) into per-boat start-time offsets. Pursuit + our-handicap only:
    // for non-pursuit races SailSys doesn't stagger, and for other-handicap
    // series we have no use for the formula. Runs in the background and
    // refreshes the page state when done.
    const calibrateHtml = (admin && isPursuit && isOurHandicap)
      ? `<div class="controls-row">
           <button id="ctrl-calibrate" type="button"
                   title="Probe SailSys's TCF → start-offset formula (admin only, ~1-2 min)">
             Calibrate
           </button>
           <span style="color:#888;">Discover SailSys's TCF→start-offset formula. Mutates start times briefly, then restores.</span>
         </div>`
      : '';

    panel.style.display = '';
    panel.innerHTML = (showCourseRow ? `
      <div class="controls-row">
        <label>Course length:
          <input type="number" id="ctrl-course" step="0.1" min="0"
                 value="${esc(currentCourse)}" style="width: 5em;">
        </label>
        <button id="ctrl-process" class="primary" ${processing ? 'disabled' : ''}>
          ${processing ? 'Processing…' : 'Process start times'}
        </button>
      </div>` : '') + `
      <div class="controls-row">
        <label>Duty boat:
          <select id="ctrl-duty-boat">` + dutyOptions.join('') + `</select>
        </label>
      </div>` + handicapsHtml + calibrateHtml;
    const procBtn = document.getElementById('ctrl-process');
    if (procBtn) procBtn.onclick = doProcess;
    const calBtn = document.getElementById('ctrl-calibrate');
    if (calBtn) calBtn.onclick = doCalibrate;
    const hcBtn = document.getElementById('ctrl-handicaps');
    if (hcBtn) hcBtn.onclick = doProcessHandicaps;
    const saveHcBtn = document.getElementById('ctrl-save-handicaps');
    if (saveHcBtn) saveHcBtn.onclick = doSaveHandicaps;
    document.getElementById('ctrl-duty-boat').onchange = () => {
      const sel = document.getElementById('ctrl-duty-boat');
      const val = sel.value;
      dutyBoatId = val ? String(val) : null;
      // Duty boats are flagged AVG; their captured times don't count. Clear
      // came + start + finish so the row tells the truth even if the user had
      // already filled them in. (Persists on next SAVE alongside dutyBoatId.)
      if (dutyBoatId) {
        const t = getTimes(dutyBoatId);
        if (t) { t.came = false; t.actualStart = null; t.finish = null; }
      }
      renderEntrantsHead();
      renderEntrants();
      updateSaveBar();
      sessionSaveForm();
    };
  }

  function divisionBoatIds(divisionId) {
    return entrantData
      .filter(e => e && e.division && String(e.division.id) === String(divisionId))
      .map(e => String(e.boat && e.boat.id));
  }

  // After a per-division actualStart change, refresh the Elapsed/Late/Flags
  // cells for every boat in that division. Reuses the same per-cell helpers
  // the per-boat time inputs trigger.
  function refreshDivisionRows(divisionId) {
    for (const id of divisionBoatIds(divisionId)) {
      const tr = document.querySelector('#entrants-tbody tr[data-boat-id="' + id + '"]');
      if (!tr) continue;
      updateElapsedCell(tr, id);
      updateFlagsCell(tr, id);
    }
  }

  // Bump a typed time value by one minute or one second, depending on the
  // structure of the typed input. The granularity is decided purely by how
  // many colons the user has typed — not by whether the time happens to
  // parse cleanly:
  //   "HH:MM"     →  minute mode (one colon, no trailing colon)
  //   "HH:MM:"    →  SECOND mode, treated as "HH:MM:00"
  //   "HH:MM:S"   →  second mode, treated as "HH:MM:0S"
  //   "HH:MM:SS"  →  second mode
  // The trailing-colon and short-second cases are common while the user is
  // mid-type (e.g. just hit ':' to start the seconds segment); the previous
  // rule mis-classified them as minute mode.
  // Wraps modulo 24 h so the bumped value never goes negative or overflows.
  function bumpTimeValue(raw, sign) {
    if (!raw) return null;
    const colonCount = (raw.match(/:/g) || []).length;
    if (colonCount < 1) return null;
    const dayS = 86400;
    const pad = (n) => String(n).padStart(2, '0');
    if (colonCount === 1) {
      const m = raw.match(/^(\d{1,2}):(\d{1,2})$/);
      if (!m) return null;
      const total = (Number(m[1]) * 60 + Number(m[2])) * 60;
      const next = (((total + sign * 60) % dayS) + dayS) % dayS;
      return pad(Math.floor(next / 3600)) + ':' + pad(Math.floor((next % 3600) / 60));
    }
    // Two or more colons → seconds mode. Tolerate an empty seconds segment
    // ("HH:MM:" — assume :00), a single-digit seconds segment ("HH:MM:S"
    // — pad to :0S), or the standard "HH:MM:SS" with an optional ".sss"
    // suffix.
    const m = raw.match(/^(\d{1,2}):(\d{1,2}):(\d{0,2})(?:\.\d{1,3})?$/);
    if (!m) return null;
    const ssRaw = m[3] || '';
    const ss = ssRaw === '' ? 0 : Number(ssRaw.length === 1 ? '0' + ssRaw : ssRaw);
    const total = (Number(m[1]) * 60 + Number(m[2])) * 60 + ss;
    const next = (((total + sign) % dayS) + dayS) % dayS;
    return fmtElapsed(next);
  }

  // Time strings are considered equal if their parsed seconds-since-midnight
  // match. Handles "HH:MM:SS" vs "HH:MM:SS.000" vs "H:MM" etc. Used for
  // dirty detection where the same gun time can be expressed multiple ways.
  function timeStringsEqual(a, b) {
    const aEmpty = !a;
    const bEmpty = !b;
    if (aEmpty && bEmpty) return true;
    if (aEmpty || bEmpty) return false;
    const pa = parseTime(reformatTime(a) || a);
    const pb = parseTime(reformatTime(b) || b);
    if (pa == null || pb == null) return a === b;
    return pa === pb;
  }

  function wireDivisionStartInputs() {
    document.querySelectorAll('input.division-start').forEach(inp => {
      inp.onkeydown = (ev) => {
        const k = ev.key;
        // Enter commits the value by blurring — onblur runs reformatTime
        // (HH:MM: → HH:MM:00, HH:MM:S → HH:MM:0S), then refreshes the
        // dependent cells.
        if (k === 'Enter') {
          ev.preventDefault();
          try { inp.blur(); } catch (_) {}
          return;
        }
        // + (and = on the same physical key) and ArrowUp bump up; - and
        // ArrowDown bump down. Both arrow keys do nothing useful inside a
        // single-line text input anyway, so it's safe to repurpose them.
        const isPlus = (k === '+' || k === '=' || k === 'ArrowUp');
        const isMinus = (k === '-' || k === 'ArrowDown');
        if (!isPlus && !isMinus) return;
        const next = bumpTimeValue(inp.value, isPlus ? 1 : -1);
        if (next == null) return;
        ev.preventDefault();
        inp.value = next;
        try { inp.setSelectionRange(next.length, next.length); } catch (_) {}
        inp.dispatchEvent(new Event('input'));
      };
      inp.oninput = () => {
        const divId = inp.dataset.divId;
        // Track every keystroke — the dirty check compares against the
        // SailSys-current scheduled value (timeStringsEqual), so reverting
        // back to scheduled correctly de-dirties without us having to
        // delete entries here.
        divisionStartsMap.set(String(divId), inp.value || null);
        refreshDivisionRows(divId);
        if (!inp.value) inp.classList.remove('invalid');
        else if (reformatTime(inp.value)) inp.classList.remove('invalid');
        else inp.classList.add('invalid');
        updateSaveBar();
        sessionSaveForm();
      };
      inp.onblur = () => {
        const divId = inp.dataset.divId;
        const canon = reformatTime(inp.value);
        const sched = divisionScheduledStart(Number(divId));
        if (canon) {
          inp.value = canon;
          // Once normalized, if the typed value equals scheduled we drop
          // the entry so divisionStartsMap holds only real edits.
          if (timeStringsEqual(canon, sched)) {
            divisionStartsMap.delete(String(divId));
          } else {
            divisionStartsMap.set(String(divId), canon);
          }
          inp.classList.remove('invalid');
        } else if (inp.value) {
          inp.classList.add('invalid');
        } else {
          // User cleared the input — empty == no override, treat as not edited.
          divisionStartsMap.delete(String(divId));
        }
        // Update the dirty marker on the input itself.
        const stillDirty = divisionStartsMap.has(String(divId))
          && !timeStringsEqual(divisionStartsMap.get(String(divId)), sched);
        inp.classList.toggle('dirty', !!stillDirty);
        refreshDivisionRows(divId);
        updateSaveBar();
        sessionSaveForm();
      };
    });
    document.querySelectorAll('button.div-now-btn').forEach(btn => {
      btn.onclick = () => {
        const divId = btn.dataset.divId;
        const now = localNow();
        divisionStartsMap.set(String(divId), now);
        const inp = document.querySelector('input.division-start[data-div-id="' + divId + '"]');
        if (inp) {
          inp.value = now;
          inp.classList.remove('invalid');
          inp.classList.add('dirty');
        }
        refreshDivisionRows(divId);
        updateSaveBar();
        sessionSaveForm();
        // Log the NOW click in the session log with a div tag so the RO can
        // see it among the per-boat NOW captures.
        nowLog.push({ time: now, field: 'divStart-' + divId });
        renderNowLog();
        sessionSaveNowLog();
      };
    });
  }

  // True when any divisionStartsMap entry differs from SailSys's current
  // scheduled start for that division. Non-pursuit-only — the map is empty
  // for pursuit races.
  function isDivisionStartsDirty() {
    if (isPursuit) return false;
    for (const [divIdStr, val] of divisionStartsMap) {
      if (!val) continue;
      const sched = divisionScheduledStart(Number(divIdStr));
      if (!timeStringsEqual(val, sched)) return true;
    }
    return false;
  }

  function ctrlMsg(cls, text) {
    const el = document.getElementById('controls-msg');
    if (!text) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'banner ' + cls;
    el.textContent = text;
    el.style.display = '';
  }

  // Like ctrlMsg but accepts trusted HTML — used for the long-running
  // Process Results progress display. Callers must hand-escape any
  // user-supplied content; here it's all hard-coded strings + numbers.
  function ctrlMsgHtml(cls, html) {
    const el = document.getElementById('controls-msg');
    el.className = 'banner ' + cls;
    el.innerHTML = html;
    el.style.display = '';
  }

  async function doVisibility(endpoint, published) {
    setControlsDisabled(true);
    ctrlMsg('banner-info', (published ? 'Publishing' : 'Unpublishing') + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/' + endpoint,
      { published });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    renderStatus(r.body.status, raceIdGlobal);
    ctrlMsg('banner-ok', (published ? 'Published.' : 'Unpublished.'));
  }

  async function doSetResultsStatus(code) {
    setControlsDisabled(true);
    const label = ['Hidden', 'Provisional', 'Final'][code] || ('code=' + code);
    ctrlMsg('banner-info', 'Setting results status to ' + label + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/results-status',
      { status: code });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    renderStatus(r.body.status, raceIdGlobal);
    ctrlMsg('banner-ok', 'Results status set to ' + label + '.');
  }

  async function doProcessResults() {
    setControlsDisabled(true);
    // The server holds the request open while polling SailSys for up to 90s.
    // Drive a visible elapsed-time / progress bar so the RO can see the page
    // is alive and roughly how close to timeout we are.
    const startMs = Date.now();
    const TIMEOUT_S = 90;
    const tick = setInterval(() => {
      const elapsed = (Date.now() - startMs) / 1000;
      const secs = Math.floor(elapsed);
      const pct = Math.min(100, Math.round((elapsed / TIMEOUT_S) * 100));
      const bar = '<div class="progress"><div class="progress-bar" style="width:' + pct + '%"></div></div>';
      const dot = '⏳'.repeat(((secs % 3) + 1));
      ctrlMsgHtml('banner-info',
        '<strong>' + dot + ' Processing results in SailSys…</strong> '
        + '<span style="color:#555;">' + secs + 's / ' + TIMEOUT_S + 's</span>' + bar);
    }, 500);
    try {
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process-results', {});
      clearInterval(tick);
      if (!r.ok) {
        ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        setControlsDisabled(false);
        return;
      }
      if (r.body && r.body.error) {
        // Timed out; render whatever status came back so the user can retry.
        renderStatus(r.body.status, raceIdGlobal);
        ctrlMsg('banner-warn', r.body.error);
        return;
      }
      sailsysResults = parseSailsysResults(r.body.results);
      renderStatus(r.body.status, raceIdGlobal);
      renderEntrants();
      const took = Math.round((Date.now() - startMs) / 100) / 10;
      ctrlMsg('banner-ok', 'Results processed in ' + took + 's.');
    } finally {
      clearInterval(tick);
    }
  }

  // Admin calibration probe: round-trip SailSys with a known
  // Process Handicaps — POSTs the current per-boat snapshot to the Jinx
  // engine and renders the returned Adjustment list into the Next Start
  // column. No persistence: the values live in nextStartAdjustments until
  // the admin presses SAVE (doSaveHandicaps).
  async function doProcessHandicaps() {
    if (!entrantData || entrantData.length === 0) {
      ctrlMsg('banner-warn', 'No entrants loaded yet.');
      return;
    }
    // Build the boat snapshot. Boats with no usable TCF or no finish
    // status get DNC (engine excludes them with frozen TCF).
    const boats = entrantData.map(e => {
      const id = e.boat && e.boat.id;
      const tcf = currentTcf(e);
      const status = jinxStatusForEntrant(e);
      const out = { boatId: String(id), currentTcf: (isNaN(tcf) ? 1.0 : tcf), status };
      if (status === 'FIN') {
        const mins = elapsedMinutesForEntrant(e);
        if (mins != null) out.elapsedMinutes = mins;
      }
      return out;
    });
    // Default t_target_elapsed to the median actual elapsed time of
    // finishers (rounded to a whole minute). Empty fleet falls back to
    // the algorithm config's idealRaceLength (server-side default).
    const finElapsed = boats
      .filter(b => b.status === 'FIN' && typeof b.elapsedMinutes === 'number')
      .map(b => b.elapsedMinutes)
      .sort((a, b) => a - b);
    let targetElapsedMinutes = null;
    if (finElapsed.length) {
      const mid = Math.floor(finElapsed.length / 2);
      const med = (finElapsed.length & 1) === 1
        ? finElapsed[mid]
        : (finElapsed[mid - 1] + finElapsed[mid]) / 2.0;
      targetElapsedMinutes = Math.max(1, Math.round(med));
    }
    const payload = {
      seriesId: seriesIdForSave ? String(seriesIdForSave) : null,
      boats
    };
    if (targetElapsedMinutes != null) payload.targetElapsedMinutes = targetElapsedMinutes;

    setControlsDisabled(true);
    ctrlMsg('banner-info', 'Computing Jinx adjustments…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process-handicaps', payload);
    setControlsDisabled(false);
    if (!r.ok) {
      ctrlMsg('banner-err', 'Process Handicaps failed: '
        + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      return;
    }
    const list = (r.body && Array.isArray(r.body.adjustments)) ? r.body.adjustments : [];
    nextStartAdjustments = new Map(list.map(a => [String(a.boatId), a]));
    nextStartSaved = false;
    renderEntrantsHead();
    renderEntrants();
    renderControls();
    const tMsg = r.body.targetElapsedMinutes
      ? (' (target elapsed ' + r.body.targetElapsedMinutes + ' min)')
      : '';
    ctrlMsg('banner-ok',
      'Computed ' + list.length + ' Jinx adjustment' + (list.length === 1 ? '' : 's')
      + tMsg + '. Hover the Next Start column for the breakdown. '
      + 'Press Save Handicaps to persist locally.');
  }

  // Save Handicaps — persist the currently-displayed adjustments to the
  // local store. Pushing back to SailSys is a separate (future) step.
  async function doSaveHandicaps() {
    if (nextStartAdjustments.size === 0) {
      ctrlMsg('banner-warn', 'Nothing to save — run Process Handicaps first.');
      return;
    }
    const adjustments = Array.from(nextStartAdjustments.values());
    setControlsDisabled(true);
    ctrlMsg('banner-info', 'Saving ' + adjustments.length + ' handicap adjustment'
      + (adjustments.length === 1 ? '' : 's') + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/save-handicaps',
      { adjustments });
    setControlsDisabled(false);
    if (!r.ok) {
      ctrlMsg('banner-err', 'Save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      return;
    }
    nextStartSaved = true;
    renderControls();
    ctrlMsg('banner-ok', 'Saved ' + adjustments.length + ' handicap adjustment'
      + (adjustments.length === 1 ? '' : 's') + ' locally. '
      + 'Pushing to SailSys is a future step.');
  }

  // (courseLength=100nm, startTime=10:00) and read back the per-boat
  // staggered starts. The server hides start times + entries during the
  // run and restores them on the way out. Up to 5 minutes; in practice
  // around 1-2 minutes.
  async function doCalibrate() {
    if (!confirm(
      'Calibrate SailSys\'s TCF → start-offset formula?\n\n'
      + 'This only needs to be done occasionally. The race\'s start times '
      + 'and entrants list will be briefly hidden, course length set to '
      + '100 nm, every division started at 10:00:00, and SailSys re-run. '
      + 'Original values are restored at the end. May take up to 5 minutes.'))
      return;
    setControlsDisabled(true);
    const startMs = Date.now();
    const TIMEOUT_S = 300;
    const tick = setInterval(() => {
      const elapsed = (Date.now() - startMs) / 1000;
      const secs = Math.floor(elapsed);
      const pct = Math.min(100, Math.round((elapsed / TIMEOUT_S) * 100));
      const bar = '<div class="progress"><div class="progress-bar" style="width:' + pct + '%"></div></div>';
      ctrlMsgHtml('banner-info',
        '<strong>Calibrating SailSys…</strong> '
        + '<span style="color:#555;">' + secs + 's elapsed</span>' + bar);
    }, 500);
    try {
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/calibrate', {});
      clearInterval(tick);
      if (!r.ok) {
        ctrlMsg('banner-err', 'Calibration failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        setControlsDisabled(false);
        return;
      }
      renderCalibration(r.body && r.body.calibration);
      // Refetch entrants — their startTimeLocal values were restored but
      // re-render keeps the table in sync with whatever SailSys settled on.
      await loadEntrants();
    } finally {
      clearInterval(tick);
      setControlsDisabled(false);
    }
  }

  function renderCalibration(cal) {
    if (!cal) {
      ctrlMsg('banner-warn', 'Calibration completed but returned no data.');
      return;
    }
    const d = cal.derivation;
    if (!d || typeof d.v0Knots !== 'number') {
      ctrlMsg('banner-warn',
        'Calibration probe finished but produced no usable TCF spread '
        + '(need at least two distinct TCFs with valid start offsets).');
      return;
    }
    const dt = d.deltaSeconds;
    const dtH = (dt / 3600).toFixed(4);
    const dtHMS = Math.floor(dt / 3600) + 'h '
      + String(Math.floor((dt % 3600) / 60)).padStart(2, '0') + 'm '
      + String(dt % 60).padStart(2, '0') + 's';
    const courseStr = (typeof d.courseLengthNm === 'number')
      ? d.courseLengthNm.toFixed(0) : esc(d.courseLengthNm);
    const slowestStr = d.slowestTcf.toFixed(4);
    const fastestStr = d.fastestTcf.toFixed(4);
    const recipDiff = (1 / d.slowestTcf - 1 / d.fastestTcf);
    const v0Str = d.v0Knots.toFixed(3);

    // The Save button stashes the data attribute and the handler reads from
    // it — simpler than capturing in a closure across the innerHTML
    // assignment.
    const payload = {
      v0Knots: d.v0Knots,
      courseLengthNm: d.courseLengthNm,
      slowestTcf: d.slowestTcf,
      slowestStartOffsetSeconds: d.slowestStartOffsetSeconds,
      fastestTcf: d.fastestTcf,
      fastestStartOffsetSeconds: d.fastestStartOffsetSeconds
    };

    const html = ''
      + '<strong>Calibration complete</strong> &mdash; original timing restored.'
      + '<div style="margin-top:0.5rem;font-family:monospace;white-space:pre;">'
      +   'course D       = ' + esc(courseStr) + ' nm\n'
      +   'fastest TCF    = ' + esc(fastestStr) + '\n'
      +   'slowest TCF    = ' + esc(slowestStr) + '\n'
      +   'Δt (fast−slow) = ' + esc(dtHMS) + '  (= ' + esc(dtH) + ' h)\n'
      +   '\n'
      +   'V₀ = D / Δt × (1/TCF_slow − 1/TCF_fast)\n'
      +   '   = ' + esc(courseStr) + ' / ' + esc(dtH)
              + ' × (' + (1 / d.slowestTcf).toFixed(4)
              + ' − ' + (1 / d.fastestTcf).toFixed(4) + ')\n'
      +   '   = ' + esc(courseStr) + ' / ' + esc(dtH)
              + ' × ' + recipDiff.toFixed(4) + '\n'
      +   '   = <strong>' + esc(v0Str) + ' kn</strong>'
      + '</div>'
      + '<div style="margin-top:0.6rem;">'
      +   '<button id="ctrl-save-calibration" class="primary" type="button">Save calibration</button> '
      +   '<button id="ctrl-cancel-calibration" type="button">Dismiss</button>'
      + '</div>';
    ctrlMsgHtml('banner-ok', html);

    const saveBtn = document.getElementById('ctrl-save-calibration');
    if (saveBtn) saveBtn.onclick = () => doSaveCalibration(payload);
    const cancelBtn = document.getElementById('ctrl-cancel-calibration');
    if (cancelBtn) cancelBtn.onclick = () => ctrlMsg('', '');
  }

  async function doSaveCalibration(payload) {
    setControlsDisabled(true);
    const r = await postJson('/api/calibration', payload);
    setControlsDisabled(false);
    if (!r.ok) {
      ctrlMsg('banner-err',
        'Save calibration failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      return;
    }
    currentCalibration = (r.body && r.body.calibration) ? r.body.calibration : payload;
    renderControls();
    // Close the panel — a brief confirmation, then the banner is cleared
    // so Process Handicaps can take over the message area.
    ctrlMsg('banner-ok',
      'Calibration saved (V₀ = ' + currentCalibration.v0Knots.toFixed(3)
      + ' kn). Process Handicaps is now available.');
  }

  async function doProcess() {
    const courseInp = document.getElementById('ctrl-course');
    const courseLength = Number(courseInp.value);
    if (!courseLength || courseLength <= 0) {
      ctrlMsg('banner-warn', 'Enter a course length first.');
      courseInp.focus();
      return;
    }
    setControlsDisabled(true);
    ctrlMsg('banner-info', 'Setting course length and waiting for SailSys to process…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process',
      { courseLength });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    if (r.body && r.body.error) {
      // Timed out waiting for SailSys; still re-render with whatever status we got.
      renderStatus(r.body.status, raceIdGlobal);
      ctrlMsg('banner-warn', r.body.error);
    } else {
      renderStatus(r.body.status, raceIdGlobal);
      ctrlMsg('banner-ok', 'Processed. Start times updated for course length ' + courseLength + '.');
    }
    // Refetch entrants — their startTimeLocal will have changed after processing.
    await loadEntrants();
  }

  function setControlsDisabled(disabled) {
    ['ctrl-process', 'ctrl-course'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = disabled;
    });
    document.querySelectorAll('input.vis-check').forEach(cb => { cb.disabled = disabled; });
  }

  async function loadEntrants() {
    const r = await fetchJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/entrants');
    if (!r.ok) return r;
    entrantData = (r.body && Array.isArray(r.body.entrants)) ? r.body.entrants : [];
    document.getElementById('entrants-count').textContent = '(' + entrantData.length + ')';
    document.getElementById('race-entrants').style.display = '';
    renderEntrantsHead();
    renderEntrants();
    // Controls include a duty-boat selector populated from entrantData; re-render
    // controls so the selector is up-to-date.
    renderControls();
    return r;
  }

  function doReset() {
    if (!confirm('Discard all unsaved edits and refetch this race from SailSys?')) return;
    // Drop the in-tab autosave so the reload doesn't immediately restore the
    // edits we're throwing away. NOW-log entries live under a separate key
    // and are preserved — they're a record of clicks the RO may still want.
    try { sessionStorage.removeItem(SESSION_KEY('form')); } catch (_) {}
    location.reload();
  }

  async function doSave() {
    const btn = document.getElementById('save-btn');
    const summary = document.getElementById('save-summary');
    const state = document.getElementById('race-state');
    btn.disabled = true;

    const messages = [];
    let anyError = false;

    // --- TCFs first (writes to SailSys) ---
    // Skip the whole block when the series doesn't use our handicap —
    // there is no input that could populate dirtyTcf in that case, but be
    // defensive in case sessionStorage from a different mode leaked in.
    if (dirtyTcf.size > 0 && isOurHandicap) {
      if (!seriesIdForSave) {
        state.className = 'banner banner-err';
        state.textContent = 'Internal: seriesId not yet known. Reload and try again.';
        btn.disabled = false;
        return;
      }
      function spinnakerTypeFor(boatId) {
        const e = entrantData.find(x => x.boat && x.boat.id === boatId);
        if (!e) return 1;
        const h = e.handicap && e.handicap.currentHandicaps && e.handicap.currentHandicaps[0];
        if (h && h.spinnakerType != null) return h.spinnakerType;
        if (e.division && e.division.spinnakerType != null) return e.division.spinnakerType;
        return 1;
      }
      const updates = [];
      for (const [boatId, value] of dirtyTcf) {
        updates.push({ boatId, value, spinnakerType: spinnakerTypeFor(boatId) });
      }
      summary.textContent = 'Saving ' + updates.length + ' TCF update'
        + (updates.length === 1 ? '' : 's') + '...';
      const r = await postJson('/api/series/' + encodeURIComponent(seriesIdForSave) + '/tcfs',
        { updates });
      if (!r.ok) {
        messages.push('TCF save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        const results = (r.body && r.body.results) || [];
        const failed = results.filter(x => !x.ok);
        if (failed.length === 0) {
          messages.push('Saved ' + results.length + ' TCF update'
            + (results.length === 1 ? '' : 's') + ' to SailSys.');
          dirtyTcf.clear();
        } else {
          messages.push('Saved ' + (results.length - failed.length) + '/' + results.length
            + ' TCF updates. Failed boats: '
            + failed.map(f => f.boatId + ' (' + (f.error || 'unknown') + ')').join(', '));
          anyError = true;
          const failedIds = new Set(failed.map(f => f.boatId));
          for (const id of Array.from(dirtyTcf.keys())) {
            if (!failedIds.has(id)) dirtyTcf.delete(id);
          }
        }
      }
    }

    // --- Race times (writes to local JSON) ---
    if (isTimesDirty()) {
      const payload = currentTimesPayload();
      summary.textContent = 'Saving race times...';
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/times', payload);
      if (!r.ok) {
        messages.push('Times save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        messages.push('Saved race times.');
        originalTimesJson = JSON.stringify(payload.times);
        originalOrderJson = JSON.stringify(payload.boatOrder);
        originalDutyBoatId = payload.dutyBoatId;
      }
    }

    // --- Division starts (writes to SailSys — non-pursuit only) ---
    // Push any edited per-division gun times directly to SailSys's
    // divisionTiming via /api/races/{id}/division-starts. After a
    // successful push the values become the new "scheduled" for the next
    // load, so we clear the local edit map and re-render with the fresh
    // status the handler echoed back.
    if (!isPursuit && isDivisionStartsDirty()) {
      const starts = {};
      for (const [divIdStr, val] of divisionStartsMap) {
        if (!val) continue;
        const sched = divisionScheduledStart(Number(divIdStr));
        const canon = reformatTime(val) || val;
        if (!timeStringsEqual(canon, sched)) starts[divIdStr] = canon;
      }
      if (Object.keys(starts).length > 0) {
        summary.textContent = 'Saving division starts to SailSys...';
        const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/division-starts',
          { starts });
        if (!r.ok) {
          messages.push('Division starts save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
          anyError = true;
        } else {
          const n = Object.keys(starts).length;
          messages.push('Saved ' + n + ' division start' + (n === 1 ? '' : 's') + ' to SailSys.');
          divisionStartsMap.clear();
          if (r.body && r.body.status) {
            renderStatus(r.body.status, raceIdGlobal);
          }
        }
      }
    }

    // --- Push results to SailSys (came → startedRace, finish → finishTime,
    //     flags → penalties). The start times stay local-only — SailSys
    //     handles starts via the timing/processing pipeline, not as a
    //     captured actualStart. Always push if there's anything to send.
    {
      const boats = {};
      for (const e of entrantData) {
        const id = e.boat && e.boat.id;
        if (id == null) continue;
        const t = getTimes(id);
        boats[String(id)] = {
          came: !!t.came,
          finish: t.finish || null,
          // AVG is intentionally included so the server can choose to drop
          // it (no SailSys penalty); other flags map 1:1 to penalty defs.
          flags: flagsForEntrant(e)
        };
      }
      summary.textContent = 'Pushing results to SailSys...';
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/push-results',
        { boats });
      if (!r.ok) {
        messages.push('Results push failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        messages.push('Pushed results to SailSys.');
        // SailSys-computed results are now stale (requiresResultCalculation
        // will be true). Clear the cache so the columns fall back to local
        // values, and re-render status so the Process Results button appears.
        sailsysResults = {};
        if (r.body && r.body.status) {
          renderStatus(r.body.status, raceIdGlobal);
        }
      }
    }

    btn.disabled = false;

    state.className = anyError ? 'banner banner-warn' : 'banner banner-ok';
    state.textContent = messages.join(' ');

    // Refresh TCFs from server only if any TCFs were saved (cheap re-fetch).
    if (dirtyTcf.size === 0 && messages.some(m => m.startsWith('Saved') && m.includes('TCF'))) {
      await loadEntrants();
    }
    updateSaveBar();
  }

  function snapshotTimes(saved) {
    timesMap = new Map();
    if (saved && saved.times) {
      for (const [id, t] of Object.entries(saved.times)) {
        // Normalise legacy "HH:MM:SS.sss" → "HH:MM:SS" on load so the dirty
        // baseline matches what we'll re-serialize.
        timesMap.set(String(id), {
          came: !!t.came,
          actualStart: t.actualStart ? (reformatTime(t.actualStart) || t.actualStart) : null,
          finish: t.finish ? (reformatTime(t.finish) || t.finish) : null
        });
      }
    }
    boatOrder = (saved && Array.isArray(saved.boatOrder)) ? saved.boatOrder.map(String) : [];
    dutyBoatId = (saved && saved.dutyBoatId) ? String(saved.dutyBoatId) : null;
    // divisionStartsMap is in-memory only — populated either by user edits
    // (this session) or by sessionRestoreForm from sessionStorage. Server
    // JSON no longer carries it; SailSys's divisionTiming is the source.
    divisionStartsMap = new Map();
    // Seed empty entries for any entrants we haven't seen yet so getTimes works.
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      if (!timesMap.has(id)) timesMap.set(id, emptyTimes());
    }
    // Snapshot for dirty detection — use the same shape currentTimesPayload produces.
    const payload = currentTimesPayload();
    originalTimesJson = JSON.stringify(payload.times);
    originalOrderJson = JSON.stringify(payload.boatOrder);
    originalDutyBoatId = payload.dutyBoatId;
  }

  // NOW log section is current-race-only — live timing isn't relevant when
  // editing a finalized race's results. Hidden by default; revealed below
  // (after status loads and we know isCurrentRace) by updateNowLogSection.
  document.getElementById('now-log').style.display = 'none';

  function updateNowLogSection() {
    const section = document.getElementById('now-log');
    if (isCurrentRace) {
      section.style.display = '';
      document.getElementById('now-log-btn').onclick = logNowUnattached;
      renderNowLog();
    } else {
      section.style.display = 'none';
    }
  }

  // Previous / Next race navigation. Reads the visible-order race list
  // that races.html stashes in sessionStorage on every render. Buttons
  // are greyed out when at an edge or when no list is available (e.g. a
  // direct/deep link, or sessionStorage cleared). The list itself is the
  // last sorted order the user saw on the Races page.
  function setupRaceNav(raceId) {
    const prevBtn = document.getElementById('race-prev-btn');
    const nextBtn = document.getElementById('race-next-btn');
    if (!prevBtn || !nextBtn) return;
    let list = null;
    try {
      const raw = sessionStorage.getItem('sail-jinx.raceList');
      if (raw) list = JSON.parse(raw);
    } catch (_) { /* private mode — silent */ }
    if (!Array.isArray(list) || list.length === 0) {
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      prevBtn.title = 'No race list — open this page via the Races tab to enable navigation';
      nextBtn.title = prevBtn.title;
      return;
    }
    const idx = list.indexOf(String(raceId));
    const prevId = idx > 0 ? list[idx - 1] : null;
    const nextId = (idx >= 0 && idx < list.length - 1) ? list[idx + 1] : null;
    prevBtn.disabled = !prevId;
    nextBtn.disabled = !nextId;
    if (prevId) {
      prevBtn.title = 'Open race ' + prevId;
      prevBtn.onclick = () => {
        location.href = '/race.html?raceId=' + encodeURIComponent(prevId);
      };
    } else {
      prevBtn.title = idx < 0
        ? 'This race is not in the cached list'
        : 'No earlier race in the list';
    }
    if (nextId) {
      nextBtn.title = 'Open race ' + nextId;
      nextBtn.onclick = () => {
        location.href = '/race.html?raceId=' + encodeURIComponent(nextId);
      };
    } else {
      nextBtn.title = idx < 0
        ? 'This race is not in the cached list'
        : 'No later race in the list';
    }
  }

  // Compute isOurHandicap from the loaded entrants by checking whether any
  // entrant carries a current handicap whose definition matches the
  // configured handicapDefinitionId. SailSys's `handicap.currentHandicaps[]`
  // entries variously use `definitionId` (flat int) or `definition.id`
  // (nested object); both are checked.
  function computeIsOurHandicap() {
    if (configHandicapId == null) return false;
    const want = Number(configHandicapId);
    return entrantData.some(e => {
      const list = e && e.handicap && e.handicap.currentHandicaps;
      if (!Array.isArray(list)) return false;
      return list.some(h => {
        if (!h) return false;
        if (h.definitionId != null) return Number(h.definitionId) === want;
        if (h.definition != null) {
          const idv = (typeof h.definition === 'object') ? h.definition.id : h.definition;
          return Number(idv) === want;
        }
        return false;
      });
    });
  }

  // Compute isPursuit from the race status. The discriminator is the
  // TOP-LEVEL status.raceType (observed: 1 = Pursuit, 0 = Fleet; verified
  // across HAR captures of races known by their SailSys-UI labels).
  //
  // An earlier version read divisionTiming[].raceType — that field is
  // always 0 regardless of race type, so the check always reported
  // pursuit and Fleet races inherited the wrong UI (per-entrant Start
  // column, Late column, "Start times visibility" status row).
  //
  // Missing/unknown defaults to pursuit, so the initial paint (before
  // status arrives) shows the per-entrant affordances rather than
  // briefly flashing the fleet UI.
  function computeIsPursuit(status) {
    if (!status || status.raceType == null) return true;
    return status.raceType === 1;
  }

  // SailSys finishTime is an ISO-ish local string like
  // "2026-05-26T19:07:11.000". Extract the HH:MM:SS portion for the
  // canonical local-storage form used by timesMap.
  function parseSailsysFinishTime(s) {
    if (!s) return null;
    const m = String(s).match(/(?:^|T)(\d{1,2}):(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(Number(m[1])) + ':' + pad(Number(m[2])) + ':' + pad(Number(m[3]));
  }

  (async () => {
    const state = document.getElementById('race-state');

    // URL param wins; otherwise the last raceId we looked at.
    let raceId = PARAMS.get('raceId');
    if (raceId) localStorage.setItem('sail-jinx.lastRaceId', raceId);
    else raceId = localStorage.getItem('sail-jinx.lastRaceId');

    if (!raceId) {
      state.className = 'banner banner-warn';
      state.innerHTML = 'No race selected. Pick one on the <a href="/races.html">Races tab</a>.';
      return;
    }
    raceIdGlobal = raceId;
    setupRaceNav(raceId);

    state.textContent = 'Loading race ' + raceId + '…';

    // Resolve auth + config first so activeCols() and the
    // isOurHandicap/isPursuit gates can settle before the first render.
    const [authData, cfg] = await Promise.all([awaitAuth(), getConfig()]);
    if (cfg && cfg.sailsys) configHandicapId = cfg.sailsys.handicapDefinitionId;

    const fetches = [
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/status'),
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/entrants'),
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/times'),
      // SailSys-computed results — best-effort. Empty/missing is fine;
      // isResultsClean() handles it and columns fall back to local values.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/computed-results'),
      // SailSys-owned per-boat came/finish — overlaid on top of local JSON
      // below so SailSys is the source of truth for those fields.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/finishers'),
      // Locally-saved Jinx handicap adjustments, if any. Lets the Next
      // Start column repaint across reloads without re-running Process
      // Handicaps. Empty/missing on a never-processed race is fine.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/pending-handicaps'),
      // Saved SailSys calibration (V₀). Required for Process Handicaps; if
      // missing the button is disabled with a hint to run Calibrate first.
      fetchJson('/api/calibration')
    ];
    const [statusR, entrantsR, timesR, resultsR, finishersR, pendingR, calibrationR]
      = await Promise.all(fetches);
    currentCalibration = (calibrationR && calibrationR.ok && calibrationR.body)
      ? calibrationR.body.calibration : null;

    if (statusR.status === 401 || entrantsR.status === 401) {
      state.className = 'banner banner-warn';
      state.innerHTML = 'You are not signed in. <a href="/">Sign in to SailSys</a> first.';
      return;
    }

    if (!statusR.ok) {
      state.className = 'banner banner-err';
      state.textContent = 'Could not load status: '
        + ((statusR.body && statusR.body.error) || ('HTTP ' + statusR.status));
      return;
    }

    renderStatus(statusR.body && statusR.body.status, raceId);

    if (!entrantsR.ok) {
      state.className = 'banner banner-err';
      state.textContent = 'Could not load entrants: '
        + ((entrantsR.body && entrantsR.body.error) || ('HTTP ' + entrantsR.status));
      return;
    }

    entrantData = (entrantsR.body && Array.isArray(entrantsR.body.entrants))
      ? entrantsR.body.entrants : [];
    isOurHandicap = computeIsOurHandicap();

    // Restore any locally-saved Jinx handicap adjustments. Sets the Next
    // Start column up before the first render so the column appears
    // immediately on reload rather than after a paint flicker. Saved =
    // true so the SAVE button starts disabled — the user has to re-run
    // Process Handicaps to make further changes savable.
    if (pendingR && pendingR.ok && Array.isArray(pendingR.body && pendingR.body.adjustments)
        && pendingR.body.adjustments.length > 0) {
      nextStartAdjustments = new Map(
        pendingR.body.adjustments.map(a => [String(a.boatId), a]));
      nextStartSaved = true;
    }

    // Overlay SailSys finishers onto the local JSON BEFORE snapshotTimes so
    // the SailSys-derived values are the dirty baseline (not "edits"). For
    // each boat that SailSys knows about: startedRace → came (always trust
    // SailSys, since it's a boolean with no missing-vs-false distinction);
    // finishTime → finish only when SailSys has a value (else local JSON's
    // finish remains, per the source-of-truth-with-local-fallback rule).
    // A penalty entry with {averagePoints: true} marks the duty boat —
    // SailSys is the authority on who that is when we load.
    //
    // The server response wraps the saved RaceTimes record under
    // body.times, so the per-boat map is at body.times.times and the
    // metadata at body.times.{boatOrder,dutyBoatId,divisionStarts}. Local
    // JSON owns actualStart (SailSys has no equivalent field).
    const savedTimes = (timesR && timesR.ok && timesR.body.times) ? timesR.body.times : null;
    const savedInnerTimes = (savedTimes && savedTimes.times) ? savedTimes.times : {};
    // Shallow-clone so the overlay mutations don't leak back into the
    // response object (and so we can safely add boats SailSys knows about
    // but local JSON doesn't).
    const overlaidInner = Object.assign({}, savedInnerTimes);
    let sailsysDutyBoatId = null;
    if (finishersR && finishersR.ok && Array.isArray(finishersR.body.finishers)) {
      for (const f of finishersR.body.finishers) {
        const boatId = f && f.boatId != null ? String(f.boatId) : null;
        if (!boatId) continue;
        const sailFinish = parseSailsysFinishTime(f.finishTime);
        const existing = overlaidInner[boatId] || { came: false, actualStart: null, finish: null };
        overlaidInner[boatId] = {
          came: !!f.startedRace,
          actualStart: existing.actualStart || null,
          finish: sailFinish || existing.finish || null
        };
        if (Array.isArray(f.penalties)
            && f.penalties.some(p => p && p.averagePoints === true)) {
          sailsysDutyBoatId = boatId;
        }
      }
    }
    // Local-saved dutyBoatId loses to SailSys when SailSys says one —
    // SailSys is the source of truth for the duty boat once it's been
    // pushed. Local JSON's dutyBoatId still wins when SailSys has no
    // AVG-flagged boat (e.g. a never-pushed in-progress edit).
    const overlaidDutyBoatId = sailsysDutyBoatId
      || (savedTimes && savedTimes.dutyBoatId)
      || null;
    const overlaidSaved = {
      times: overlaidInner,
      boatOrder: (savedTimes && Array.isArray(savedTimes.boatOrder))
        ? savedTimes.boatOrder : [],
      dutyBoatId: overlaidDutyBoatId,
      divisionStarts: (savedTimes && savedTimes.divisionStarts) || null
    };

    // Server snapshot (with SailSys overlay) first — establishes the dirty
    // baseline. Then overlay any unsaved edits from this tab's
    // sessionStorage; those changes will correctly re-register as dirty
    // against the (now SailSys-anchored) baseline.
    snapshotTimes(overlaidSaved);
    sessionRestoreForm();
    if (isCurrentRace) {
      sessionRestoreNowLog();
      renderNowLog();
    }
    // Seed sailsysResults cache from the optional fetch. Empty if the race
    // hasn't been processed yet — that's fine; isResultsClean() handles it.
    if (resultsR && resultsR.ok && resultsR.body && resultsR.body.results) {
      sailsysResults = parseSailsysResults(resultsR.body.results);
    }

    state.className = 'banner banner-ok';
    state.textContent = entrantData.length + ' entrants loaded'
      + (IS_EDITABLE
          ? ' — edit TCFs and capture times; click a header to sort, or drag rows to set a manual order. SAVE appears once something changes.'
          : ' — click a column header to sort.');
    document.getElementById('entrants-count').textContent = '(' + entrantData.length + ')';
    document.getElementById('race-entrants').style.display = '';

    // Hide-DNC filter: editable-only; the Came column isn't shown in read-only
    // mode so the filter has nothing to act on. Initialise from sessionStorage
    // (restored by sessionRestoreForm above) and wire the checkbox.
    if (IS_EDITABLE) {
      const toggle = document.getElementById('hide-dnc-toggle');
      const cb = document.getElementById('hide-dnc');
      toggle.style.display = '';
      cb.checked = hideDnc;
      cb.onchange = () => {
        hideDnc = cb.checked;
        renderEntrants();
        sessionSaveForm();
      };
    }

    renderEntrantsHead();
    renderEntrants();
    updateNowLogSection();

    document.getElementById('save-btn').onclick = doSave;
    document.getElementById('reset-btn').onclick = doReset;

    // The first renderStatus() call ran BEFORE snapshotTimes and before
    // entrantData was assigned, so its dirty baseline was empty (every field
    // looked dirty → status selector permanently disabled) and the duty-boat
    // <select> had no <option>s. Re-render now that the state is set up so
    // both controls reflect reality.
    if (currentStatus) renderStatus(currentStatus, raceIdGlobal);

    // sessionRestoreForm() may have rehydrated unsaved edits from a prior
    // tab session — surface the SAVE bar immediately if so. Without this
    // the bar only appears after the next interactive mutation.
    updateSaveBar();
  })();
</script>
</body>
</html>
