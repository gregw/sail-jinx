<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sail-jinx — Race</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Mark invalid inputs red while they contain an unparsable value. */
    input.invalid { color: red !important; }
    input.invalid::placeholder { color: #f99; }
    /* Ensure number inputs show red digits when invalid in browsers that
       support styling of number inputs. */
    input[type="number"].invalid { color: red !important; }
  </style>
</head>
<body>
<!-- INCLUDE _nav.html -->

<main>
  <h1 id="race-heading">Race</h1>
  <div id="race-state" class="banner banner-info">Loading…</div>

  <section id="race-status" style="display:none;">
    <h2>Status</h2>
    <dl class="status-grid" id="status-grid"></dl>
    <div id="race-controls" style="display:none;"></div>
    <div id="controls-msg" class="banner" style="display:none;"></div>
  </section>

  <section id="race-entrants" style="display:none;">
    <h2>Entrants
      <span id="entrants-count" style="font-weight: normal; color: #666; font-size: 0.85em;"></span>
      <label id="hide-dnc-toggle" style="display:none; font-weight: normal; font-size: 0.85em; color: #555; margin-left: 1rem;">
        <input type="checkbox" id="hide-dnc"> Hide DNC
      </label>
    </h2>
    <div id="save-bar" style="display:none;">
      <button id="save-btn" class="primary">Save</button>
      <button id="reset-btn" type="button">Reset</button>
      <span id="save-summary" style="margin-left: 1rem; color: #555;"></span>
    </div>
    <table id="entrants-table">
      <thead>
        <tr id="entrants-head"></tr>
      </thead>
      <tbody id="entrants-tbody"></tbody>
    </table>
  </section>

  <section id="now-log" style="margin-top: 2rem;">
    <h2>NOW button log <span style="font-weight: normal; color: #888; font-size: 0.85em;">(this session only)</span></h2>
    <div style="margin-bottom: 0.5rem;">
      <button id="now-log-btn" class="primary" type="button">NOW</button>
      <span style="margin-left: 0.6rem; color: #666; font-size: 0.9em;">Capture a time not tied to a boat.</span>
    </div>
    <ol id="now-log-list"></ol>
  </section>
</main>

<script src="/common.js"></script>
<script>
  const VIS = (n) => ({0: 'draft', 1: 'published'}[n] ?? ('vis=' + n));
  const PROC = (n) => ({0: 'pending', 1: 'processing', 2: 'processed'}[n] ?? ('proc=' + n));

  function fmtDate(s) { return s ? String(s).slice(0, 10) : ''; }

  // The race page no longer takes any edit-mode URL flags. It is always
  // editable subject to user permissions / race type / handicap type, and
  // "is this race currently live" is derived from the race's own state:
  // any race whose results have not yet been processed (resultStatus < 2)
  // is treated as current and gets the live-timing affordances (TCF input,
  // per-row + per-division NOW buttons, the NOW log section).
  const PARAMS = new URLSearchParams(location.search);
  // The page is always editable now; per-feature gating is via isAdmin /
  // isOurHandicap / isPursuit. IS_EDITABLE is kept as a constant so the
  // many `if (IS_EDITABLE)` branches stay readable rather than being
  // collapsed inline — also leaves a single chokepoint for any future
  // read-only mode (e.g. spectator view).
  const IS_EDITABLE = true;
  // isCurrentRace is recomputed every time the race status lands (initial
  // load, after SAVE, after Process Results, etc.). Defaults to false so
  // the initial paint (before status arrives) doesn't show NOW buttons that
  // would then disappear once we know better.
  let isCurrentRace = false;

  let raceIdGlobal = null;
  let seriesIdForSave = null;       // populated from race status
  let currentStatus = null;         // latest race status (for controls + grid)
  const nowLog = [];                // every NOW click, newest pushed last; in-memory only
  let lastFinishTime = null;        // most recent finish time entered this page; used to seed next finish prefill
  let entrantData = [];             // entrants as returned by SailSys
  let boatOrder = [];               // ordered list of boatIds (drag order)
  const dirtyTcf = new Map();       // boatId -> edited TCF (Number)
  let dutyBoatId = null;            // boatId of selected duty boat, or null

  // Race classification — derived once the data lands and consulted by the
  // column / panel renderers below.
  //   configHandicapId is the configured handicapDefinitionId (e.g. 15 = MYC
  //   TCF). isOurHandicap is true when at least one entrant carries a current
  //   handicap whose definition matches configHandicapId — i.e. this race is
  //   scored against the handicap our app manages. isPursuit is true when
  //   every division in this race is raceType=0 (pursuit start). Non-pursuit
  //   races use per-division start gun times; pursuit races stagger per boat.
  let configHandicapId = null;
  let isOurHandicap = false;
  let isPursuit = true;

  // divisionStartsMap is the live, editable per-division actualStart for a
  // non-pursuit race: divisionId (String) -> "HH:MM:SS". Empty for pursuit
  // races (per-boat actualStart on timesMap is used instead). Snapshot for
  // dirty detection mirrors timesMap's originalTimesJson.
  let divisionStartsMap = new Map();
  let originalDivisionStartsJson = '';

  // Times state. timesMap is the live editable view; originalTimesJson is the
  // serialized snapshot we compare against to decide whether the times block
  // is dirty (covers both per-row edits and drag-reordering).
  let timesMap = new Map();         // boatId -> {came, actualStart, finish}
  let originalTimesJson = '';
  let originalOrderJson = '';
  let originalDutyBoatId = null;    // for dirty detection on duty-boat changes
  let hideDnc = false;              // UI filter: when true, hide non-Came boats from the table

  // SailSys-computed results cache. Populated from /api/races/{id}/computed-results
  // on load and after Process Results. Shape: { boatId: {place, points, flags} }.
  // Only treated as authoritative when isResultsClean() is true (race processed
  // AND nothing dirty locally).
  let sailsysResults = {};

  function isAnyDirty() {
    return dirtyTcf.size > 0 || isTimesDirty();
  }

  function isResultsClean() {
    if (!IS_EDITABLE) return false;
    if (isAnyDirty()) return false;
    if (!currentStatus) return false;
    if (currentStatus.requiresResultCalculation) return false;
    if (!sailsysResults || Object.keys(sailsysResults).length === 0) return false;
    return true;
  }

  // Flatten the GET /races/{id}/results competitors tree into a per-boat map.
  // calculations[0] is the first handicap definition (MYC TCF for our club);
  // placings[0] is the overall division placing.
  function parseSailsysResults(data) {
    const map = {};
    if (!data || !Array.isArray(data.competitors)) return map;
    for (const c of data.competitors) {
      if (!Array.isArray(c.items)) continue;
      for (const it of c.items) {
        const boatId = (it.boat && it.boat.id) || it.id;
        if (boatId == null) continue;
        const calc = Array.isArray(it.calculations) ? it.calculations[0] : null;
        const placing = calc && Array.isArray(calc.placings) ? calc.placings[0] : null;
        const flags = (Array.isArray(it.penalties) ? it.penalties : [])
          .map(p => p && p.definitionShortName)
          .filter(Boolean);
        map[String(boatId)] = {
          place: placing && placing.place != null ? placing.place : null,
          points: placing && placing.points != null ? placing.points : null,
          flags
        };
      }
    }
    return map;
  }

  // resultStatus mapping. SailSys reports a single integer covering both
  // "processing state" and "visibility":
  //   0,1 → Hidden / pending recalc
  //   2   → Hidden but recalc complete
  //   3   → Provisional
  //   4   → Final
  // The URL path /results/status/{N} uses 0/1/2 = Hidden/Provisional/Final.
  function resultStatusLabel(rs) {
    if (rs == null) return '';
    if (rs <= 2) return 'Hidden';
    if (rs === 3) return 'Provisional';
    if (rs === 4) return 'Final';
    return 'state=' + rs;
  }
  function resultStatusUrlCode(rs) {
    if (rs == null || rs <= 2) return 0;
    if (rs === 3) return 1;
    if (rs === 4) return 2;
    return 0;
  }

  // sessionStorage acts as an in-tab autosave so a refresh doesn't lose typed
  // times/TCF edits, NOW clicks, or drag order. Only the SAVE button writes to
  // disk on the server — session storage is purely for crash/reload recovery
  // within this browser tab.
  const SESSION_KEY = (suffix) => 'sail-jinx.race.' + raceIdGlobal + '.' + suffix;

  function sessionSaveForm() {
    if (!raceIdGlobal) return;
    try {
      sessionStorage.setItem(SESSION_KEY('form'), JSON.stringify({
        timesMap: Array.from(timesMap.entries()),
        boatOrder: boatOrder,
        dutyBoatId: dutyBoatId,
        divisionStarts: Array.from(divisionStartsMap.entries()),
        dirtyTcf: Array.from(dirtyTcf.entries()),
        hideDnc: hideDnc
      }));
    } catch (_) { /* private mode or quota — silent best effort */ }
  }

  function sessionSaveNowLog() {
    if (!raceIdGlobal) return;
    try { sessionStorage.setItem(SESSION_KEY('nowLog'), JSON.stringify(nowLog)); }
    catch (_) {}
  }

  function sessionRestoreForm() {
    if (!raceIdGlobal) return;
    try {
      const raw = sessionStorage.getItem(SESSION_KEY('form'));
      if (!raw) return;
      const p = JSON.parse(raw);
      if (Array.isArray(p.timesMap)) timesMap = new Map(p.timesMap);
      if (Array.isArray(p.boatOrder)) boatOrder = p.boatOrder.map(String);
      dutyBoatId = p.dutyBoatId ? String(p.dutyBoatId) : null;
      if (Array.isArray(p.divisionStarts)) {
        divisionStartsMap = new Map(p.divisionStarts.map(([k, v]) => [String(k), v]));
      }
      hideDnc = !!p.hideDnc;
      // Only restore dirty TCF state when the race is current AND we manage
      // the handicap. Past races / foreign-handicap series have no editable
      // TCF input, so reviving the dirt would permanently mark the page
      // dirty without offering the user any way to clear it.
      if (isCurrentRace && isOurHandicap && Array.isArray(p.dirtyTcf)) {
        dirtyTcf.clear();
        for (const [k, v] of p.dirtyTcf) dirtyTcf.set(Number(k), Number(v));
      }
    } catch (_) {}
  }

  function sessionRestoreNowLog() {
    if (!raceIdGlobal) return;
    try {
      const raw = sessionStorage.getItem(SESSION_KEY('nowLog'));
      if (!raw) return;
      const p = JSON.parse(raw);
      if (Array.isArray(p)) {
        nowLog.length = 0;
        for (const e of p) nowLog.push(e);
      }
    } catch (_) {}
  }

  function emptyTimes() { return { came: false, actualStart: null, finish: null }; }

  // Keys in timesMap are always strings; entrant ids from SailSys are numbers,
  // so always coerce on access.
  function getTimes(boatId) {
    const k = String(boatId);
    if (!timesMap.has(k)) timesMap.set(k, emptyTimes());
    return timesMap.get(k);
  }

  function originalTcf(e) {
    const h = e.handicap && e.handicap.currentHandicaps && e.handicap.currentHandicaps[0];
    return h ? Number(h.value) : NaN;
  }

  function currentTcf(e) {
    const id = e.boat && e.boat.id;
    return dirtyTcf.has(id) ? dirtyTcf.get(id) : originalTcf(e);
  }

  // All internal time math is in seconds-since-midnight (integer). The RO
  // captures wall-clock times manually — sub-second precision isn't useful in
  // a pursuit handicap context. Legacy "HH:MM:SS.sss" values written by older
  // versions are accepted on parse (sub-second portion is dropped).
  function parseTime(s) {
    if (!s) return null;
    const m = String(s).trim().match(/^(\d{1,2}):(\d{2}):(\d{2})(?:\.\d{1,3})?$/);
    if (!m) return null;
    return (Number(m[1]) * 60 + Number(m[2])) * 60 + Number(m[3]);
  }

  function fmtElapsed(secs) {
    if (secs == null || secs < 0) return '';
    const h = Math.floor(secs / 3600);
    const mi = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(h) + ':' + pad(mi) + ':' + pad(s);
  }

  function localNow() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  // Reformat user-typed times to canonical HH:MM:SS. Tolerant of:
  //   "H:M"        → ":00" seconds
  //   "H:M:"       → trailing colon, treated as ":00"
  //   "H:M:S"      → single-digit second padded to ":0S"
  //   "H:M:S.sss"  → legacy millis suffix dropped
  // Returns null if the input still doesn't parse — caller leaves the raw
  // text in place so the user can fix it. The blur and Enter paths both
  // funnel through here so the same normalisation applies on focus loss
  // and on Enter keypress.
  function reformatTime(s) {
    if (!s) return null;
    const m = String(s).trim().match(/^(\d{1,2}):(\d{1,2})(?::(\d{0,2}))?(?:\.\d{1,3})?$/);
    if (!m) return null;
    const h = Number(m[1]);
    const mi = Number(m[2]);
    const ss = (m[3] != null && m[3] !== '') ? Number(m[3]) : 0;
    if (h > 23 || mi > 59 || ss > 59) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(h) + ':' + pad(mi) + ':' + pad(ss);
  }

  // "HH:MM:" prefix from a SailSys startTimeLocal — used to prefill an empty
  // Actual Start input so the RO only has to key the seconds. SailSys may
  // return plain "HH:MM:SS" or an ISO "...T18:13:00" string; both work.
  function startPrefix(sched) {
    if (!sched) return null;
    const m = String(sched).match(/(?:^|T)(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    const pad = (n, w) => String(n).padStart(w, '0');
    return pad(Number(m[1]), 2) + ':' + pad(Number(m[2]), 2) + ':';
  }

  // "HH:MM" prefix for an empty Finish input. Boats in a pursuit race tend to
  // finish bunched together, so once one finish is recorded the next is most
  // likely in the same minute — basis the prefill on the most recent finish
  // this session. Before any finish has been entered, fall back to the boat's
  // scheduled start + 60 min as a sensible "rough race length" guess.
  function finishPrefix(entrant) {
    const pad = (n) => String(n).padStart(2, '0');
    if (lastFinishTime) {
      const m = lastFinishTime.match(/^(\d{1,2}):(\d{1,2})/);
      if (m) return pad(Number(m[1])) + ':' + pad(Number(m[2]));
    }
    const sched = entrant && entrant.startTimeLocal;
    if (sched) {
      const m = String(sched).match(/(?:^|T)(\d{1,2}):(\d{1,2})/);
      if (m) {
        const total = Number(m[1]) * 60 + Number(m[2]) + 60;
        return pad(Math.floor(total / 60) % 24) + ':' + pad(total % 60);
      }
    }
    return null;
  }

  // Parse a scheduled start string (HH:MM or ISO containing 'T18:13') to
  // seconds-since-midnight. Returns null on failure.
  function parseScheduledSeconds(sched) {
    if (!sched) return null;
    const m = String(sched).match(/(?:^|T)(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    return (Number(m[1]) * 60 + Number(m[2])) * 60;
  }

  // The actualStart time for an entrant — pursuit races stagger per boat
  // (held on timesMap[boatId].actualStart); non-pursuit races share one gun
  // time per division (held on divisionStartsMap when the user has captured
  // it locally, else on SailSys's currentStatus.divisionTiming.startTimeLocal
  // — for fleet races SailSys treats that field AS the gun time, so once
  // saved it IS the actual). Returns null when nothing is available.
  function actualStartFor(entrant) {
    if (isPursuit) {
      const id = entrant && entrant.boat && entrant.boat.id;
      const t = getTimes(id);
      return t ? (t.actualStart || null) : null;
    }
    const divId = entrant && entrant.division && entrant.division.id;
    if (divId == null) return null;
    if (divisionStartsMap.has(String(divId))) {
      const v = divisionStartsMap.get(String(divId));
      if (v) return v;
    }
    return divisionScheduledStart(divId);
  }

  // Pull a division's start time straight out of currentStatus.divisionTiming
  // and return it as "HH:MM:SS". For non-pursuit races this is what SailSys
  // considers the gun time. Returns null when the status hasn't loaded yet
  // or the division isn't in divisionTiming.
  function divisionScheduledStart(divisionId) {
    if (!currentStatus || !Array.isArray(currentStatus.divisionTiming)) return null;
    const dt = currentStatus.divisionTiming.find(d => d && d.divisionId === divisionId);
    if (!dt || !dt.startTimeLocal) return null;
    const m = String(dt.startTimeLocal).match(/(?:^|T)(\d{1,2}):(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(Number(m[1])) + ':' + pad(Number(m[2])) + ':' + pad(Number(m[3]));
  }

  // The scheduled start string for an entrant — for pursuit, the entrant's
  // own startTimeLocal (computed by SailSys after start-time processing);
  // for non-pursuit, the division's startTimeLocal from divisionTiming on
  // the race status (all boats in the division share it).
  function scheduledStartFor(entrant) {
    if (isPursuit) return entrant && entrant.startTimeLocal;
    if (!currentStatus || !Array.isArray(currentStatus.divisionTiming)) return null;
    const divId = entrant && entrant.division && entrant.division.id;
    if (divId == null) return null;
    const dt = currentStatus.divisionTiming.find(d => d && d.divisionId === divId);
    return dt ? dt.startTimeLocal : null;
  }

  // Seconds late vs allocated start for an entrant. Positive = late,
  // negative = early (early triggers OCS via flagsForEntrant). Returns null
  // when either time is missing/unparseable.
  function lateSeconds(entrant) {
    const actualStr = actualStartFor(entrant);
    if (!actualStr) return null;
    const actual = parseTime(actualStr);
    const sched = parseScheduledSeconds(scheduledStartFor(entrant));
    if (actual == null || sched == null) return null;
    return actual - sched;
  }

  // Format a late-seconds value as M:SS (or -M:SS for early). Empty for null.
  function fmtLate(secs) {
    if (secs == null) return '';
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '-' : '') + m + ':' + String(s).padStart(2, '0');
  }

  // Flags for an entrant. Returns an array (potentially empty) — boats can
  // legitimately have multiple flags at once. Manual flags (e.g. DSQ) will be
  // layered on top of this in a future iteration; the order here is just the
  // auto-computed set.
  //
  // Rules:
  //   AVG  — duty boat (selected via the controls panel). Pre-empts the
  //          came/start/finish-driven flags because those fields are forced
  //          empty for the duty boat.
  //   DNC  — did not come. came=false (and not duty).
  //   DNS  — came but no actualStart recorded.
  //   DNF  — came, has actualStart, but no finish.
  //   OCS  — actualStart earlier than scheduled start. Added IN ADDITION to
  //          any other flag (per spec: "no matter what other flags it might
  //          get (it doesn't need a finish time to get it)").
  function flagsForEntrant(entrant) {
    const id = entrant && entrant.boat && entrant.boat.id;
    const flags = [];

    if (String(dutyBoatId) === String(id)) {
      flags.push('AVG');
      return flags; // duty boat has no times → no DNS/DNF/OCS to add
    }

    const t = getTimes(id);
    const actualStr = actualStartFor(entrant);
    if (!t || !t.came) {
      flags.push('DNC');
    } else if (!actualStr) {
      flags.push('DNS');
    } else if (!t.finish) {
      flags.push('DNF');
    }

    // OCS layers on top of any of the above for pursuit races, where each
    // boat has its own actualStart that we can compare against the boat's
    // staggered allocated start. For fleet (non-pursuit) starts every boat
    // shares one division gun time, so an "OCS" call is per-boat RO
    // judgement (not derivable from times) — don't auto-flag it.
    if (isPursuit && actualStr) {
      const actual = parseTime(actualStr);
      const sched = parseScheduledSeconds(scheduledStartFor(entrant));
      if (actual != null && sched != null && actual < sched) flags.push('OCS');
    }
    return flags;
  }

  // OCS is the only auto-flag that affects placing. AVG/DNC/DNS/DNF are
  // handled by excluding the boat from the placed set in recomputePlaces().
  function penaltySecondsForEntrant(entrant) {
    return flagsForEntrant(entrant).includes('OCS') ? 5 * 60 : 0;
  }

  // Place + points are derived from the captured times. Recomputed once per
  // render via recomputePlaces() so cell `get`s are cheap map lookups.
  let placeMap = new Map();     // boatId -> 1-based place (finish order)

  function recomputePlaces() {
    placeMap = new Map();
    if (!IS_EDITABLE) return;
    const EXCLUDED = new Set(['AVG', 'DNC', 'DNS', 'DNF']);
    const finishers = [];
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      const flags = flagsForEntrant(e);
      if (flags.some(f => EXCLUDED.has(f))) continue;
      const t = getTimes(id);
      const f = parseTime(t.finish);
      if (f == null) continue;
      finishers.push({ id, fAdj: f + penaltySecondsForEntrant(e) });
    }
    finishers.sort((a, b) => a.fAdj - b.fAdj);
    finishers.forEach((x, i) => placeMap.set(x.id, i + 1));
  }

  // Columns. `get` returns a sort-friendly value; `render` (optional) returns
  // HTML for the cell. Editable-only columns are filtered out when IS_EDITABLE
  // is false. TCF editing has moved off this table — eventually behind the
  // boat name link to per-entry details.
  const ENTRANT_COLS = [
    { key: 'drag', label: '',
      editableOnly: true, sortable: false, cellClass: 'drag-handle',
      get: () => '',
      render: () => '<span title="Drag to reorder">☰</span>' },
    { key: 'division', label: 'Div',    get: e => (e.division && e.division.name) || '' },
    { key: 'sail',     label: 'Sail#',  get: e => (e.boat && e.boat.sailNumber) || '' },
    { key: 'name',     label: 'Name',   get: e => (e.boat && e.boat.name) || '' },
    { key: 'tcf',      label: 'TCF',    get: e => currentTcf(e),
      render: (e) => {
        const cur = currentTcf(e);
        const fmt = (n) => (typeof n === 'number' && !isNaN(n)) ? n.toFixed(4) : '';
        // TCF input is current-race-only AND only when the race is scored
        // against the handicap definition this app manages. Past races, or
        // any race whose series uses a different default handicap, see the
        // value read-only — we have no business writing those TCFs.
        if (!isCurrentRace || !isOurHandicap) {
          return esc(fmt(cur));
        }
        const orig = originalTcf(e);
        const id = e.boat && e.boat.id;
        const dirty = !isNaN(cur) && cur !== orig;
        return '<input type="number" step="0.0001" class="tcf-input' + (dirty ? ' dirty' : '') + '"'
          + ' data-boat-id="' + esc(id) + '"'
          + ' data-original="' + esc(fmt(orig)) + '"'
          + ' value="' + esc(fmt(cur)) + '">';
      }},
    { key: 'start',    label: 'Allocated', get: e => e.startTimeLocal || '' },
    { key: 'came',     label: 'Came',
      editableOnly: true, sortable: false,
      get: e => getTimes(e.boat && e.boat.id).came ? 1 : 0,
      render: (e) => {
        const id = e.boat && e.boat.id;
        const t = getTimes(id);
        const isDuty = String(dutyBoatId) === String(id);
        const disabled = isDuty ? ' disabled' : '';
        const checked = (t.came && !isDuty) ? ' checked' : '';
        return '<input type="checkbox" class="came-input" data-boat-id="' + esc(id) + '"'
          + checked + disabled + '>';
      }},
    { key: 'actualStart', label: 'Start',
      editableOnly: true,
      get: e => getTimes(e.boat && e.boat.id).actualStart || '',
      render: (e) => {
        const id = e.boat && e.boat.id;
        const t = getTimes(id);
        const disabled = t.came ? '' : ' disabled';
        const nowBtn = isCurrentRace
          ? ('<button type="button" class="now-btn" data-boat-id="' + esc(id) + '"'
             + ' data-field="actualStart"' + disabled + '>NOW</button>')
          : '';
        return '<input type="text" class="time-input" placeholder="HH:MM:SS"'
          + ' data-boat-id="' + esc(id) + '" data-field="actualStart"'
          + ' value="' + esc(t.actualStart || '') + '"' + disabled + '>'
          + nowBtn;
      }},
    { key: 'finish',  label: 'Finish',
      get: e => {
        if (IS_EDITABLE) return getTimes(e.boat && e.boat.id).finish || '';
        return e.finishTimeLocal || '';
      },
      render: (e) => {
        if (!IS_EDITABLE) {
          return esc(e.finishTimeLocal || '');
        }
        const id = e.boat && e.boat.id;
        const t = getTimes(id);
        const disabled = t.came ? '' : ' disabled';
        const nowBtn = isCurrentRace
          ? ('<button type="button" class="now-btn" data-boat-id="' + esc(id) + '"'
             + ' data-field="finish"' + disabled + '>NOW</button>')
          : '';
        return '<input type="text" class="time-input" placeholder="HH:MM:SS"'
          + ' data-boat-id="' + esc(id) + '" data-field="finish"'
          + ' value="' + esc(t.finish || '') + '"' + disabled + '>'
          + nowBtn;
      }},
    // Late: actualStart minus allocated start, in seconds. Negative = early
    // (and OCS-flagged elsewhere). Empty when the boat has no recorded
    // actualStart. The `get` returns a Number so sorting is numeric; render
    // formats as M:SS (with leading minus when early).
    { key: 'late', label: 'Late', editableOnly: true,
      get: e => {
        const s = lateSeconds(e);
        return s == null ? NaN : s;
      },
      render: e => esc(fmtLate(lateSeconds(e)))
    },
    { key: 'elapsed', label: 'Elapsed',
      get: e => {
        if (IS_EDITABLE) {
          const a = parseTime(actualStartFor(e));
          const t = getTimes(e.boat && e.boat.id);
          const f = parseTime(t.finish);
          if (a != null && f != null) {
            return fmtElapsed((f - a) + penaltySecondsForEntrant(e));
          }
          return '';
        }
        return e.elapsedTime || '';
      }},
    // Flags: SailSys-authoritative when results are clean (processed AND no
    // local edits pending). When dirty/unprocessed, fall back to local auto-
    // computed flags. Manual flags (DSQ etc.) UI hooks are still future work.
    { key: 'flags', label: 'Flags', sortable: false, get: e => {
        const id = String(e.boat && e.boat.id);
        if (isResultsClean() && sailsysResults[id]) {
          const f = sailsysResults[id].flags || [];
          return f.length ? f.join(', ') : '';
        }
        const flags = flagsForEntrant(e);
        return flags.length ? flags.join(', ') : '';
      } },
    { key: 'place', label: 'Place',
      get: e => {
        const id = String(e.boat && e.boat.id);
        if (isResultsClean() && sailsysResults[id] && sailsysResults[id].place != null) {
          return sailsysResults[id].place;
        }
        const p = placeMap.get(id);
        return p == null ? '' : p;
      }},
    // Points: ONLY shown when SailSys has computed them AND the local state
    // matches what was pushed (no dirty edits). Anything else would be a lie —
    // either provisional/stale, or never authoritative locally.
    { key: 'points', label: 'Points',
      get: e => {
        if (!isResultsClean()) return '';
        const r = sailsysResults[String(e.boat && e.boat.id)];
        return (r && r.points != null) ? r.points : '';
      }}
  ];

  function activeCols() {
    const oneDivision = uniqueDivisionCount() < 2;
    const admin = (typeof isAdmin === 'function') && isAdmin();
    return ENTRANT_COLS.filter(c => {
      if (!IS_EDITABLE && c.editableOnly) return false;
      // No point showing Division when every boat is in the same one.
      if (c.key === 'division' && oneDivision) return false;
      // TCF column is admin-only. Race officers can't edit it (SailSys
      // returns 403 on the underlying handicap PUT) and shouldn't see it
      // either — keep the table focused on the timing affordances they need.
      if (c.key === 'tcf' && !admin) return false;
      // Non-pursuit races: per-entrant Allocated + Start columns are
      // meaningless (every boat in a division shares one gun time). The
      // per-division Start panel above the table replaces them.
      if (!isPursuit && (c.key === 'start' || c.key === 'actualStart')) return false;
      return true;
    });
  }

  function uniqueDivisionCount() {
    const set = new Set();
    for (const e of entrantData) {
      const id = e.division && e.division.id;
      if (id != null) set.add(id);
    }
    return set.size;
  }

  let sortKey = null;
  let sortDir = 1;

  function compareValues(a, b) {
    // Empty values (null, undefined, '') always sort to the end regardless of
    // direction. Without this, a column like Place (where DNC/unprocessed
    // boats produce '') would sort empties first ascending, which the RO
    // never wants — finishers should always cluster at the top.
    const aEmpty = (a == null || a === '');
    const bEmpty = (b == null || b === '');
    if (aEmpty && bEmpty) return 0;
    if (aEmpty) return 1;
    if (bEmpty) return -1;
    const aNum = typeof a === 'number';
    const bNum = typeof b === 'number';
    if (aNum && bNum) {
      if (isNaN(a) && isNaN(b)) return 0;
      if (isNaN(a)) return 1;
      if (isNaN(b)) return -1;
      return a - b;
    }
    return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' });
  }

  function orderedEntrants() {
    let rows;
    // Column sort wins over manual drag order. Picking a sort column hides
    // the drag order temporarily; the next drag will rebuild boatOrder from
    // the sorted view and clear sortKey.
    if (sortKey) {
      const col = ENTRANT_COLS.find(c => c.key === sortKey);
      rows = entrantData.slice().sort((a, b) =>
        sortDir * compareValues(col.get(a), col.get(b)));
    } else if (IS_EDITABLE) {
      // Honour boatOrder: any boats listed are returned in that order; any
      // entrants not yet in boatOrder (newly added since the last save) go to
      // the end in their original SailSys order. Empty boatOrder = use the
      // SailSys order as-is.
      const byId = new Map(entrantData.map(e => [String(e.boat && e.boat.id), e]));
      const out = [];
      const seen = new Set();
      for (const id of boatOrder) {
        const e = byId.get(String(id));
        if (e) { out.push(e); seen.add(String(id)); }
      }
      for (const e of entrantData) {
        const id = String(e.boat && e.boat.id);
        if (!seen.has(id)) out.push(e);
      }
      rows = out;
    } else {
      rows = entrantData.slice();
    }
    // "Hide DNC" filter: drop any boats not currently flagged as Came.
    // Applied AFTER ordering so the underlying boatOrder isn't perturbed —
    // toggling the filter just shows/hides rows. Duty boats are AVG (not
    // DNC) but came is forced false for them, so they'd also be hidden;
    // that matches the user's expectation since they're not racing either.
    if (IS_EDITABLE && hideDnc) {
      rows = rows.filter(e => {
        const t = getTimes(e.boat && e.boat.id);
        return t && t.came;
      });
    }
    return rows;
  }

  function renderEntrants() {
    const tbody = document.getElementById('entrants-tbody');
    const cols = activeCols();
    recomputePlaces();
    const rows = orderedEntrants();
    tbody.innerHTML = rows.map(e => {
      const boatId = e.boat && e.boat.id;
      const cells = cols.map(c => {
        const cls = c.cellClass ? ' class="' + c.cellClass + '"' : '';
        if (c.render) {
          return '<td' + cls + '>' + c.render(e) + '</td>';
        }
        const v = c.get(e);
        const display = (typeof v === 'number' && isNaN(v)) ? '' : v;
        return '<td' + cls + '>' + esc(display) + '</td>';
      }).join('');
      const dragAttrs = IS_EDITABLE ? ' draggable="true"' : '';
      return '<tr data-boat-id="' + esc(boatId) + '"' + dragAttrs + '>' + cells + '</tr>';
    }).join('');

    if (IS_EDITABLE) {
      wireTcfInputs();
      wireTimeInputs();
      wireDrag();
      wireEntrantsKeyHandlers();
    }
  }

  function wireTcfInputs() {
    document.querySelectorAll('input.tcf-input').forEach(inp => {
      inp.oninput = () => {
        const id = Number(inp.dataset.boatId);
        const orig = Number(inp.dataset.original);
        const v = Number(inp.value);
        if (!isNaN(v) && v !== orig) {
          dirtyTcf.set(id, v);
          inp.classList.add('dirty');
        } else {
          dirtyTcf.delete(id);
          inp.classList.remove('dirty');
        }
        // Mark invalid when the value cannot be interpreted as a Number.
        if (isNaN(v)) inp.classList.add('invalid');
        else inp.classList.remove('invalid');
        updateSaveBar();
        sessionSaveForm();
      };
    });
  }

  function wireTimeInputs() {
    document.querySelectorAll('input.came-input').forEach(inp => {
      inp.onchange = () => {
        const id = Number(inp.dataset.boatId);
        const t = getTimes(id);
        t.came = inp.checked;
        // Re-render this row so the time inputs enable/disable.
        renderEntrants();
        updateSaveBar();
        sessionSaveForm();
      };
    });
    document.querySelectorAll('input.time-input').forEach(inp => {
      // + and - bump the displayed time; = is treated the same as + (same
      // physical key on US keyboards — saves reaching for Shift on a busy
      // NOW evening). Granularity is decided by bumpTimeValue (see its
      // doc): one colon = minute, two or more = seconds. Wraps mod 24 h.
      // Unparseable values pass through without consuming the key.
      inp.onkeydown = (ev) => {
        const k = ev.key;
        const isPlus = (k === '+' || k === '=');
        const isMinus = (k === '-');
        if (!isPlus && !isMinus) return;
        const next = bumpTimeValue(inp.value, isPlus ? 1 : -1);
        if (next == null) return;
        ev.preventDefault();
        inp.value = next;
        try { inp.setSelectionRange(next.length, next.length); } catch (_) {}
        // Reuse the oninput pipeline so dirty/elapsed/late/save-bar/session
        // state all update exactly as they would for typed input.
        inp.dispatchEvent(new Event('input'));
      };
      inp.onfocus = () => {
        // Prefill empty time inputs so the RO only has to key the delta:
        //   Actual Start → "HH:MM:" from the boat's scheduled start
        //   Finish       → "HH:MM" from the most recent finish (or sched+60)
        // The prefilled marker lets blur clear the field if nothing was typed.
        if (inp.value) return;
        const id = inp.dataset.boatId;
        const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(id));
        let prefix = null;
        if (inp.dataset.field === 'actualStart') {
          prefix = startPrefix(entrant && entrant.startTimeLocal);
        } else if (inp.dataset.field === 'finish') {
          prefix = finishPrefix(entrant);
        }
        if (!prefix) return;
        inp.value = prefix;
        inp.dataset.prefilled = '1';
        // The browser places the caret based on the click coordinates AFTER
        // the focus handler returns, which would put it at position 0 for a
        // click on an empty box. Defer the caret move so it wins the race.
        setTimeout(() => {
          try { inp.setSelectionRange(prefix.length, prefix.length); } catch (_) {}
        }, 0);
      };
      inp.oninput = () => {
        // Any typing means the user took ownership of the value — drop the
        // prefilled marker so blur won't clear it.
        delete inp.dataset.prefilled;
        const id = Number(inp.dataset.boatId);
        const field = inp.dataset.field;
        const t = getTimes(id);
        t[field] = inp.value || null;
        const tr = inp.closest('tr');
        updateElapsedCell(tr, id);
        updateFlagsCell(tr, id);
        // Mark invalid while the value cannot be parsed into a canonical time.
        if (!inp.value) {
          inp.classList.remove('invalid');
        } else {
          const can = reformatTime(inp.value);
          if (can) inp.classList.remove('invalid');
          else inp.classList.add('invalid');
        }
        updateSaveBar();
        sessionSaveForm();
      };
      inp.onblur = () => {
        const id = Number(inp.dataset.boatId);
        const field = inp.dataset.field;
        const t = getTimes(id);
        if (inp.dataset.prefilled) {
          // Prefilled but unchanged — clear back to empty so the field stays
          // honest about whether a time has actually been captured.
          inp.value = '';
          t[field] = null;
          delete inp.dataset.prefilled;
          // Clearing leaves the field non-invalid.
          inp.classList.remove('invalid');
        } else {
          const canon = reformatTime(inp.value);
          if (canon) {
            inp.value = canon;
            t[field] = canon;
            if (field === 'finish') lastFinishTime = canon;
            inp.classList.remove('invalid');
          }
          // If unparseable, leave the raw text in place — oninput already
          // stored it on timesMap so the dirty state is honest.
          else {
            // Mark invalid so the user sees the problem.
            inp.classList.add('invalid');
          }
        }
        const tr = inp.closest('tr');
        updateElapsedCell(tr, id);
        updateFlagsCell(tr, id);
        updateSaveBar();
        sessionSaveForm();
      };
    });
    document.querySelectorAll('button.now-btn').forEach(btn => {
      btn.onclick = () => {
        const id = Number(btn.dataset.boatId);
        const field = btn.dataset.field;
        const now = localNow();
        const t = getTimes(id);
        t[field] = now;
        if (field === 'finish') lastFinishTime = now;
        const tr = btn.closest('tr');
        const inp = tr.querySelector('input.time-input[data-field="' + field + '"]');
        if (inp) {
          inp.value = now;
          // NOW is an explicit commit; if the user had focus and we'd
          // prefilled, the prefill is now superseded.
          delete inp.dataset.prefilled;
          // NOW provides a valid canonical time.
          inp.classList.remove('invalid');
        }
        updateElapsedCell(tr, id);
        updateFlagsCell(tr, id);
        updateSaveBar();
        sessionSaveForm();
        logNow(id, field, now);
      };
    });
  }

  function logNow(boatId, field, time) {
    const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(boatId));
    const sail = entrant && entrant.boat && entrant.boat.sailNumber;
    const name = entrant && entrant.boat && entrant.boat.name;
    nowLog.push({ time, field, sail, name });
    renderNowLog();
    sessionSaveNowLog();
  }

  function logNowUnattached() {
    nowLog.push({ time: localNow() });
    renderNowLog();
    sessionSaveNowLog();
  }

  function renderNowLog() {
    const list = document.getElementById('now-log-list');
    if (nowLog.length === 0) {
      list.innerHTML = '<li style="color: #888; list-style: none; margin-left: -1.5em;">(no NOW clicks yet)</li>';
      return;
    }
    // Earliest first (ascending). Sort by parsed time where possible so
    // entries read top-to-bottom from oldest to newest.
    const sorted = nowLog.slice().sort((a, b) => {
      const pa = parseTime(a.time);
      const pb = parseTime(b.time);
      if (pa != null && pb != null) return pa - pb;
      return String(a.time).localeCompare(String(b.time));
    });
    list.innerHTML = sorted.map(e => {
      // Entries from the standalone NOW button have no field/boat — render
      // just the time. Boat-tied entries get " — start/finish for <boat>".
      const fld = e.field === 'actualStart' ? 'start'
                : e.field === 'finish'      ? 'finish' : null;
      const who = [e.sail, e.name].filter(Boolean).map(esc).join(' ');
      const tail = fld
        ? (' — ' + esc(fld) + (who ? ' for ' + who : ''))
        : '';
      return '<li><code>' + esc(e.time) + '</code>' + tail + '</li>';
    }).join('');
  }

  function updateElapsedCell(tr, boatId) {
    const cols = activeCols();
    const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(boatId));
    const t = getTimes(boatId);
    const a = parseTime(actualStartFor(entrant));
    const f = parseTime(t.finish);

    const elapsedIdx = cols.findIndex(c => c.key === 'elapsed');
    if (elapsedIdx >= 0) {
      const penalty = entrant ? penaltySecondsForEntrant(entrant) : 0;
      const txt = (a != null && f != null) ? fmtElapsed(f - a + penalty) : '';
      const cells = tr.querySelectorAll('td');
      if (cells[elapsedIdx]) cells[elapsedIdx].textContent = txt;
    }
    const lateIdx = cols.findIndex(c => c.key === 'late');
    if (lateIdx >= 0 && entrant) {
      const cells = tr.querySelectorAll('td');
      if (cells[lateIdx]) cells[lateIdx].textContent = fmtLate(lateSeconds(entrant));
    }
    // A finish-time change rearranges Place/Points across every row. Patch
    // those cells in place rather than re-rendering — a full re-render would
    // recreate the input the user is currently typing in and steal focus.
    patchPlacesPoints();
  }

  function updateFlagsCell(tr, boatId) {
    const cols = activeCols();
    const idx = cols.findIndex(c => c.key === 'flags');
    if (idx >= 0) {
      const entrant = entrantData.find(e => String(e.boat && e.boat.id) === String(boatId));
      const flags = flagsForEntrant(entrant);
      const txt = flags.length ? flags.join(', ') : '';
      const cells = tr.querySelectorAll('td');
      if (cells[idx]) cells[idx].textContent = txt;
    }
    // Flags can affect places (e.g., OCS penalty), so re-patch places.
    patchPlacesPoints();
  }

  // In-place refresh of the Place + Points cells after a time / flag edit.
  // Delegates to each column's own `get` function so the right source-of-
  // truth wins per cell: Place falls back to local placeMap when results
  // are dirty (otherwise sailsysResults); Points returns '' whenever the
  // race state is dirty, since local computation has no notion of
  // pointscore. (Earlier this helper wrote the place value into BOTH
  // cells, which surfaced the place number as bogus "points" the moment
  // the user edited a time.)
  function patchPlacesPoints() {
    recomputePlaces();
    const cols = activeCols();
    const placeIdx = cols.findIndex(c => c.key === 'place');
    const pointsIdx = cols.findIndex(c => c.key === 'points');
    if (placeIdx < 0 && pointsIdx < 0) return;
    const placeCol = placeIdx >= 0 ? cols[placeIdx] : null;
    const pointsCol = pointsIdx >= 0 ? cols[pointsIdx] : null;
    const fmt = (v) => (typeof v === 'number' && isNaN(v)) ? '' : (v == null ? '' : String(v));
    document.querySelectorAll('#entrants-tbody tr').forEach(tr => {
      const boatId = tr.dataset.boatId;
      const entrant = entrantData.find(e => String(e.boat && e.boat.id) === boatId);
      if (!entrant) return;
      const cells = tr.querySelectorAll('td');
      if (placeCol && cells[placeIdx]) cells[placeIdx].textContent = fmt(placeCol.get(entrant));
      if (pointsCol && cells[pointsIdx]) cells[pointsIdx].textContent = fmt(pointsCol.get(entrant));
    });
  }

  // HTML5 native drag-drop: drag whole row, reorder boatOrder, re-render.
  let dragSrcId = null;
  function wireDrag() {
    document.querySelectorAll('#entrants-tbody tr').forEach(tr => {
      tr.ondragstart = (ev) => {
        dragSrcId = tr.dataset.boatId;
        tr.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', dragSrcId);
      };
      tr.ondragend = () => {
        tr.classList.remove('dragging');
        document.querySelectorAll('tr.drag-over').forEach(x => x.classList.remove('drag-over'));
      };
      tr.ondragover = (ev) => {
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('tr.drag-over').forEach(x => x.classList.remove('drag-over'));
        tr.classList.add('drag-over');
      };
      tr.ondragleave = () => {
        tr.classList.remove('drag-over');
      };
      tr.ondrop = (ev) => {
        ev.preventDefault();
        tr.classList.remove('drag-over');
        const srcId = dragSrcId;
        const dstId = tr.dataset.boatId;
        if (!srcId || srcId === dstId) return;
        // Rebuild boatOrder from the current rendered order, then move src
        // immediately before dst. Doing this BEFORE clearing sortKey means we
        // capture whatever the user currently sees as their new manual order.
        const cur = orderedEntrants().map(e => String(e.boat && e.boat.id));
        const arr = cur.filter(x => x !== srcId);
        const at = arr.indexOf(dstId);
        arr.splice(at < 0 ? arr.length : at, 0, srcId);
        // Dropping just past a row's mid-line can produce an identical visual
        // order — e.g. dragging row B onto the row immediately below it
        // re-inserts B in the same slot. Don't mark the form dirty in that
        // case; otherwise SAVE would surface "times changed" with no actual
        // change to push.
        const unchanged = arr.length === cur.length && arr.every((id, i) => id === cur[i]);
        if (unchanged) return;
        boatOrder = arr;
        // Any new manual ordering deselects the column sort.
        sortKey = null;
        renderEntrantsHead();
        renderEntrants();
        updateSaveBar();
        sessionSaveForm();
      };
    });
  }

  // Keyboard handling for inputs in the entrants table. When the user hits
  // Tab or Enter while focused on an input in the table, accept the current
  // value (trigger blur handlers/formatting) and move focus to the entry
  // immediately below in the visual order (the DOM order), preserving the
  // column index. This respects the current sort order because the tbody
  // rows are rendered in that order.
  function wireEntrantsKeyHandlers() {
    const tbody = document.getElementById('entrants-tbody');
    if (!tbody || tbody.dataset.keywired) return;
    tbody.dataset.keywired = '1';
    tbody.addEventListener('keydown', (ev) => {
      const k = ev.key;
      if (k !== 'Tab' && k !== 'Enter') return;
      const target = ev.target;
      if (!target) return;
      // Only handle relevant inputs inside the table.
      if (!target.matches('input.time-input, input.tcf-input, input.came-input')) return;
      // Intercept default Tab behaviour so we can move vertically instead of
      // horizontally. Prevent native tabbing.
      ev.preventDefault();

      // Commit the current value by blurring — existing onblur/oninput
      // handlers will take care of formatting and state updates.
      try { target.blur(); } catch (_) {}

      const tr = target.closest('tr');
      if (!tr) return;
      const rows = Array.from(tbody.querySelectorAll('tr'));
      const idx = rows.indexOf(tr);
      if (idx < 0) return;
      // Determine the TD index of the focused control so we can focus the
      // same column in the next/previous row (works even when columns are hidden
      // or reordered by sorting/dragging).
      const td = target.closest('td');
      if (!td) return;
      const tds = Array.from(tr.querySelectorAll('td'));
      const cellIndex = tds.indexOf(td);
      if (cellIndex < 0) return;

      // Support Shift+Tab to move up; otherwise move down one row. If the
      // same-column control in the immediate row is absent or disabled, walk
      // until we find a focusable control or run out of rows.
      const dir = (ev.shiftKey ? -1 : 1);
      let scanIdx = idx + dir;
      let next = null;
      while (scanIdx >= 0 && scanIdx < rows.length) {
        const candidate = rows[scanIdx];
        const nextTds = Array.from(candidate.querySelectorAll('td'));
        if (cellIndex < nextTds.length) {
          const f = nextTds[cellIndex].querySelector('input, button, select, textarea');
          if (f && !f.disabled) { next = candidate; break; }
        }
        scanIdx += dir;
      }
      if (!next) return; // nothing suitable
      // Focusable control determined during scanning above.
      const nextTds = Array.from(next.querySelectorAll('td'));
      const focusable = nextTds[cellIndex].querySelector('input, button, select, textarea');
      if (!focusable || focusable.disabled) return;

      // Move focus after a tick so blur/commit handlers run first.
      setTimeout(() => {
        try { focusable.focus(); } catch (_) {}
        // If the target is a text input, place caret at end for convenience.
        try {
          if ((focusable.classList && focusable.classList.contains('time-input'))
              || (focusable.tagName === 'INPUT' && focusable.type === 'text')) {
            const len = focusable.value ? focusable.value.length : 0;
            if (typeof focusable.setSelectionRange === 'function') focusable.setSelectionRange(len, len);
          }
        } catch (_) {}
      }, 0);
    });
  }

  // --- dirty/save plumbing ---

  function currentTimesPayload() {
    // Use the persisted boatOrder for the ids list (drag-set order, with
    // entrantData as the fallback for boats that haven't been dragged).
    // Display sort is a transient view and MUST NOT be folded into what's
    // saved — and crucially, calling orderedEntrants() here used to create
    // a recursion when sortKey was set:
    //   currentTimesPayload → orderedEntrants (sort by Place)
    //     → col.get(Place) → isResultsClean() → isAnyDirty()
    //     → isTimesDirty() → currentTimesPayload → orderedEntrants → …
    // which silently aborted the sort and left rows in their original
    // order despite the active sort marker.
    const byId = new Map(entrantData.map(e => [String(e.boat && e.boat.id), e]));
    const seen = new Set();
    const ids = [];
    for (const raw of (boatOrder || [])) {
      const id = String(raw);
      if (byId.has(id) && !seen.has(id)) { ids.push(id); seen.add(id); }
    }
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      if (!seen.has(id)) ids.push(id);
    }
    const times = {};
    for (const id of ids) {
      const t = timesMap.get(id);
      if (!t) continue;
      times[id] = { came: !!t.came, actualStart: t.actualStart || null, finish: t.finish || null };
    }
    // Note: divisionStarts is NOT bundled here — for non-pursuit races the
    // actual gun time is pushed directly to SailSys (via the
    // /division-starts endpoint) on Save. SailSys is the source of truth
    // for the value; local JSON only holds per-boat times + order metadata.
    return {
      raceId: String(raceIdGlobal),
      boatOrder: ids,
      dutyBoatId: dutyBoatId || null,
      times
    };
  }

  function isTimesDirty() {
    if (!IS_EDITABLE) return false;
    const payload = currentTimesPayload();
    return JSON.stringify(payload.times) !== originalTimesJson
        || JSON.stringify(payload.boatOrder) !== originalOrderJson
        || (payload.dutyBoatId || '') !== (originalDutyBoatId || '')
        || isDivisionStartsDirty();
  }

  function updateSaveBar() {
    const bar = document.getElementById('save-bar');
    const summary = document.getElementById('save-summary');
    const tcfN = dirtyTcf.size;
    const timesD = isTimesDirty();
    if (tcfN > 0 || timesD) {
      bar.style.display = '';
      const parts = [];
      if (tcfN > 0) parts.push(tcfN + ' TCF edit' + (tcfN === 1 ? '' : 's'));
      if (timesD) parts.push('times changed');
      summary.textContent = parts.join(', ') + '.';
    } else {
      bar.style.display = 'none';
      summary.textContent = '';
    }
  }

  // Repeat columns (sail2, name2) share their original's sort behaviour via
  // a `sortKey` override — clicking either Sail # header toggles the same sort.
  const sortKeyForCol = (c) => c.sortKey || c.key;

  function renderEntrantsHead() {
    const head = document.getElementById('entrants-head');
    const cols = activeCols();
    head.innerHTML = cols.map(c => {
      const sortable = c.sortable !== false;
      const myKey = sortKeyForCol(c);
      let marker = '';
      if (sortable && sortKey === myKey) marker = '<span class="sort-marker">' + (sortDir > 0 ? '▲' : '▼') + '</span>';
      const cls = sortable ? ' class="sortable"' : '';
      return '<th' + cls + ' data-key="' + myKey + '">' + esc(c.label) + marker + '</th>';
    }).join('');
    head.querySelectorAll('th.sortable').forEach(th => {
      th.onclick = () => {
        const k = th.dataset.key;
        if (sortKey === k) sortDir = -sortDir;
        else { sortKey = k; sortDir = 1; }
        renderEntrantsHead();
        renderEntrants();
      };
    });
  }

  function renderStatus(status, raceId) {
    const heading = document.getElementById('race-heading');
    const grid = document.getElementById('status-grid');
    document.getElementById('race-status').style.display = '';

    currentStatus = status;
    seriesIdForSave = status ? status.seriesId : null;
    // Refresh derived race-level flags every time the status arrives — they
    // can flip across the page's lifetime (e.g. Process Results flipping
    // resultStatus from 0 → 2 changes isCurrentRace; an admin changing the
    // race type in SailSys would change isPursuit on next status fetch).
    isCurrentRace = !!(status && (status.resultStatus || 0) < 2);
    isPursuit = computeIsPursuit(status);
    // Show the race name in the page heading with the id in parentheses
    // afterwards when a name is available, otherwise fall back to "Race N".
    let title;
    if (status && status.name) title = status.name + ' (id ' + raceId + ')';
    else title = 'Race ' + raceId;
    if (isCurrentRace) title += ' — current race';
    heading.textContent = title;

    // Visibility rows render a tickbox inline with the status text (editable
    // mode only). Ticking = publish, unticking = unpublish — same calls that
    // the old buttons made, just driven from the status grid.
    const procStatus = status ? (status.handicapAndStartTimeProcessingStatus ?? 0) : 0;
    const processing = procStatus === 1;
    const vis = (flag, endpoint) => {
      const pub = flag === 1;
      const label = VIS(flag);
      if (!IS_EDITABLE) return esc(label);
      const dis = processing ? ' disabled' : '';
      return '<label class="vis-toggle">'
        + '<input type="checkbox" class="vis-check" data-endpoint="' + endpoint + '"'
        + (pub ? ' checked' : '') + dis + '> ' + esc(label) + '</label>';
    };

    // List of status rows shown in the status grid. We intentionally omit
    // the standalone Race ID row (the race id is now shown in the page
    // heading) and a few other rows the RO doesn't need here.
    // Results status: selector for Hidden/Provisional/Final + (when
    // appropriate) a "Process Results" button. Disabled in read-only mode;
    // also disabled when local data is dirty or SailSys still owes us a
    // recalculation.
    const resultsStatusHtml = (() => {
      const rs = status ? (status.resultStatus ?? 0) : 0;
      const reqCalc = status ? !!status.requiresResultCalculation : false;
      if (!IS_EDITABLE) return esc(resultStatusLabel(rs));
      const dirty = isAnyDirty();
      const cur = resultStatusUrlCode(rs);
      // `processing` here is start-times processing (unrelated to results) —
      // don't let it gate the results selector. Disable only when local data
      // is dirty (would publish stale state) or when SailSys still owes us a
      // recalculation of the just-pushed results.
      const selDisabled = (dirty || reqCalc) ? ' disabled' : '';
      let html = '<select id="results-status-sel"' + selDisabled + '>';
      for (const opt of [[0, 'Hidden'], [1, 'Provisional'], [2, 'Final']]) {
        html += '<option value="' + opt[0] + '"' + (opt[0] === cur ? ' selected' : '')
          + '>' + esc(opt[1]) + '</option>';
      }
      html += '</select>';
      if (reqCalc && !dirty) {
        html += ' <button type="button" id="process-results-btn"' + (processing ? ' disabled' : '') + '>'
          + 'Process Results</button>';
      } else if (reqCalc && dirty) {
        html += ' <span style="color:#888;">(SAVE first, then process)</span>';
      }
      return html;
    })();

    const rows = [
      ['Date',             esc(fmtDate(status && status.dateTime))],
      ['Series',           esc(status && status.seriesName ? status.seriesName + ' (id ' + status.seriesId + ')' : '')],
      ['Entrants visibility', status ? vis(status.raceEntrantVisibility, 'entrants-visibility') : '']
    ];
    // "Start times visibility" is a pursuit-only concept — it controls the
    // publication of the staggered per-boat start sheet. Fleet races don't
    // have a per-boat start sheet, so the row is meaningless and is hidden.
    if (isPursuit) {
      rows.push(['Start times visibility',
        status ? vis(status.handicapAndStartTimeVisibility, 'start-times-visibility') : '']);
    }
    rows.push(
      ['Results status',   resultsStatusHtml],
      // requiresResultCalculation is the authoritative SailSys flag for
      // "results are out of date relative to the last finishers PUT".
      // isProcessingNeeded is a separate (and observed-always-false) field
      // that we previously surfaced here — don't trust it.
      ['Processing needed?', esc(status ? (status.requiresResultCalculation ? 'yes' : 'no') : '')]
    );
    // Non-pursuit: append one row per division with the gun time. Scheduled
    // shows what's currently in SailSys; actual is an editable HH:MM:SS
    // input that defaults to scheduled and gets pushed to SailSys via the
    // /division-starts endpoint on Save. NOW button only appears in
    // live-timing mode.
    if (!isPursuit && status && Array.isArray(status.divisionTiming)) {
      for (const d of status.divisionTiming) {
        if (!d || d.divisionId == null) continue;
        const divId = d.divisionId;
        const name = d.divisionName || ('Div ' + divId);
        const sched = divisionScheduledStart(divId) || '';
        const actual = (divisionStartsMap.get(String(divId)) || sched || '');
        const dirty = (divisionStartsMap.has(String(divId))
          && divisionStartsMap.get(String(divId)) !== sched) ? ' dirty' : '';
        const nowBtn = isCurrentRace
          ? ('<button type="button" class="now-btn div-now-btn" data-div-id="' + esc(divId) + '">NOW</button>')
          : '';
        const cell = '<span style="color:#666; margin-right:0.4rem;">sched ' + esc(sched || '—') + '</span>'
          + '<input type="text" class="time-input division-start' + dirty + '"'
          + ' placeholder="HH:MM:SS" data-div-id="' + esc(divId) + '"'
          + ' value="' + esc(actual) + '">'
          + (nowBtn ? ' ' + nowBtn : '');
        rows.push([name + ' start', cell]);
      }
    }
    grid.innerHTML = rows.map(([k, v]) => '<dt>' + esc(k) + '</dt><dd>' + v + '</dd>').join('');
    // Division-start inputs/NOW buttons live inside the status grid now —
    // wire them after the grid is rebuilt.
    wireDivisionStartInputs();
    grid.querySelectorAll('input.vis-check').forEach(cb => {
      cb.onchange = () => doVisibility(cb.dataset.endpoint, cb.checked);
    });
    const rsSel = document.getElementById('results-status-sel');
    if (rsSel) rsSel.onchange = () => doSetResultsStatus(Number(rsSel.value));
    const procBtn = document.getElementById('process-results-btn');
    if (procBtn) procBtn.onclick = doProcessResults;

    renderControls();
    // Status updates can flip isCurrentRace (resultStatus crossing 2 after
    // Process Results) — keep the NOW-log section in sync. (Division start
    // inputs are now rendered inline in the status grid above.)
    updateNowLogSection();
  }

  // Controls panel: course length + process start times, duty boat selector.
  // The course-length row is for the PRE-RACE start-time computation step;
  // once the race is under way (any boat ticked as came) or its results have
  // been published (Provisional/Final), there's no point re-running it, so
  // it's hidden in those states.
  function renderControls() {
    const panel = document.getElementById('race-controls');
    if (!IS_EDITABLE || !currentStatus) {
      panel.style.display = 'none';
      panel.innerHTML = '';
      return;
    }
    const s = currentStatus;
    const procStatus = s.handicapAndStartTimeProcessingStatus ?? 0;
    const processing = procStatus === 1;

    // Course length: prefilled from divisionTiming[0] (MYC Twilight has one
    // division). If multiple divisions exist, the server applies the entered
    // value to all of them.
    const dt = Array.isArray(s.divisionTiming) ? s.divisionTiming[0] : null;
    const currentCourse = (dt && dt.courseLength) ? dt.courseLength : '';

    // Show the course-length / Process start times row whenever start
    // times have not been published — the RO can recompute a start sheet
    // any time they haven't committed one. (Even a race that was
    // previously processed and published becomes a candidate again once
    // its start sheet is unpublished or its starters/finishes are wiped.)
    // Hidden for non-pursuit races: start-time processing on SailSys is
    // the pursuit-staggering pipeline, not a concept that applies to
    // fleet starts.
    const startTimesPublished = (s.handicapAndStartTimeVisibility ?? 0) === 1;
    const showCourseRow = isPursuit && !startTimesPublished;

    // Duty boat selector: populated from entrantData; if set, that boat is
    // marked AVG and its Came checkbox is disabled.
    const dutyOptions = ['<option value="">(none)</option>']
      .concat(entrantData.map(e => {
        const id = e.boat && e.boat.id;
        const sail = e.boat && e.boat.sailNumber || '';
        const name = e.boat && e.boat.name || '';
        return '<option value="' + esc(id) + '"' + (String(dutyBoatId) === String(id) ? ' selected' : '') + '>'
          + esc(sail + (name ? ' ' + name : '')) + '</option>';
      }));

    // Process Handicaps — back-calculate next-race TCFs from this race's
    // results via the Jinx algorithm and push them to SailSys. Admin-only:
    // writing TCFs requires admin permission and race officers see a note
    // directing them to ask an admin. The Jinx algorithm itself isn't
    // implemented yet, so the admin button is rendered disabled with a
    // TODO marker. Only shown once SailSys has finished its own result
    // processing — there's nothing to back-calculate from before then.
    // Also gated on isOurHandicap: when the series uses a different default
    // handicap, this app has no business computing replacements for it.
    const admin = (typeof isAdmin === 'function') && isAdmin();
    const resultsReady = !!s.lastProcessedTime && !s.requiresResultCalculation;
    const handicapsHtml = (resultsReady && isOurHandicap)
      ? (admin
          ? `<div class="controls-row">
               <button id="ctrl-handicaps" class="primary" disabled
                       title="Jinx algorithm not yet implemented">Process Handicaps (TODO)</button>
               <span style="color:#888;">Compute next-race TCFs from this race's results.</span>
             </div>`
          : `<div class="controls-row">
               <span style="color:#555;">Next-race handicaps need to be processed by an admin user.</span>
             </div>`)
      : '';

    panel.style.display = '';
    panel.innerHTML = (showCourseRow ? `
      <div class="controls-row">
        <label>Course length:
          <input type="number" id="ctrl-course" step="0.1" min="0"
                 value="${esc(currentCourse)}" style="width: 5em;">
        </label>
        <button id="ctrl-process" class="primary" ${processing ? 'disabled' : ''}>
          ${processing ? 'Processing…' : 'Process start times'}
        </button>
      </div>` : '') + `
      <div class="controls-row">
        <label>Duty boat:
          <select id="ctrl-duty-boat">` + dutyOptions.join('') + `</select>
        </label>
      </div>` + handicapsHtml;
    const procBtn = document.getElementById('ctrl-process');
    if (procBtn) procBtn.onclick = doProcess;
    document.getElementById('ctrl-duty-boat').onchange = () => {
      const sel = document.getElementById('ctrl-duty-boat');
      const val = sel.value;
      dutyBoatId = val ? String(val) : null;
      // Duty boats are flagged AVG; their captured times don't count. Clear
      // came + start + finish so the row tells the truth even if the user had
      // already filled them in. (Persists on next SAVE alongside dutyBoatId.)
      if (dutyBoatId) {
        const t = getTimes(dutyBoatId);
        if (t) { t.came = false; t.actualStart = null; t.finish = null; }
      }
      renderEntrantsHead();
      renderEntrants();
      updateSaveBar();
      sessionSaveForm();
    };
  }

  function divisionBoatIds(divisionId) {
    return entrantData
      .filter(e => e && e.division && String(e.division.id) === String(divisionId))
      .map(e => String(e.boat && e.boat.id));
  }

  // After a per-division actualStart change, refresh the Elapsed/Late/Flags
  // cells for every boat in that division. Reuses the same per-cell helpers
  // the per-boat time inputs trigger.
  function refreshDivisionRows(divisionId) {
    for (const id of divisionBoatIds(divisionId)) {
      const tr = document.querySelector('#entrants-tbody tr[data-boat-id="' + id + '"]');
      if (!tr) continue;
      updateElapsedCell(tr, id);
      updateFlagsCell(tr, id);
    }
  }

  // Bump a typed time value by one minute or one second, depending on the
  // structure of the typed input. The granularity is decided purely by how
  // many colons the user has typed — not by whether the time happens to
  // parse cleanly:
  //   "HH:MM"     →  minute mode (one colon, no trailing colon)
  //   "HH:MM:"    →  SECOND mode, treated as "HH:MM:00"
  //   "HH:MM:S"   →  second mode, treated as "HH:MM:0S"
  //   "HH:MM:SS"  →  second mode
  // The trailing-colon and short-second cases are common while the user is
  // mid-type (e.g. just hit ':' to start the seconds segment); the previous
  // rule mis-classified them as minute mode.
  // Wraps modulo 24 h so the bumped value never goes negative or overflows.
  function bumpTimeValue(raw, sign) {
    if (!raw) return null;
    const colonCount = (raw.match(/:/g) || []).length;
    if (colonCount < 1) return null;
    const dayS = 86400;
    const pad = (n) => String(n).padStart(2, '0');
    if (colonCount === 1) {
      const m = raw.match(/^(\d{1,2}):(\d{1,2})$/);
      if (!m) return null;
      const total = (Number(m[1]) * 60 + Number(m[2])) * 60;
      const next = (((total + sign * 60) % dayS) + dayS) % dayS;
      return pad(Math.floor(next / 3600)) + ':' + pad(Math.floor((next % 3600) / 60));
    }
    // Two or more colons → seconds mode. Tolerate an empty seconds segment
    // ("HH:MM:" — assume :00), a single-digit seconds segment ("HH:MM:S"
    // — pad to :0S), or the standard "HH:MM:SS" with an optional ".sss"
    // suffix.
    const m = raw.match(/^(\d{1,2}):(\d{1,2}):(\d{0,2})(?:\.\d{1,3})?$/);
    if (!m) return null;
    const ssRaw = m[3] || '';
    const ss = ssRaw === '' ? 0 : Number(ssRaw.length === 1 ? '0' + ssRaw : ssRaw);
    const total = (Number(m[1]) * 60 + Number(m[2])) * 60 + ss;
    const next = (((total + sign) % dayS) + dayS) % dayS;
    return fmtElapsed(next);
  }

  // Time strings are considered equal if their parsed seconds-since-midnight
  // match. Handles "HH:MM:SS" vs "HH:MM:SS.000" vs "H:MM" etc. Used for
  // dirty detection where the same gun time can be expressed multiple ways.
  function timeStringsEqual(a, b) {
    const aEmpty = !a;
    const bEmpty = !b;
    if (aEmpty && bEmpty) return true;
    if (aEmpty || bEmpty) return false;
    const pa = parseTime(reformatTime(a) || a);
    const pb = parseTime(reformatTime(b) || b);
    if (pa == null || pb == null) return a === b;
    return pa === pb;
  }

  function wireDivisionStartInputs() {
    document.querySelectorAll('input.division-start').forEach(inp => {
      inp.onkeydown = (ev) => {
        const k = ev.key;
        // Enter commits the value by blurring — onblur runs reformatTime
        // (HH:MM: → HH:MM:00, HH:MM:S → HH:MM:0S), then refreshes the
        // dependent cells.
        if (k === 'Enter') {
          ev.preventDefault();
          try { inp.blur(); } catch (_) {}
          return;
        }
        const isPlus = (k === '+' || k === '=');
        const isMinus = (k === '-');
        if (!isPlus && !isMinus) return;
        const next = bumpTimeValue(inp.value, isPlus ? 1 : -1);
        if (next == null) return;
        ev.preventDefault();
        inp.value = next;
        try { inp.setSelectionRange(next.length, next.length); } catch (_) {}
        inp.dispatchEvent(new Event('input'));
      };
      inp.oninput = () => {
        const divId = inp.dataset.divId;
        // Track every keystroke — the dirty check compares against the
        // SailSys-current scheduled value (timeStringsEqual), so reverting
        // back to scheduled correctly de-dirties without us having to
        // delete entries here.
        divisionStartsMap.set(String(divId), inp.value || null);
        refreshDivisionRows(divId);
        if (!inp.value) inp.classList.remove('invalid');
        else if (reformatTime(inp.value)) inp.classList.remove('invalid');
        else inp.classList.add('invalid');
        updateSaveBar();
        sessionSaveForm();
      };
      inp.onblur = () => {
        const divId = inp.dataset.divId;
        const canon = reformatTime(inp.value);
        const sched = divisionScheduledStart(Number(divId));
        if (canon) {
          inp.value = canon;
          // Once normalized, if the typed value equals scheduled we drop
          // the entry so divisionStartsMap holds only real edits.
          if (timeStringsEqual(canon, sched)) {
            divisionStartsMap.delete(String(divId));
          } else {
            divisionStartsMap.set(String(divId), canon);
          }
          inp.classList.remove('invalid');
        } else if (inp.value) {
          inp.classList.add('invalid');
        } else {
          // User cleared the input — empty == no override, treat as not edited.
          divisionStartsMap.delete(String(divId));
        }
        // Update the dirty marker on the input itself.
        const stillDirty = divisionStartsMap.has(String(divId))
          && !timeStringsEqual(divisionStartsMap.get(String(divId)), sched);
        inp.classList.toggle('dirty', !!stillDirty);
        refreshDivisionRows(divId);
        updateSaveBar();
        sessionSaveForm();
      };
    });
    document.querySelectorAll('button.div-now-btn').forEach(btn => {
      btn.onclick = () => {
        const divId = btn.dataset.divId;
        const now = localNow();
        divisionStartsMap.set(String(divId), now);
        const inp = document.querySelector('input.division-start[data-div-id="' + divId + '"]');
        if (inp) {
          inp.value = now;
          inp.classList.remove('invalid');
          inp.classList.add('dirty');
        }
        refreshDivisionRows(divId);
        updateSaveBar();
        sessionSaveForm();
        // Log the NOW click in the session log with a div tag so the RO can
        // see it among the per-boat NOW captures.
        nowLog.push({ time: now, field: 'divStart-' + divId });
        renderNowLog();
        sessionSaveNowLog();
      };
    });
  }

  // True when any divisionStartsMap entry differs from SailSys's current
  // scheduled start for that division. Non-pursuit-only — the map is empty
  // for pursuit races.
  function isDivisionStartsDirty() {
    if (isPursuit) return false;
    for (const [divIdStr, val] of divisionStartsMap) {
      if (!val) continue;
      const sched = divisionScheduledStart(Number(divIdStr));
      if (!timeStringsEqual(val, sched)) return true;
    }
    return false;
  }

  function ctrlMsg(cls, text) {
    const el = document.getElementById('controls-msg');
    if (!text) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'banner ' + cls;
    el.textContent = text;
    el.style.display = '';
  }

  // Like ctrlMsg but accepts trusted HTML — used for the long-running
  // Process Results progress display. Callers must hand-escape any
  // user-supplied content; here it's all hard-coded strings + numbers.
  function ctrlMsgHtml(cls, html) {
    const el = document.getElementById('controls-msg');
    el.className = 'banner ' + cls;
    el.innerHTML = html;
    el.style.display = '';
  }

  async function doVisibility(endpoint, published) {
    setControlsDisabled(true);
    ctrlMsg('banner-info', (published ? 'Publishing' : 'Unpublishing') + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/' + endpoint,
      { published });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    renderStatus(r.body.status, raceIdGlobal);
    ctrlMsg('banner-ok', (published ? 'Published.' : 'Unpublished.'));
  }

  async function doSetResultsStatus(code) {
    setControlsDisabled(true);
    const label = ['Hidden', 'Provisional', 'Final'][code] || ('code=' + code);
    ctrlMsg('banner-info', 'Setting results status to ' + label + '…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/results-status',
      { status: code });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    renderStatus(r.body.status, raceIdGlobal);
    ctrlMsg('banner-ok', 'Results status set to ' + label + '.');
  }

  async function doProcessResults() {
    setControlsDisabled(true);
    // The server holds the request open while polling SailSys for up to 90s.
    // Drive a visible elapsed-time / progress bar so the RO can see the page
    // is alive and roughly how close to timeout we are.
    const startMs = Date.now();
    const TIMEOUT_S = 90;
    const tick = setInterval(() => {
      const elapsed = (Date.now() - startMs) / 1000;
      const secs = Math.floor(elapsed);
      const pct = Math.min(100, Math.round((elapsed / TIMEOUT_S) * 100));
      const bar = '<div class="progress"><div class="progress-bar" style="width:' + pct + '%"></div></div>';
      const dot = '⏳'.repeat(((secs % 3) + 1));
      ctrlMsgHtml('banner-info',
        '<strong>' + dot + ' Processing results in SailSys…</strong> '
        + '<span style="color:#555;">' + secs + 's / ' + TIMEOUT_S + 's</span>' + bar);
    }, 500);
    try {
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process-results', {});
      clearInterval(tick);
      if (!r.ok) {
        ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        setControlsDisabled(false);
        return;
      }
      if (r.body && r.body.error) {
        // Timed out; render whatever status came back so the user can retry.
        renderStatus(r.body.status, raceIdGlobal);
        ctrlMsg('banner-warn', r.body.error);
        return;
      }
      sailsysResults = parseSailsysResults(r.body.results);
      renderStatus(r.body.status, raceIdGlobal);
      renderEntrants();
      const took = Math.round((Date.now() - startMs) / 100) / 10;
      ctrlMsg('banner-ok', 'Results processed in ' + took + 's.');
    } finally {
      clearInterval(tick);
    }
  }

  async function doProcess() {
    const courseInp = document.getElementById('ctrl-course');
    const courseLength = Number(courseInp.value);
    if (!courseLength || courseLength <= 0) {
      ctrlMsg('banner-warn', 'Enter a course length first.');
      courseInp.focus();
      return;
    }
    setControlsDisabled(true);
    ctrlMsg('banner-info', 'Setting course length and waiting for SailSys to process…');
    const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/process',
      { courseLength });
    if (!r.ok) {
      ctrlMsg('banner-err', 'Failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
      setControlsDisabled(false);
      return;
    }
    if (r.body && r.body.error) {
      // Timed out waiting for SailSys; still re-render with whatever status we got.
      renderStatus(r.body.status, raceIdGlobal);
      ctrlMsg('banner-warn', r.body.error);
    } else {
      renderStatus(r.body.status, raceIdGlobal);
      ctrlMsg('banner-ok', 'Processed. Start times updated for course length ' + courseLength + '.');
    }
    // Refetch entrants — their startTimeLocal will have changed after processing.
    await loadEntrants();
  }

  function setControlsDisabled(disabled) {
    ['ctrl-process', 'ctrl-course'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = disabled;
    });
    document.querySelectorAll('input.vis-check').forEach(cb => { cb.disabled = disabled; });
  }

  async function loadEntrants() {
    const r = await fetchJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/entrants');
    if (!r.ok) return r;
    entrantData = (r.body && Array.isArray(r.body.entrants)) ? r.body.entrants : [];
    document.getElementById('entrants-count').textContent = '(' + entrantData.length + ')';
    document.getElementById('race-entrants').style.display = '';
    renderEntrantsHead();
    renderEntrants();
    // Controls include a duty-boat selector populated from entrantData; re-render
    // controls so the selector is up-to-date.
    renderControls();
    return r;
  }

  function doReset() {
    if (!confirm('Discard all unsaved edits and refetch this race from SailSys?')) return;
    // Drop the in-tab autosave so the reload doesn't immediately restore the
    // edits we're throwing away. NOW-log entries live under a separate key
    // and are preserved — they're a record of clicks the RO may still want.
    try { sessionStorage.removeItem(SESSION_KEY('form')); } catch (_) {}
    location.reload();
  }

  async function doSave() {
    const btn = document.getElementById('save-btn');
    const summary = document.getElementById('save-summary');
    const state = document.getElementById('race-state');
    btn.disabled = true;

    const messages = [];
    let anyError = false;

    // --- TCFs first (writes to SailSys) ---
    // Skip the whole block when the series doesn't use our handicap —
    // there is no input that could populate dirtyTcf in that case, but be
    // defensive in case sessionStorage from a different mode leaked in.
    if (dirtyTcf.size > 0 && isOurHandicap) {
      if (!seriesIdForSave) {
        state.className = 'banner banner-err';
        state.textContent = 'Internal: seriesId not yet known. Reload and try again.';
        btn.disabled = false;
        return;
      }
      function spinnakerTypeFor(boatId) {
        const e = entrantData.find(x => x.boat && x.boat.id === boatId);
        if (!e) return 1;
        const h = e.handicap && e.handicap.currentHandicaps && e.handicap.currentHandicaps[0];
        if (h && h.spinnakerType != null) return h.spinnakerType;
