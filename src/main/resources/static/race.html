<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sail-jinx — Race</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Mark invalid inputs red while they contain an unparsable value. */
    input.invalid { color: red !important; }
    input.invalid::placeholder { color: #f99; }
    /* Ensure number inputs show red digits when invalid in browsers that
       support styling of number inputs. */
    input[type="number"].invalid { color: red !important; }
  </style>
</head>
<body>
<!-- INCLUDE _nav.html -->

<main>
  <h1 id="race-heading">Race</h1>

  <section id="race-status" style="display:none;">
    <!-- Fixed-height status box: readouts (race type, processing, results
         source, dirty status) + a reserved message line for operation
         feedback / progress. Fixed height so the layout never jumps as the
         status text changes. Built by renderStatusBox(). -->
    <div id="status-box">
      <dl class="status-grid" id="status-readouts"></dl>
      <div id="status-msg"></div>
    </div>

    <!-- Ordered workflow controls (publish entrants, start times / course /
         process, publish start times, process results / publish results,
         process handicaps, duty boat). Built by renderControls(). -->
    <div id="workflow"></div>

    <div id="race-nav" style="display:flex; gap:0.4rem; margin-top:0.5rem;">
        <button id="race-prev-btn" type="button" disabled>&larr; Previous race</button>
        <button id="race-next-btn" type="button" disabled>Next race &rarr;</button>
    </div>
  </section>

  <section id="race-entrants" style="display:none;">
    <h2>Entrants
      <span id="entrants-count" style="font-weight: normal; color: #666; font-size: 0.85em;"></span>
      <label id="handicap-selector-wrap" style="display:none; font-weight: normal; font-size: 0.85em; color: #555; margin-left: 1rem;">
        Results by: <select id="handicap-selector"></select>
      </label>
      <label id="hide-dnc-toggle" style="display:none; font-weight: normal; font-size: 0.85em; color: #555; margin-left: 1rem;">
        <input type="checkbox" id="hide-dnc"> Hide DNC
      </label>
      <label id="show-sailsys-toggle" style="font-weight: normal; font-size: 0.85em; color: #555; margin-left: 1rem;">
        <input type="checkbox" id="show-sailsys"> Show sailsys
      </label>
    </h2>
    <div id="tcf-mismatch-banner" class="banner banner-warn" style="display:none;"></div>
    <table id="entrants-table">
      <thead>
        <tr id="entrants-head"></tr>
      </thead>
      <tbody id="entrants-tbody"></tbody>
    </table>
    <div id="save-bar" style="display:none;">
      <button id="save-btn" class="primary">Save</button>
      <button id="reset-btn" type="button">Reset</button>
      <span id="save-summary" style="margin-left: 1rem; color: #555;"></span>
    </div>
  </section>

  <section id="now-log" style="margin-top: 2rem;">
    <h2>NOW button log <span style="font-weight: normal; color: #888; font-size: 0.85em;">(this session only)</span></h2>
    <p style="margin: 0 0 0.5rem; color: #666; font-size: 0.9em;">Drag an entry onto any time field to set it.</p>
    <ol id="now-log-list"></ol>
  </section>
</main>

<script src="/common.js"></script>
<script>
  const VIS = (n) => ({0: 'draft', 1: 'published'}[n] ?? ('vis=' + n));
  const PROC = (n) => ({0: 'pending', 1: 'processing', 2: 'processed'}[n] ?? ('proc=' + n));

  function fmtDate(s) { return s ? String(s).slice(0, 10) : ''; }

  // The race page no longer takes any edit-mode URL flags. It is always
  // editable subject to user permissions / race type / handicap type, and
  // "is this race currently live" is derived from the race's own state:
  // a race is treated as current (and gets the live-timing affordances — TCF
  // input, per-row + per-division NOW buttons, the NOW log section) until it
  // is fully published, i.e. its entrants AND its results are published. See
  // the isCurrentRace computation in renderStatus for the exact rule and why
  // it deliberately avoids the sticky resultStatus field.
  const PARAMS = new URLSearchParams(location.search);
  // The page is always editable now; per-feature gating is via isAdmin /
  // isOurHandicap / isPursuit. IS_EDITABLE is kept as a constant so the
  // many `if (IS_EDITABLE)` branches stay readable rather than being
  // collapsed inline — also leaves a single chokepoint for any future
  // read-only mode (e.g. spectator view).
  const IS_EDITABLE = true;
  // isCurrentRace is recomputed every time the race status lands (initial
  // load, after SAVE, after Process Results, etc.). Defaults to false so
  // the initial paint (before status arrives) doesn't show NOW buttons that
  // would then disappear once we know better.
  let isCurrentRace = false;

  // Publication-state flags, recomputed in renderStatus from the race status.
  // They gate input editability across the page:
  //   entrantsPublished  → TCF inputs become read-only (TCFs must not change
  //                        once entrants are published).
  //   resultsPublished   → finish / flag / came / actualStart inputs become
  //                        read-only and Process Results disappears.
  //   startTimesPublished→ per-division start + course inputs become
  //                        read-only and Process start times disappears.
  let entrantsPublished = false;
  let resultsPublished = false;
  let startTimesPublished = false;

  let raceIdGlobal = null;
  let seriesIdForSave = null;       // populated from race status
  let currentStatus = null;         // latest race status (for controls + grid)
  const nowLog = [];                // every NOW click, newest pushed last; in-memory only
  let lastFinishTime = null;        // most recent finish time entered this page; used to seed next finish prefill
  let entrantData = [];             // entrants as returned by SailSys
  let boatOrder = [];               // ordered list of boatIds (drag order)
  const dirtyTcf = new Map();       // boatId -> edited TCF (Number)
  let dutyBoatId = null;            // boatId of selected duty boat, or null
  // Per-boat manual flag overrides — see wiki §5.2 "Manual flag overrides".
  // boatId(string) → { added: string[], removed: string[] }. Persisted in
  // sessionStorage as part of the form payload and treated as a dirty
  // signal by isAnyDirty(). The effective flag set displayed and used by
  // recomputePlaces is (SailSys ∪ auto-from-times ∪ added) \ removed —
  // see effectiveFlagsForEntrant() below.
  let dirtyFlags = new Map();

  // Race classification — derived once the data lands and consulted by the
  // column / panel renderers below.
  //   configHandicapId is the configured handicapDefinitionId (e.g. 15 = MYC
  //   TCF). isOurHandicap is true when at least one entrant carries a current
  //   handicap whose definition matches configHandicapId — i.e. this race is
  //   scored against the handicap our app manages. isPursuit is true when
  //   every division in this race is raceType=0 (pursuit start). Non-pursuit
  //   races use per-division start gun times; pursuit races stagger per boat.
  let configHandicapId = null;
  let isOurHandicap = false;
  let isPursuit = true;

  // divisionStartsMap is the live, editable per-division start time, used for
  // BOTH race types: divisionId (String) -> "HH:MM". For a scratch start this
  // is the division's allocated gun time; for a pursuit race it is the
  // division's earliest start (the anchor SailSys staggers from). Pursuit also
  // captures per-boat actualStart on timesMap. Snapshot for dirty detection
  // mirrors timesMap's originalTimesJson.
  let divisionStartsMap = new Map();
  let originalDivisionStartsJson = '';

  // divisionCourseMap is the live, editable per-division course length for a
  // pursuit race: divisionId (String) -> Number (nautical miles). Empty for
  // scratch starts (no staggering, so no course length). Dirty-checked against
  // divisionScheduledCourse() the same way divisionStartsMap is checked
  // against divisionScheduledStart().
  let divisionCourseMap = new Map();

  // Times state. timesMap is the live editable view; originalTimesJson is the
  // serialized snapshot we compare against to decide whether the times block
  // is dirty (covers both per-row edits and drag-reordering).
  let timesMap = new Map();         // boatId -> {came, actualStart, finish}
  let originalTimesJson = '';
  let originalOrderJson = '';
  let originalDutyBoatId = null;    // for dirty detection on duty-boat changes
  let hideDnc = false;              // UI filter: when true, hide non-Came boats from the table
  let showSailsys = false;          // UI toggle: when true, reveal the Sailsys Elapsed / Corrected columns

  // SailSys-computed results cache. Populated from /api/races/{id}/computed-results
  // on load and after Process Results. Shape: { boatId: {place, points, flags} }.
  // Only treated as authoritative when isResultsClean() is true (race processed
  // AND nothing dirty locally).
  let sailsysResults = {};

  // Jinx handicap adjustments produced by the Process Handicaps button (or
  // restored from /api/races/{id}/pending-handicaps on page load). Map of
  // boatId(string) -> Adjustment { boatId, finishPosition, penaltyMinutes,
  // rewardMinutes, netAdjustmentMinutes, oldTcf, newTcf }. While this map is
  // non-empty the entrants table grows an "Adjustment" column and the
  // Process Handicaps panel offers a SAVE button.
  let nextStartAdjustments = new Map();
  let nextStartSaved = false;     // true once these adjustments have been
                                  // saved locally (so SAVE flips to "Saved.")

  // Local per-race TCF snapshot — see wiki §6 "Local TCF history". When a
  // snapshot exists, currentTcf() prefers it over the SailSys-supplied
  // currentHandicaps[].value (so a past race keeps its historical TCFs
  // even after SailSys overwrites for a later race). On a race that hasn't
  // been processed yet (isCurrentRace) we also surface a Push/Reset banner
  // when the snapshot diverges from SailSys.
  let snapshotTcf = new Map();      // boatId(string) -> Number
  let sailsysTcf = new Map();       // boatId(string) -> Number (from entrants)
  let snapshotMeta = null;          // {savedAt, source, sourceRaceId, sourceRaceNumber} or null

  // SailSys calibration (V₀) used by the engine to convert each boat's net
  // adjustment minutes into a new TCF. Loaded once on page load via
  // GET /api/calibration; Process Handicaps is gated on this being non-null
  // (it's the only thing the engine uses to project TCFs). Refreshed when
  // the admin Saves a fresh calibration.
  let currentCalibration = null;

  // Club-wide handicap-definition catalogue, fetched once from
  // GET /api/handicap-definitions. Maps stringified id → {shortName, fullName}.
  // Used to label the SailSys-mode entries in the Handicap selector.
  let handicapDefs = {};

  // Which handicap drives the Place + Points columns and the local placeMap.
  // In SailSys-authoritative mode this is a numeric handicapDefinitionId
  // (matched against sailsysResults[id].byHandicap); in local mode it's the
  // string 'scratch' | 'pursuit' | 'tcf'. Persisted per-race via
  // SESSION_KEY('form'). null until the first populate.
  let selectedHandicap = null;

  function isAnyDirty() {
    return dirtyTcf.size > 0 || dirtyFlags.size > 0 || isTimesDirty();
  }

  // A divergent local TCF snapshot is pending application to SailSys for this
  // race — either the next-race TCFs queued by the previous race's Save
  // Handicaps (source PROCESS_HANDICAPS) or a manual TCF edit saved locally
  // (MANUAL_EDIT). This is the state the old TCF-mismatch banner handled; it
  // is now surfaced through the normal SAVE/RESET bar + status box. Pushing /
  // resetting the snapshot is admin-only, so only admins see it as actionable.
  function snapshotDivergent() {
    return snapshotTcf.size > 0 && snapshotDiffersFromSailsys();
  }
  function snapshotPendingPush() {
    const admin = (typeof isAdmin === 'function') && isAdmin();
    return admin && snapshotDivergent();
  }

  // True when SailSys's computed results can be displayed as the
  // authoritative source of truth: the race must have been processed
  // (no recalc pending) AND there must be no local edits in flight. In
  // this mode the Place / Points / Flags columns mirror SailSys
  // exactly — if SailSys has no place/points for a boat, the cell stays
  // blank (no local fallback).
  //
  // A race being merely "Final" (resultStatus === 4) is NOT sufficient
  // on its own: if local edits are in flight, those represent pending
  // pushes that haven't yet been accepted by SailSys, so the derived
  // columns can't claim the SailSys values either.
  function isResultsClean() {
    if (!IS_EDITABLE) return false;
    if (!currentStatus) return false;
    if (!sailsysResults || Object.keys(sailsysResults).length === 0) return false;
    if (isAnyDirty()) return false;
    if (currentStatus.requiresResultCalculation) return false;
    return true;
  }

  // HTML snippet for the "Results source" status row. Returns a coloured
  // span explaining where the Flags / Place / Points columns are sourced
  // from right now. Priority order: dirty edits > pending recalc >
  // SailSys-clean > never-processed. Inline styles match the rest of the
  // status grid (which already mixes inline styling).
  //
  // TODO: add a mode for "results clean in SailSys but next-race
  // handicaps still need to be processed by the Jinx algorithm". That
  // state is currently lumped under "SailSys (authoritative)" because
  // results display is unaffected, but the user has a pending admin
  // action (Process Handicaps) before the next race's TCFs can be
  // pushed. Likely two sub-states once Jinx is implemented:
  //   - "SailSys (authoritative) — handicaps pending"
  //     (Process Handicaps not yet run)
  //   - "SailSys (authoritative) — handicaps pending push"
  //     (Jinx has computed next TCFs locally but they haven't been
  //     written back to SailSys)
  // Each should be distinct from plain "SailSys (authoritative)" so an
  // admin can see at a glance whether they still owe SailSys an update.
  function resultsSourceCell() {
    if (isResultsClean()) {
      return '<span style="color:#155724;font-weight:bold;">'
        + 'SailSys (authoritative)</span>';
    }
    if (isAnyDirty()) {
      return '<span style="color:#856404;font-weight:bold;">'
        + 'Local &mdash; pending push to SailSys</span>';
    }
    if (currentStatus && currentStatus.requiresResultCalculation) {
      return '<span style="color:#856404;font-weight:bold;">'
        + 'Local &mdash; SailSys recalc needed</span>';
    }
    return '<span style="color:#666;">'
      + 'Local &mdash; never processed</span>';
  }

  // Flag short-names that always mean "this boat doesn't have a finishing
  // place". SailSys returns numeric placings[0].place even for these boats
  // (so it can still sort them internally) but its own UI displays the
  // flag instead of the number. We mirror that.
  //
  // OCS is conditional: in a pursuit race, OCS adds a 5 min penalty to
  // elapsed time on a boat that still finished — those boats DO get a
  // place. In a scratch start, OCS means the boat crossed early and is
  // disqualified from the result, so no place. The pursuit-vs-scratch
  // branch lives in parseSailsysResults below where we know which mode
  // the race is in.
  const FLAGS_WITHOUT_PLACE_BASE = new Set([
    'DNC', 'DNF', 'DNS', 'DSQ', 'RET', 'ABD', 'AVG'
  ]);

  // Flatten the GET /races/{id}/results competitors tree into a per-boat map.
  // calculations[] is one entry per handicap definition SailSys scored — we
  // keep all of them keyed by handicapDefinitionId so the Handicap selector
  // can swap views without re-fetching.
  //
  // SailSys exposes the **scratch / elapsed-time** scoring as a calc entry
  // with {@code handicapDefinitionId == null}. We store that under the
  // reserved key {@code 'scratch'} so it sits in the selector alongside
  // the named handicaps (PHS, MYC TCF, etc.) without a synthetic local
  // computation.
  //
  // Penalty handling: SailSys's standard penalties carry a
  // `definitionShortName` (DNC/DNF/DNS/DSQ/OCS/RET/ABD) that we use as the
  // flag label. The duty-boat / average-points case is a special stub
  // `{averagePoints: true}` with NO shortname — we recognise it explicitly
  // and label it 'AVG'. A boat carrying any flag in the no-place set has
  // its place forced to null — SailSys's internal numeric rank for those
  // boats is an artefact of its sorting, not a displayable place. The set
  // includes OCS only for scratch starts.
  //
  // {@code elapsedTime} is captured here so the Elapsed column can use
  // SailSys's authoritative value in Mode A (it already accounts for
  // start-line penalties and any handicap adjustments SailSys applies).
  //
  // Per-boat record shape:
  //   { flags, elapsedTime,
  //     byHandicap: { 'scratch'|<handicapDefId>: { place, points, correctedTime } } }
  function parseSailsysResults(data) {
    const map = {};
    if (!data || !Array.isArray(data.competitors)) return map;
    const noPlaceFlags = isPursuit
      ? FLAGS_WITHOUT_PLACE_BASE
      : new Set([...FLAGS_WITHOUT_PLACE_BASE, 'OCS']);
    for (const c of data.competitors) {
      if (!Array.isArray(c.items)) continue;
      for (const it of c.items) {
        const boatId = (it.boat && it.boat.id) || it.id;
        if (boatId == null) continue;
        const penalties = Array.isArray(it.penalties) ? it.penalties : [];
        const flags = [];
        for (const p of penalties) {
          if (!p) continue;
          if (p.averagePoints === true) {
            flags.push('AVG');
            continue;
          }
          if (p.definitionShortName) flags.push(p.definitionShortName);
        }
        const hasNoPlaceFlag = flags.some(f => noPlaceFlags.has(f));
        const byHandicap = {};
        const calcs = Array.isArray(it.calculations) ? it.calculations : [];
        for (const calc of calcs) {
          if (!calc) continue;
          const defId = calc.handicapDefinitionId;
          const key = (defId == null) ? 'scratch' : String(defId);
          const placing = Array.isArray(calc.placings) ? calc.placings[0] : null;
          const place = hasNoPlaceFlag
            ? null
            : (placing && placing.place != null ? placing.place : null);
          const points = (placing && placing.points != null) ? placing.points : null;
          // SailSys puts correctedTime sometimes on the calc, sometimes on
          // the first placing — accept either so the Sailsys/Corrected
          // column populates regardless of which payload variant lands.
          const correctedTime = calc.correctedTime
            || (placing && placing.correctedTime)
            || null;
          byHandicap[key] = { place, points, correctedTime };
        }
        const elapsedTime = it.elapsedTime || null;
        map[String(boatId)] = { flags, elapsedTime, byHandicap };
      }
    }
    return map;
  }

  // resultStatus mapping. SailSys reports a single integer covering both
  // "processing state" and "visibility":
  //   0,1 → Hidden / pending recalc
  //   2   → Hidden but recalc complete
  //   3   → Provisional
  //   4   → Final
  // The URL path /results/status/{N} uses 0/1/2 = Hidden/Provisional/Final.
  function resultStatusLabel(rs) {
    if (rs == null) return '';
    if (rs <= 2) return 'Hidden';
    if (rs === 3) return 'Provisional';
    if (rs === 4) return 'Final';
    return 'state=' + rs;
  }
  function resultStatusUrlCode(rs) {
    if (rs == null || rs <= 2) return 0;
    if (rs === 3) return 1;
    if (rs === 4) return 2;
    return 0;
  }

  // sessionStorage acts as an in-tab autosave so a refresh doesn't lose typed
  // times/TCF edits, NOW clicks, or drag order. Only the SAVE button writes to
  // disk on the server — session storage is purely for crash/reload recovery
  // within this browser tab.
  const SESSION_KEY = (suffix) => 'sail-jinx.race.' + raceIdGlobal + '.' + suffix;

  function sessionSaveForm() {
    if (!raceIdGlobal) return;
    try {
      sessionStorage.setItem(SESSION_KEY('form'), JSON.stringify({
        timesMap: Array.from(timesMap.entries()),
        boatOrder: boatOrder,
        dutyBoatId: dutyBoatId,
        divisionStarts: Array.from(divisionStartsMap.entries()),
        divisionCourses: Array.from(divisionCourseMap.entries()),
        dirtyTcf: Array.from(dirtyTcf.entries()),
        // Serialise dirtyFlags as [[boatId, {added, removed}], ...].
        // added/removed are arrays so JSON survives the round-trip.
        dirtyFlags: Array.from(dirtyFlags.entries())
          .map(([id, ov]) => [id, { added: ov.added || [], removed: ov.removed || [] }]),
        hideDnc: hideDnc,
        showSailsys: showSailsys,
        selectedHandicap: selectedHandicap
      }));
    } catch (_) { /* private mode or quota — silent best effort */ }
  }

  function sessionSaveNowLog() {
    if (!raceIdGlobal) return;
    try { sessionStorage.setItem(SESSION_KEY('nowLog'), JSON.stringify(nowLog)); }
    catch (_) {}
  }

  function sessionRestoreForm() {
    if (!raceIdGlobal) return;
    try {
      const raw = sessionStorage.getItem(SESSION_KEY('form'));
      if (!raw) return;
      const p = JSON.parse(raw);
      if (Array.isArray(p.timesMap)) timesMap = new Map(p.timesMap);
      if (Array.isArray(p.boatOrder)) boatOrder = p.boatOrder.map(String);
      dutyBoatId = p.dutyBoatId ? String(p.dutyBoatId) : null;
      if (Array.isArray(p.divisionStarts)) {
        divisionStartsMap = new Map(p.divisionStarts.map(([k, v]) => [String(k), v]));
      }
      if (Array.isArray(p.divisionCourses)) {
        divisionCourseMap = new Map(p.divisionCourses.map(([k, v]) => [String(k), Number(v)]));
      }
      hideDnc = !!p.hideDnc;
      showSailsys = !!p.showSailsys;
      // selectedHandicap may be a string (local mode label) or a number
      // (SailSys handicapDefinitionId). populateHandicapSelector validates
      // the saved value against the currently-available options and falls
      // back to the per-mode default if it no longer applies.
      if (p.selectedHandicap !== undefined) selectedHandicap = p.selectedHandicap;
      // Manual flag overrides — restore as a Map so size + lookups work.
      // Skip entries that are empty (both added and removed empty arrays)
      // since they shouldn't have been persisted in the first place.
      if (Array.isArray(p.dirtyFlags)) {
        dirtyFlags = new Map();
        for (const [id, ov] of p.dirtyFlags) {
          const added = Array.isArray(ov && ov.added) ? ov.added : [];
          const removed = Array.isArray(ov && ov.removed) ? ov.removed : [];
          if (added.length || removed.length) {
            dirtyFlags.set(String(id), { added, removed });
          }
        }
      }
      // Only restore dirty TCF state when entrants are NOT published AND we
      // manage the handicap. Published races / foreign-handicap series have no
      // editable TCF input, so reviving the dirt would permanently mark the
      // page dirty without offering the user any way to clear it.
      if (!entrantsPublished && isOurHandicap && Array.isArray(p.dirtyTcf)) {
        dirtyTcf.clear();
        for (const [k, v] of p.dirtyTcf) dirtyTcf.set(Number(k), Number(v));
      }
    } catch (_) {}
  }

  function sessionRestoreNowLog() {
    if (!raceIdGlobal) return;
    try {
      const raw = sessionStorage.getItem(SESSION_KEY('nowLog'));
      if (!raw) return;
      const p = JSON.parse(raw);
      if (Array.isArray(p)) {
        nowLog.length = 0;
        for (const e of p) nowLog.push(e);
      }
    } catch (_) {}
  }

  function emptyTimes() { return { came: false, actualStart: null, finish: null }; }

  // Keys in timesMap are always strings; entrant ids from SailSys are numbers,
  // so always coerce on access.
  function getTimes(boatId) {
    const k = String(boatId);
    if (!timesMap.has(k)) timesMap.set(k, emptyTimes());
    return timesMap.get(k);
  }

  function originalTcf(e) {
    const h = e.handicap && e.handicap.currentHandicaps && e.handicap.currentHandicaps[0];
    return h ? Number(h.value) : NaN;
  }

  function currentTcf(e) {
    const id = e.boat && e.boat.id;
    if (dirtyTcf.has(id)) return dirtyTcf.get(id);
    const k = String(id);
    if (snapshotTcf.has(k)) return snapshotTcf.get(k);
    return originalTcf(e);
  }

  // All internal time math is in seconds-since-midnight (integer). The RO
  // captures wall-clock times manually — sub-second precision isn't useful in
  // a pursuit handicap context. Legacy "HH:MM:SS.sss" values written by older
  // versions are accepted on parse (sub-second portion is dropped).
  function parseTime(s) {
    if (!s) return null;
    // Accept HH:MM (seconds default to 0) as well as HH:MM:SS. The per-division
    // start inputs are HH:MM; per-boat actual/finish times remain HH:MM:SS.
    const m = String(s).trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?(?:\.\d{1,3})?$/);
    if (!m) return null;
    return (Number(m[1]) * 60 + Number(m[2])) * 60 + (m[3] ? Number(m[3]) : 0);
  }

  function fmtElapsed(secs) {
    if (secs == null || secs < 0) return '';
    const h = Math.floor(secs / 3600);
    const mi = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    const pad = (n) => String(n).padStart(2, '0');
    return pad(h) + ':' + pad(mi) + ':' + pad(s);
  }

  // Like fmtElapsed but for a time-of-day (seconds-since-midnight). Used by
  // the Jinx Finish column to show scored_finish_time as HH:MM:SS so it can
  // be compared against the Actual Finish input directly. Wraps at 24h
  // (modulo) so a value > 86400 still renders sensibly.
  function fmtTimeOfDay(secs) {
    if (secs == null || !Number.isFinite(secs)) return '';
    const total = Math.floor(((secs % 86400) + 86400) % 86400);
    const h = Math.floor(total / 3600);
    const mi = Math.floor((total % 3600) / 60);
    const s = total % 60;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(h) + ':' + pad(mi) + ':' + pad(s);
  }

  function localNow() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  // Reformat user-typed times to canonical HH:MM:SS. Tolerant of:
  //   "H:M"        → ":00" seconds
  //   "H:M:"       → trailing colon, treated as ":00"
  //   "H:M:S"      → single-digit second padded to ":0S"
  //   "H:M:S.sss"  → legacy millis suffix dropped
  // Returns null if the input still doesn't parse — caller leaves the raw
  // text in place so the user can fix it. The blur and Enter paths both
  // funnel through here so the same normalisation applies on focus loss
  // and on Enter keypress.
  function reformatTime(s) {
    if (!s) return null;
    const m = String(s).trim().match(/^(\d{1,2}):(\d{1,2})(?::(\d{0,2}))?(?:\.\d{1,3})?$/);
    if (!m) return null;
    const h = Number(m[1]);
    const mi = Number(m[2]);
    const ss = (m[3] != null && m[3] !== '') ? Number(m[3]) : 0;
    if (h > 23 || mi > 59 || ss > 59) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(h) + ':' + pad(mi) + ':' + pad(ss);
  }

  // Reformat user-typed times to canonical HH:MM (no seconds). Used by the
  // per-division start inputs (allocated/earliest start), which are minute-
  // granularity. Tolerant of "H:M", a trailing colon, and a seconds segment
  // (which is dropped — "18:00:30" → "18:00"). Returns null if unparseable so
  // the caller can leave the raw text in place for the user to fix.
  function reformatHHMM(s) {
    if (!s) return null;
    const m = String(s).trim().match(/^(\d{1,2}):(\d{1,2})(?::\d{0,2})?(?:\.\d{1,3})?$/);
    if (!m) return null;
    const h = Number(m[1]);
    const mi = Number(m[2]);
    if (h > 23 || mi > 59) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(h) + ':' + pad(mi);
  }

  // "HH:MM:" prefix from a SailSys startTimeLocal — used to prefill an empty
  // Actual Start input so the RO only has to key the seconds. SailSys may
  // return plain "HH:MM:SS" or an ISO "...T18:13:00" string; both work.
  function startPrefix(sched) {
    if (!sched) return null;
    const m = String(sched).match(/(?:^|T)(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    const pad = (n, w) => String(n).padStart(w, '0');
    return pad(Number(m[1]), 2) + ':' + pad(Number(m[2]), 2) + ':';
  }

  // "HH:MM" prefix for an empty Finish input. Boats in a pursuit race tend to
  // finish bunched together, so once one finish is recorded the next is most
  // likely in the same minute — basis the prefill on the most recent finish
  // this session. Before any finish has been entered, fall back to the boat's
  // scheduled start + 60 min as a sensible "rough race length" guess.
  function finishPrefix(entrant) {
    const pad = (n) => String(n).padStart(2, '0');
    if (lastFinishTime) {
      const m = lastFinishTime.match(/^(\d{1,2}):(\d{1,2})/);
      if (m) return pad(Number(m[1])) + ':' + pad(Number(m[2]));
    }
    const sched = entrant && entrant.startTimeLocal;
    if (sched) {
      const m = String(sched).match(/(?:^|T)(\d{1,2}):(\d{1,2})/);
      if (m) {
        const total = Number(m[1]) * 60 + Number(m[2]) + 60;
        return pad(Math.floor(total / 60) % 24) + ':' + pad(total % 60);
      }
    }
    return null;
  }

  // Parse a scheduled start string (HH:MM, HH:MM:SS, or ISO containing
  // 'T18:13' / 'T18:13:42') to seconds-since-midnight. Seconds are
  // preserved when present — important for staggered pursuit allocated
  // starts which are computed per-second by SailSys. Returns null on
  // failure.
  function parseScheduledSeconds(sched) {
    if (!sched) return null;
    const m = String(sched).match(/(?:^|T)(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
    if (!m) return null;
    const ss = m[3] ? Number(m[3]) : 0;
    return (Number(m[1]) * 60 + Number(m[2])) * 60 + ss;
  }

  // The actualStart time for an entrant — pursuit races stagger per boat
  // (held on timesMap[boatId].actualStart); scratch starts share one gun
  // time per division (held on divisionStartsMap when the user has captured
  // it locally, else on SailSys's currentStatus.divisionTiming.startTimeLocal
  // — for scratch starts SailSys treats that field AS the gun time, so once
  // saved it IS the actual). Returns null when nothing is available.
  function actualStartFor(entrant) {
    if (isPursuit) {
      const id = entrant && entrant.boat && entrant.boat.id;
      const t = getTimes(id);
      return t ? (t.actualStart || null) : null;
    }
    const divId = entrant && entrant.division && entrant.division.id;
    if (divId == null) return null;
    if (divisionStartsMap.has(String(divId))) {
      const v = divisionStartsMap.get(String(divId));
      if (v) return v;
    }
    return divisionScheduledStart(divId);
  }

  // Pull a division's start time straight out of currentStatus.divisionTiming
  // and return it as "HH:MM". For a scratch start this is the allocated gun
  // time; for a pursuit race it is the division's earliest start. Seconds are
  // dropped — the per-division start is minute-granularity. Returns null when
  // the status hasn't loaded yet or the division isn't in divisionTiming.
  function divisionScheduledStart(divisionId) {
    if (!currentStatus || !Array.isArray(currentStatus.divisionTiming)) return null;
    const dt = currentStatus.divisionTiming.find(d => d && d.divisionId === divisionId);
    if (!dt || !dt.startTimeLocal) return null;
    const m = String(dt.startTimeLocal).match(/(?:^|T)(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(Number(m[1])) + ':' + pad(Number(m[2]));
  }

  // A division's course length straight out of currentStatus.divisionTiming.
  // Returns a Number, or null when unavailable. Pursuit-only in practice
  // (scratch starts carry no meaningful course length for our purposes).
  function divisionScheduledCourse(divisionId) {
    if (!currentStatus || !Array.isArray(currentStatus.divisionTiming)) return null;
    const dt = currentStatus.divisionTiming.find(d => d && d.divisionId === divisionId);
    if (!dt || dt.courseLength == null || dt.courseLength === '') return null;
    const n = Number(dt.courseLength);
    return Number.isFinite(n) ? n : null;
  }

  // The scheduled start string for an entrant — for pursuit, the entrant's
  // own startTimeLocal (computed by SailSys after start-time processing);
  // for non-pursuit, the division's startTimeLocal from divisionTiming on
  // the race status (all boats in the division share it).
  function scheduledStartFor(entrant) {
    if (isPursuit) return entrant && entrant.startTimeLocal;
    if (!currentStatus || !Array.isArray(currentStatus.divisionTiming)) return null;
    const divId = entrant && entrant.division && entrant.division.id;
    if (divId == null) return null;
    const dt = currentStatus.divisionTiming.find(d => d && d.divisionId === divId);
    return dt ? dt.startTimeLocal : null;
  }

  // Seconds late vs allocated start for an entrant. Positive = late,
  // negative = early (early triggers OCS via flagsForEntrant). Returns null
  // when either time is missing/unparseable.
  function lateSeconds(entrant) {
    const actualStr = actualStartFor(entrant);
    if (!actualStr) return null;
    const actual = parseTime(actualStr);
    const sched = parseScheduledSeconds(scheduledStartFor(entrant));
    if (actual == null || sched == null) return null;
    return actual - sched;
  }

  // Format a late-seconds value as M:SS (or -M:SS for early). Empty for null.
  function fmtLate(secs) {
    if (secs == null) return '';
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '-' : '') + m + ':' + String(s).padStart(2, '0');
  }

  // Flags for an entrant. Returns an array (potentially empty) — boats can
  // legitimately have multiple flags at once. Manual flags (e.g. DSQ) will be
  // layered on top of this in a future iteration; the order here is just the
  // auto-computed set.
  //
  // Rules:
  //   AVG  — duty boat (selected via the controls panel). Pre-empts the
  //          came/start/finish-driven flags because those fields are forced
  //          empty for the duty boat.
  //   DNC  — did not come. came=false (and not duty).
  //   DNS  — came but neither started nor finished. A captured finish is
  //          taken as proof the boat raced; missing actualStart is a
  //          start-line bookkeeping gap, not a non-start.
  //   DNF  — came, has no finish, and either started or has no start record.
  //   OCS  — actualStart earlier than scheduled start. Added IN ADDITION to
  //          any other flag (per spec: "no matter what other flags it might
  //          get (it doesn't need a finish time to get it)").
  function flagsForEntrant(entrant) {
    const id = entrant && entrant.boat && entrant.boat.id;
    const flags = [];

    if (String(dutyBoatId) === String(id)) {
      flags.push('AVG');
      return flags; // duty boat has no times → no DNS/DNF/OCS to add
    }

    const t = getTimes(id);
    const actualStr = actualStartFor(entrant);
    if (!t || !t.came) {
      flags.push('DNC');
    } else if (!t.finish) {
      // Came + no finish defaults to DNF (if we have an actual start) or
      // DNS (no actual start). Suppress the DNS default when an external
      // status flag (SailSys or manual add, minus manual removal) has
      // already classified the boat as having raced / withdrawn: a boat
      // marked DNF / RET / DSQ / ABD did start, so DNS would contradict
      // the existing flag. Checked here (not via effectiveFlagsForEntrant)
      // to avoid recursion — that helper itself calls flagsForEntrant.
      const sidStr = String(id);
      const ssFlags = (sailsysResults[sidStr] && sailsysResults[sidStr].flags) || [];
      const ov = dirtyFlags.get(sidStr);
      const added = (ov && ov.added) || [];
      const removed = new Set((ov && ov.removed) || []);
      const externalSet = new Set();
      for (const f of ssFlags) if (!removed.has(f)) externalSet.add(f);
      for (const f of added) externalSet.add(f);
      const startedFlags = ['DNF', 'RET', 'DSQ', 'ABD'];
      const alreadyClassified = startedFlags.some(f => externalSet.has(f));
      if (!alreadyClassified) {
        flags.push(actualStr ? 'DNF' : 'DNS');
      }
    }
    // came AND has finish → no DNS/DNF flag, regardless of whether actual
    // start was captured. See wiki §5.1: a missing actualStart is treated
    // as "use allocated" rather than "didn't start".

    // OCS layers on top of any of the above for pursuit races, where each
    // boat has its own actualStart that we can compare against the boat's
    // staggered allocated start. For scratch starts every boat shares one
    // division gun time, so an "OCS" call is per-boat RO judgement (not
    // derivable from times) — don't auto-flag it.
    if (isPursuit && actualStr) {
      const actual = parseTime(actualStr);
      const sched = parseScheduledSeconds(scheduledStartFor(entrant));
      if (actual != null && sched != null && actual < sched) flags.push('OCS');
    }
    return flags;
  }

  // Canonical set of flags the editor knows about, in display order. Any
  // SailSys-supplied flag outside this list is preserved (shown after the
  // known flags) but isn't offered as a checkbox in the popover — the RO
  // can still see it, just not toggle it from here.
  const KNOWN_FLAGS = ['DNC', 'DNS', 'DNF', 'DSQ', 'AVG', 'OCS',
                       'RET', 'ABD', 'RDG', 'BFD', 'ZFP', 'SCP'];

  // Effective flag set = (SailSys ∪ auto-from-times ∪ override.added)
  //                       \ override.removed.
  // Returned in KNOWN_FLAGS order, with any unknown SailSys flags
  // appended at the end (uniqued, insertion order). This is the single
  // source of truth used by the Flags column display, recomputePlaces'
  // EXCLUDED check, isOcsForEntrant, and anywhere else that asks "what
  // flags does this boat have right now".
  function effectiveFlagsForEntrant(entrant) {
    const id = String(entrant && entrant.boat && entrant.boat.id);
    const set = new Set();
    for (const f of flagsForEntrant(entrant)) set.add(f);
    const ss = sailsysResults[id] && sailsysResults[id].flags;
    if (Array.isArray(ss)) for (const f of ss) set.add(f);
    const override = dirtyFlags.get(id);
    if (override) {
      for (const f of override.added || []) set.add(f);
      for (const f of override.removed || []) set.delete(f);
    }
    const known = KNOWN_FLAGS.filter(f => set.has(f));
    const unknown = Array.from(set).filter(f => !KNOWN_FLAGS.includes(f));
    return known.concat(unknown);
  }

  // === Canonical scoring + handicap helpers (wiki §5.1) =====================
  //
  // Order of declaration mirrors the formula sheet — each step only depends
  // on values from earlier steps. No circular reference because
  // `effective_start` only consults the external OCS_FLAGGED signal, not
  // the formula-derived `OCS`.
  //
  // All helpers return seconds (or null when a needed input is missing).
  // Higher-level callers (recomputePlaces, Elapsed column, doProcessHandicaps)
  // sit on top.

  const OCS_PENALTY_SECONDS = 5 * 60;

  function allocatedStartSeconds(entrant) {
    return parseScheduledSeconds(scheduledStartFor(entrant));
  }

  function actualStartSeconds(entrant) {
    const s = actualStartFor(entrant);
    return s ? parseTime(s) : null;
  }

  // External OCS signal (SailSys flag, OR a manual override from
  // dirtyFlags). Distinct from the formula-derived OCS so the two can be
  // combined without a circular reference. Reads the SailSys flag and
  // the manual override directly — does NOT use effectiveFlagsForEntrant
  // (which itself depends on effective_start via flagsForEntrant for the
  // auto-OCS clause). Auto-OCS doesn't feed in here because that path
  // already requires actualStart to be present, which is sufficient
  // input for effective_start without needing to consult flags.
  function isOcsFlagged(entrant) {
    const id = String(entrant && entrant.boat && entrant.boat.id);
    const ss = sailsysResults[id] && sailsysResults[id].flags;
    const ssOcs = Array.isArray(ss) && ss.includes('OCS');
    const ov = dirtyFlags.get(id);
    const addedOcs = !!(ov && (ov.added || []).includes('OCS'));
    const removedOcs = !!(ov && (ov.removed || []).includes('OCS'));
    return (ssOcs || addedOcs) && !removedOcs;
  }

  // effective_start:
  //   - actual captured     → actual_start
  //   - no actual, flagged  → allocated_start − 1s  (formula nudge)
  //   - no actual, no flag  → allocated_start       (no nudge)
  function effectiveStartSeconds(entrant) {
    const a = actualStartSeconds(entrant);
    if (a != null) return a;
    const s = allocatedStartSeconds(entrant);
    if (s == null) return null;
    return isOcsFlagged(entrant) ? (s - 1) : s;
  }

  // Signed late/early (sailing convention): positive `late` = boat crossed
  // AFTER allocated, positive `early` = boat crossed BEFORE allocated.
  // Returns null when allocated_start can't be resolved.
  function lateSecondsForEntrant(entrant) {
    const e = effectiveStartSeconds(entrant);
    const s = allocatedStartSeconds(entrant);
    if (e == null || s == null) return null;
    return e - s;
  }
  function earlySecondsForEntrant(entrant) {
    const l = lateSecondsForEntrant(entrant);
    return l == null ? null : -l;
  }

  // OCS = whatever effectiveFlagsForEntrant says. That union already
  // covers SailSys flags, manual override (added/removed), AND the
  // formula-derived OCS in flagsForEntrant (which fires when actual <
  // scheduled in a pursuit race). Centralising here means a manual
  // "remove OCS" override correctly suppresses the formula-derived OCS
  // for the boat even when actualStart is < scheduled.
  function isOcsForEntrant(entrant) {
    return effectiveFlagsForEntrant(entrant).includes('OCS');
  }

  // All local-time helpers return whole seconds (Math.round) so the value
  // used for place sorting matches the HH:MM:SS that the cell renders —
  // otherwise a sub-second TCF×elapsed difference could put two boats in
  // different places even though they display the same time.

  // Place-sort key, also the value shown in the Scored Finish column.
  //   non-OCS:              finish
  //   pursuit OCS:          finish + early + OCS_PENALTY  (early is per-boat)
  //   scratch start OCS:    finish + OCS_PENALTY          (no per-boat early)
  // Always defined as long as we have a finish time; scratch start OCS
  // used to return NaN (no place) but the Scored columns must always
  // display the local calc, so it gets the penalty-only flavour. Place
  // ranking still excludes scratch start OCS via recomputePlaces' EXCLUDED
  // set, so the change is display-only.
  function scoredFinishSecondsForEntrant(entrant) {
    const t = getTimes(entrant && entrant.boat && entrant.boat.id);
    const f = t ? parseTime(t.finish) : null;
    if (f == null) return null;
    if (!isOcsForEntrant(entrant)) return Math.round(f);
    if (!isPursuit) return Math.round(f + OCS_PENALTY_SECONDS);
    const e = earlySecondsForEntrant(entrant);
    return Math.round(f + (e == null ? 0 : e) + OCS_PENALTY_SECONDS);
  }

  function scoredElapsedSecondsForEntrant(entrant) {
    const sf = scoredFinishSecondsForEntrant(entrant);
    const s = allocatedStartSeconds(entrant);
    if (sf == null || s == null) return null;
    return Math.round(sf - s);
  }

  // Handicap-engine input: pure sailing time using effective_start. Late
  // starts SHORTEN this (wiki §5.1) — a boat that started 30 s late is
  // treated by the engine as having sailed 30 s less.
  function handicapElapsedSecondsForEntrant(entrant) {
    const t = getTimes(entrant && entrant.boat && entrant.boat.id);
    const f = t ? parseTime(t.finish) : null;
    const e = effectiveStartSeconds(entrant);
    if (f == null || e == null) return null;
    return Math.round(f - e);
  }

  function correctedSecondsForEntrant(entrant) {
    const se = scoredElapsedSecondsForEntrant(entrant);
    if (se == null) return null;
    const tcf = currentTcf(entrant);
    return Math.round(se * (isNaN(tcf) ? 1.0 : tcf));
  }

  // Format a signed minutes value (e.g. 3.283) as "+M:SS" or "-M:SS". Used
  // by the Next Start column. Zero renders as " 0:00" (leading space keeps
  // signed and unsigned values vertically aligned in the monospace cell).
  function fmtSignedMinSec(mins) {
    if (mins == null || isNaN(mins)) return '';
    const sign = mins > 0.0005 ? '+' : (mins < -0.0005 ? '-' : ' ');
    const abs = Math.abs(mins);
    const wholeMin = Math.floor(abs);
    const wholeSec = Math.round((abs - wholeMin) * 60);
    // round-up at 59.5 can push seconds to 60; rebalance.
    const min = wholeSec === 60 ? wholeMin + 1 : wholeMin;
    const sec = wholeSec === 60 ? 0 : wholeSec;
    return sign + min + ':' + String(sec).padStart(2, '0');
  }

  // Derive the Jinx FinishStatus (FIN / DNF / DNS / DNC / DSQ / RET) from the
  // entrant's EFFECTIVE flag set — the same set the Flags column shows, i.e.
  // SailSys ∪ auto-from-times ∪ manual additions \ manual removals. Reading
  // the bare auto-from-times flags here would drop both SailSys-supplied and
  // RO-added DNF/RET flags, so a boat the RO has marked DNF would be sent as
  // DNS/FIN and silently fall into the engine's excluded branch (no
  // dnfAllowance redistribution — wiki §5). DNF/RET are checked before DNS so
  // an explicit DNF/RET override wins over an auto-derived DNS (came, no
  // finish, no captured actual start). AVG (duty boat) maps to non-
  // participating. The server-side engine does the final FIN/DNF/RET/DSQ/DNC/
  // DNS partitioning; accuracy here only affects what we *send*.
  function jinxStatusForEntrant(entrant) {
    const flags = effectiveFlagsForEntrant(entrant);
    if (flags.includes('AVG')) return 'DNC';
    if (flags.includes('DSQ')) return 'DSQ';
    if (flags.includes('DNC')) return 'DNC';
    if (flags.includes('RET')) return 'RET';
    if (flags.includes('DNF')) return 'DNF';
    if (flags.includes('DNS')) return 'DNS';
    return 'FIN';
  }

  // Elapsed minutes used by the Jinx handicap engine (wiki §5.1):
  // handicap_elapsed_time / 60. This is `finish − effective_start`, so:
  //   - actual_start captured → finish − actual (late starts shorten,
  //     early starts lengthen — pure sailing-time view);
  //   - no actual, OCS-flagged → finish − (allocated − 1s);
  //   - no actual, unflagged → finish − allocated.
  function elapsedMinutesForEntrant(entrant) {
    const secs = handicapElapsedSecondsForEntrant(entrant);
    return secs == null ? null : secs / 60.0;
  }

  // Place + points are derived from the captured times. Recomputed once per
  // render via recomputePlaces() so cell `get`s are cheap map lookups.
  let placeMap = new Map();     // boatId -> 1-based place (finish order)

  // SailSys-authoritative tie-corrected places, keyed by boatId, for the
  // currently selected handicap. SailSys reports a tie via equal points
  // (e.g. two boats sharing 1st each score 1.5) but still hands back distinct
  // raw `placing.place` ordinals (1 and 2). Showing those ordinals would
  // render a tie as "1" and "2"; the sailing convention is that tied boats
  // share the better place ("=1, =1, 3"). We collapse here so the Place
  // column can show the tie. Recomputed alongside placeMap.
  let sailsysPlaceMap = new Map();

  // Compute the local placeMap using whichever sort key the Handicap
  // selector currently says (per wiki §5.1):
  //   `pursuit` → scored_finish_time
  //   `scratch` → scored_elapsed_time
  //   `tcf`     → corrected_time = TCF × scored_elapsed_time
  //
  // Always-excluded flags: AVG, DNC, DNS, DNF. For scratch starts OCS is
  // also excluded — boats over early in a scratch start are out of the
  // result entirely (no place), regardless of the displayed Scored values.
  //
  // When the selector currently holds a SailSys numeric handicap id, mode
  // isn't a string so we fall back to scratch (the synthetic Scratch
  // option always uses placeMap, and doProcessHandicaps reads it as a
  // last resort).
  function recomputePlaces() {
    placeMap = new Map();
    // SailSys tie correction applies whether or not the table is editable
    // (read-only past races still show SailSys places), so compute it before
    // the local-only placeMap bails out for non-editable views.
    recomputeSailsysPlaces();
    if (!IS_EDITABLE) return;
    const EXCLUDED = isPursuit
      ? new Set(['AVG', 'DNC', 'DNS', 'DNF'])
      : new Set(['AVG', 'DNC', 'DNS', 'DNF', 'OCS']);
    let mode = selectedHandicap;
    if (typeof mode !== 'string') mode = 'scratch';
    // Bucket finishers by division id so each division is ranked on its
    // own — three divisions → three boats placed 1st (assuming no ties).
    // Entrants missing a division id all share one synthetic bucket so
    // they're still ranked together rather than silently dropped.
    const byDivision = new Map();
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      if (effectiveFlagsForEntrant(e).some(f => EXCLUDED.has(f))) continue;
      let key;
      if (mode === 'pursuit')      key = scoredFinishSecondsForEntrant(e);
      else if (mode === 'tcf')     key = correctedSecondsForEntrant(e);
      else /* scratch (default) */ key = scoredElapsedSecondsForEntrant(e);
      if (key == null || !Number.isFinite(key)) continue;
      const divKey = String((e.division && e.division.id) != null ? e.division.id : '');
      if (!byDivision.has(divKey)) byDivision.set(divKey, []);
      byDivision.get(divKey).push({ id, key });
    }
    // Sort each division then assign places with tie handling: boats whose
    // sort keys are equal share the same place; the next distinct key jumps
    // to (index+1), not (sharedPlace+1). E.g. three boats tied at 5th →
    // next boat is 8th (no 6th or 7th). Keys are already integer seconds
    // (the helpers Math.round their output), so equality is exact.
    for (const finishers of byDivision.values()) {
      finishers.sort((a, b) => a.key - b.key);
      let currentPlace = 0;
      let lastKey = null;
      finishers.forEach((x, i) => {
        if (lastKey === null || x.key !== lastKey) {
          currentPlace = i + 1;
          lastKey = x.key;
        }
        placeMap.set(x.id, currentPlace);
      });
    }
  }

  // Tie-correct the SailSys-supplied places for the selected handicap. SailSys
  // signals a tie via equal points but keeps distinct raw `place` ordinals, so
  // tied boats must be collapsed to share the better (lowest) of the ordinals
  // they occupy. We group by division (places are scored per division) and,
  // within a division, by exact points value — equal points is SailSys's own
  // tie signal — taking the minimum raw place across the group as the shared
  // displayed place. Boats without a SailSys place under this handicap (no
  // result, or a no-place flag) are skipped; the Place column falls through to
  // its raw value / local placeMap for those.
  function recomputeSailsysPlaces() {
    sailsysPlaceMap = new Map();
    if (!isResultsClean()) return;
    const key = String(selectedHandicap);
    // divKey -> (points -> {minPlace, ids:[]})
    const byDivision = new Map();
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      const bh = sailsysResults[id] && sailsysResults[id].byHandicap
        && sailsysResults[id].byHandicap[key];
      if (!bh || bh.place == null || bh.points == null) continue;
      const divKey = String((e.division && e.division.id) != null ? e.division.id : '');
      if (!byDivision.has(divKey)) byDivision.set(divKey, new Map());
      const groups = byDivision.get(divKey);
      if (!groups.has(bh.points)) groups.set(bh.points, { minPlace: bh.place, ids: [] });
      const g = groups.get(bh.points);
      if (bh.place < g.minPlace) g.minPlace = bh.place;
      g.ids.push(id);
    }
    for (const groups of byDivision.values())
      for (const g of groups.values())
        for (const id of g.ids)
          sailsysPlaceMap.set(id, g.minPlace);
  }

  // Columns. `get` returns a sort-friendly value; `render` (optional) returns
  // HTML for the cell. Editable-only columns are filtered out when IS_EDITABLE
  // is false. TCF editing has moved off this table — eventually behind the
  // boat name link to per-entry details.
  const ENTRANT_COLS = [
    { key: 'drag', label: '',
      editableOnly: true, sortable: false, cellClass: 'drag-handle',
      get: () => '',
      render: () => '<span title="Drag to reorder">☰</span>' },
    { key: 'division', label: 'Div',    get: e => (e.division && e.division.name) || '' },
    { key: 'sail',     label: 'Sail#',  get: e => (e.boat && e.boat.sailNumber) || '' },
    { key: 'name',     label: 'Name',   get: e => (e.boat && e.boat.name) || '' },
    { key: 'tcf',      label: 'TCF',    get: e => currentTcf(e),
      render: (e) => {
        const cur = currentTcf(e);
        const fmt = (n) => (typeof n === 'number' && !isNaN(n)) ? n.toFixed(4) : '';
        // TCF input is editable only while entrants are NOT published (TCFs
        // must not change once published) AND the race is scored against the
        // handicap definition this app manages. Published races, or any race
        // whose series uses a different default handicap, see the value
        // read-only — we have no business writing those TCFs.
        if (entrantsPublished || !isOurHandicap) {
          return esc(fmt(cur));
        }
        const orig = originalTcf(e);
        const id = e.boat && e.boat.id;
        const dirty = !isNaN(cur) && cur !== orig;
        return '<input type="number" step="0.0001" class="tcf-input' + (dirty ? ' dirty' : '') + '"'
          + ' data-boat-id="' + esc(id) + '"'
          + ' data-original="' + esc(fmt(orig)) + '"'
          + ' value="' + esc(fmt(cur)) + '">';
      }},
    { key: 'start',    label: 'Allocated<br/>Start', get: e => e.startTimeLocal || '' },
    { key: 'came',     label: 'Came',
      editableOnly: true, sortable: false,
      get: e => getTimes(e.boat && e.boat.id).came ? 1 : 0,
      render: (e) => {
        const id = e.boat && e.boat.id;
        const t = getTimes(id);
        // Results published → finish/flag/came are locked (read-only). Show a
        // tick for boats that came, blank otherwise.
        if (resultsPublished) return t.came ? '✓' : '';
        const isDuty = String(dutyBoatId) === String(id);
        const disabled = isDuty ? ' disabled' : '';
        const checked = (t.came && !isDuty) ? ' checked' : '';
        return '<input type="checkbox" class="came-input" data-boat-id="' + esc(id) + '"'
          + checked + disabled + '>';
      }},
    { key: 'actualStart', label: 'Actual<br/>Start',
      editableOnly: true, now: true,
      get: e => getTimes(e.boat && e.boat.id).actualStart || '',
      render: (e) => {
        const id = e.boat && e.boat.id;
        const t = getTimes(id);
        if (resultsPublished) return esc(t.actualStart || '');
        const disabled = t.came ? '' : ' disabled';
        const nowBtn = isCurrentRace
          ? ('<button type="button" class="now-btn" data-boat-id="' + esc(id) + '"'
             + ' data-field="actualStart"' + disabled + '>NOW</button>')
          : '';
        return '<input type="text" class="time-input" placeholder="HH:MM:SS"'
          + ' data-boat-id="' + esc(id) + '" data-field="actualStart"'
          + ' value="' + esc(t.actualStart || '') + '"' + disabled + '>'
          + nowBtn;
      }},
    { key: 'finish',  label: 'Actual<br/>Finish', now: true,
      get: e => {
        if (IS_EDITABLE) return getTimes(e.boat && e.boat.id).finish || '';
        return e.finishTimeLocal || '';
      },
      render: (e) => {
        if (!IS_EDITABLE) {
          return esc(e.finishTimeLocal || '');
        }
        const id = e.boat && e.boat.id;
        const t = getTimes(id);
        // Results published → finish is locked (read-only).
        if (resultsPublished) return esc(t.finish || e.finishTimeLocal || '');
        const disabled = t.came ? '' : ' disabled';
        const nowBtn = isCurrentRace
          ? ('<button type="button" class="now-btn" data-boat-id="' + esc(id) + '"'
             + ' data-field="finish"' + disabled + '>NOW</button>')
          : '';
        return '<input type="text" class="time-input" placeholder="HH:MM:SS"'
          + ' data-boat-id="' + esc(id) + '" data-field="finish"'
          + ' value="' + esc(t.finish || '') + '"' + disabled + '>'
          + nowBtn;
      }},
    // Late: actualStart minus allocated start, in seconds. Negative = early
    // (and OCS-flagged elsewhere). Empty when the boat has no recorded
    // actualStart. The `get` returns a Number so sorting is numeric; render
    // formats as M:SS (with leading minus when early).
    { key: 'late', label: 'Late', editableOnly: true,
      cellClass: 'num-cell',
      get: e => {
        const s = lateSeconds(e);
        return s == null ? NaN : s;
      },
      render: e => esc(fmtLate(lateSeconds(e)))
    },
    // Jinx columns — always show the locally-computed value (no SailSys
    // mode switch) so a developer can eyeball our computation against
    // SailSys's side-by-side. Whenever the boat has a finish time the
    // helpers produce a finite value (scratch start OCS now resolves to
    // finish + OCS_PENALTY); only a missing finish blanks the cell.
    { key: 'scoredFinish', label: 'Scored<br/>Finish',
      get: e => {
        const sf = scoredFinishSecondsForEntrant(e);
        return (sf == null || !Number.isFinite(sf)) ? NaN : sf;
      },
      render: e => {
        const sf = scoredFinishSecondsForEntrant(e);
        if (sf == null || !Number.isFinite(sf)) return '';
        return esc(fmtTimeOfDay(sf));
      }},
    { key: 'scoredElapsed', label: 'Scored<br/>Elapsed',
      get: e => {
        const se = scoredElapsedSecondsForEntrant(e);
        return (se == null || !Number.isFinite(se)) ? NaN : se;
      },
      render: e => {
        const se = scoredElapsedSecondsForEntrant(e);
        if (se == null || !Number.isFinite(se)) return '';
        return esc(fmtElapsed(se));
      }},
    { key: 'scoredCorrected', label: 'Scored<br/>Corrected',
      get: e => {
        const c = correctedSecondsForEntrant(e);
        return (c == null || !Number.isFinite(c)) ? NaN : c;
      },
      render: e => {
        const c = correctedSecondsForEntrant(e);
        if (c == null || !Number.isFinite(c)) return '';
        return esc(fmtElapsed(c));
      }},
    // Sailsys columns — show whatever SailSys returned, never the local
    // computation. Blank when SailSys has no value for this boat
    // (DNC / RET / etc.).
    { key: 'elapsed', label: 'Sailsys<br/>Elapsed',
      get: e => {
        const id = String(e.boat && e.boat.id);
        const r = sailsysResults[id];
        return (r && r.elapsedTime) ? r.elapsedTime : '';
      }},
    { key: 'corrected', label: 'Sailsys<br/>Corrected',
      get: e => {
        const id = String(e.boat && e.boat.id);
        const r = sailsysResults[id];
        const bh = r && r.byHandicap && r.byHandicap[String(selectedHandicap)];
        return (bh && bh.correctedTime) ? bh.correctedTime : '';
      }},
    // Flags: shows the effective set (SailSys ∪ auto-from-times ∪
    // manual-added, minus manual-removed). Clicking the cell opens a
    // popover where the RO can add / remove flags — see wireFlagPopover.
    // The cellClass tags the <td> so the cell is recognisable for the
    // click handler and gets the editor-affordance hover style.
    { key: 'flags', label: 'Flags', sortable: false,
      cellClass: IS_EDITABLE ? 'flag-cell' : '',
      get: e => {
        const flags = effectiveFlagsForEntrant(e);
        return flags.length ? flags.join(', ') : '';
      } },
    { key: 'place', label: 'Place',
      get: e => {
        const id = String(e.boat && e.boat.id);
        // In SailSys mode look up byHandicap[selectedHandicap] (the key
        // is the same string 'scratch' OR a stringified numeric id) and
        // use it whenever the entry exists. Local mode and the "no
        // SailSys scratch returned" fallback drop through to placeMap.
        if (isResultsClean()) {
          const r = sailsysResults[id];
          const bh = r && r.byHandicap
            && r.byHandicap[String(selectedHandicap)];
          // Prefer the tie-corrected place (collapses SailSys's distinct
          // ordinals for boats sharing points); fall back to the raw place.
          if (sailsysPlaceMap.has(id)) return sailsysPlaceMap.get(id);
          if (bh && bh.place != null) return bh.place;
        }
        const p = placeMap.get(id);
        return p == null ? '' : p;
      }},
    // Points: in SailSys mode + a SailSys-supplied handicap (including
    // scratch when SailSys returns it as a calc with id=null), take
    // points from SailSys. Otherwise mirror the place number (low-point
    // scoring); blank when no place.
    { key: 'points', label: 'Points',
      get: e => {
        const id = String(e.boat && e.boat.id);
        if (isResultsClean()) {
          const r = sailsysResults[id];
          const bh = r && r.byHandicap
            && r.byHandicap[String(selectedHandicap)];
          if (bh && bh.points != null) return bh.points;
        }
        const p = placeMap.get(id);
        return p == null ? '' : p;
      }},
    // Adjustment: signed Δs (penalty − reward) for this boat in M:SS, as
    // produced by the Jinx algorithm. The next race's start-time
    // processing pass will re-anchor the new slowest boat at the
    // configured earliest-start time, so we don't apply any fleet-wide
    // shift here. Tooltip decomposes the displayed value into its two
    // signed components (penalty + −redistribution) using a custom
    // hover panel — native title= can't render monospace-aligned columns.
    // Sort key is the numeric netAdjustmentMinutes.
    { key: 'nextStart', label: 'Adjustment',
      cellClass: 'adjustment-cell',
      get: e => {
        const id = String(e.boat && e.boat.id);
        const a = nextStartAdjustments.get(id);
        return (a && typeof a.netAdjustmentMinutes === 'number') ? a.netAdjustmentMinutes : NaN;
      },
      render: e => {
        const id = String(e.boat && e.boat.id);
        const a = nextStartAdjustments.get(id);
        if (!a) return '';
        const penalty = a.penaltyMinutes || 0;
        const reward = a.rewardMinutes || 0;
        const net = a.netAdjustmentMinutes || 0;
        // Tooltip lines. The top two (Penalty / Redistribution) sum to the
        // displayed Adjustment in the cell. The bottom two show what that
        // net Δs translates to as a TCF change under the saved calibration,
        // so the admin can sanity-check the value being saved. Labels right
        // -padded to the widest label so colons line up vertically; values
        // right-padded so the sign columns line up too.
        const oldTcf = (typeof a.oldTcf === 'number') ? a.oldTcf : null;
        const newTcf = (typeof a.newTcf === 'number') ? a.newTcf : null;
        const fmtTcf = v => (v == null ? '' : v.toFixed(4));
        const fmtTcfDelta = (a_, b_) => {
          if (a_ == null || b_ == null) return '';
          const d = b_ - a_;
          const sign = d > 0 ? '+' : (d < 0 ? '−' : ' ');
          return sign + Math.abs(d).toFixed(4);
        };
        const labels = ['Penalty', 'Redistribution', 'ΔTCF', 'New TCF'];
        const values = [
          fmtSignedMinSec(penalty),
          fmtSignedMinSec(-reward),
          fmtTcfDelta(oldTcf, newTcf),
          fmtTcf(newTcf)
        ];
        const labW = Math.max.apply(null, labels.map(s => s.length));
        const valW = Math.max.apply(null, values.map(s => s.length));
        const tipText = labels
          .map((lab, i) => lab.padStart(labW) + ': ' + values[i].padStart(valW))
          .join('\n');
        return '<span class="adjustment">' + esc(fmtSignedMinSec(net))
          + '<span class="adjustment-tip">' + esc(tipText) + '</span></span>';
      }}
  ];

  function activeCols() {
    const oneDivision = uniqueDivisionCount() < 2;
    const admin = (typeof isAdmin === 'function') && isAdmin();
    return ENTRANT_COLS.filter(c => {
      if (!IS_EDITABLE && c.editableOnly) return false;
      // No point showing Division when every boat is in the same one.
      if (c.key === 'division' && oneDivision) return false;
      // TCF column is admin-only. Race officers can't edit it (SailSys
      // returns 403 on the underlying handicap PUT) and shouldn't see it
      // either — keep the table focused on the timing affordances they need.
      if (c.key === 'tcf' && !admin) return false;
      // Non-pursuit races: per-entrant Allocated, per-entrant Start, and
      // Late columns are meaningless (every boat in a division shares one
      // gun time, so Late would be identical for every boat in a division
      // and is more usefully shown once on the per-division panel). The
      // per-division Start panel in the status grid replaces them.
      if (!isPursuit && (c.key === 'start' || c.key === 'actualStart' || c.key === 'late'))
        return false;
      // Next Start column only shows once the Jinx algorithm has produced
      // adjustments — populated by the Process Handicaps button or
      // restored on load from /api/races/{id}/pending-handicaps.
      if (c.key === 'nextStart' && nextStartAdjustments.size === 0) return false;
      // Sailsys Elapsed / Corrected are noisy debug columns — hidden by
      // default; the "Show sailsys" toggle reveals them.
      if ((c.key === 'elapsed' || c.key === 'corrected') && !showSailsys) return false;
      return true;
    });
  }

  function uniqueDivisionCount() {
    const set = new Set();
    for (const e of entrantData) {
      const id = e.division && e.division.id;
      if (id != null) set.add(id);
    }
    return set.size;
  }

  // Sort stack. Each entry is {key, dir} where dir is +1 ascending,
  // -1 descending. Index 0 is the highest-priority key; ties at the
  // primary key fall through to the secondary, and so on. Clicking a
  // column header pushes that column to the top of the stack while
  // preserving the previous order as secondary sort keys, so e.g.
  // "click Place, then click Division" sorts by division with place as
  // the tiebreak inside each division. Clicking the column that's
  // already primary just flips its direction. Capped at MAX_SORT_DEPTH
  // levels — beyond that the stack would be more noise than signal.
  let sortStack = [];
  const MAX_SORT_DEPTH = 2;

  function compareValues(a, b) {
    // Empty values (null, undefined, '') always sort to the end regardless of
    // direction. Without this, a column like Place (where DNC/unprocessed
    // boats produce '') would sort empties first ascending, which the RO
    // never wants — finishers should always cluster at the top.
    const aEmpty = (a == null || a === '');
    const bEmpty = (b == null || b === '');
    if (aEmpty && bEmpty) return 0;
    if (aEmpty) return 1;
    if (bEmpty) return -1;
    const aNum = typeof a === 'number';
    const bNum = typeof b === 'number';
    if (aNum && bNum) {
      if (isNaN(a) && isNaN(b)) return 0;
      if (isNaN(a)) return 1;
      if (isNaN(b)) return -1;
      return a - b;
    }
    return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' });
  }

  function orderedEntrants() {
    let rows;
    // Column sort wins over manual drag order. Picking a sort column hides
    // the drag order temporarily; the next drag will rebuild boatOrder from
    // the sorted view and clear sortStack.
    if (sortStack.length > 0) {
      // Pre-resolve column objects so the comparator doesn't re-find them
      // for every pair comparison.
      const sortCols = sortStack
        .map(s => ({ col: ENTRANT_COLS.find(c => c.key === s.key), dir: s.dir }))
        .filter(x => x.col);
      rows = entrantData.slice().sort((a, b) => {
        for (const { col, dir } of sortCols) {
          const r = dir * compareValues(col.get(a), col.get(b));
          if (r !== 0) return r;
        }
        return 0;
      });
    } else if (IS_EDITABLE) {
      // Honour boatOrder: any boats listed are returned in that order; any
      // entrants not yet in boatOrder (newly added since the last save) go to
      // the end in their original SailSys order. Empty boatOrder = use the
      // SailSys order as-is.
      const byId = new Map(entrantData.map(e => [String(e.boat && e.boat.id), e]));
      const out = [];
      const seen = new Set();
      for (const id of boatOrder) {
        const e = byId.get(String(id));
        if (e) { out.push(e); seen.add(String(id)); }
      }
      for (const e of entrantData) {
        const id = String(e.boat && e.boat.id);
        if (!seen.has(id)) out.push(e);
      }
      rows = out;
    } else {
      rows = entrantData.slice();
    }
    // "Hide DNC" filter: drop any boats not currently flagged as Came.
    // Applied AFTER ordering so the underlying boatOrder isn't perturbed —
    // toggling the filter just shows/hides rows. Duty boats are AVG (not
    // DNC) but came is forced false for them, so they'd also be hidden;
    // that matches the user's expectation since they're not racing either.
    if (IS_EDITABLE && hideDnc) {
      rows = rows.filter(e => {
        const t = getTimes(e.boat && e.boat.id);
        return t && t.came;
      });
    }
    return rows;
  }

  // SailSys handicap definitions whose name marks them as the scratch /
  // elapsed view — we skip these when picking the default in SailSys mode.
  const SCRATCH_NAME_RE = /^(scratch|elapsed)$/i;

  // Prefer fullName because multiple SailSys handicap definitions can
  // share the same shortName (e.g. several "PHS" variants), so the short
  // form would render an ambiguous selector.
  function handicapLabelFor(defId) {
    const def = handicapDefs[String(defId)];
    if (!def) return String(defId);
    return def.fullName || def.shortName || String(defId);
  }

  function isScratchHandicap(defId) {
    const def = handicapDefs[String(defId)];
    if (!def) return false;
    return SCRATCH_NAME_RE.test(def.shortName || '')
        || SCRATCH_NAME_RE.test(def.fullName || '');
  }

  // Recompute the Handicap-selector options for the current mode and race
  // type. Called from page-load, after results arrive, and whenever
  // dirty-state flips (which can swap SailSys ↔ local modes).
  //
  // SailSys mode (isResultsClean): one option per handicap SailSys scored
  // — calculations[] entries with handicapDefinitionId become numeric
  // options; the entry with handicapDefinitionId == null becomes the
  // 'scratch' string option (always shown first). If SailSys didn't emit
  // a scratch entry for some reason, we still offer 'scratch' as a
  // fallback computed from the local placeMap.
  // Default = first non-scratch (i.e. the first real SailSys handicap).
  //
  // Local mode (anything edited / not yet processed): three local-only
  // options in order Scratch, TCF, then Pursuit when the race is pursuit-
  // format. Default = the LAST option (Pursuit when offered, else TCF).
  function populateHandicapSelector() {
    const sel = document.getElementById('handicap-selector');
    const wrap = document.getElementById('handicap-selector-wrap');
    if (!sel || !wrap) return;
    let options = [];
    if (isResultsClean()) {
      // Always position Scratch first. SailSys typically returns it as
      // a calc with handicapDefinitionId=null (stored under the 'scratch'
      // key); if absent we still offer it as a local-computed fallback.
      options.push({ value: 'scratch', label: 'Scratch', isScratch: true });
      const seen = new Set(['scratch']);
      for (const id in sailsysResults) {
        const bh = sailsysResults[id] && sailsysResults[id].byHandicap;
        if (!bh) continue;
        for (const key of Object.keys(bh)) {
          if (seen.has(key)) continue;
          seen.add(key);
          options.push({
            value: Number(key),
            label: handicapLabelFor(key),
            isScratch: isScratchHandicap(key)
          });
        }
      }
    } else {
      // Local mode. Labels describe the column the place is sorted on —
      // Elapsed (scored_elapsed_time), Corrected (TCF × elapsed), Finish
      // (scored_finish_time, pursuit only). Internal `value` keys are
      // unchanged so the rest of the code (recomputePlaces' mode switch,
      // sessionStorage persistence) keeps working.
      options.push({ value: 'scratch', label: 'Elapsed' });
      options.push({ value: 'tcf', label: 'Corrected' });
      if (isPursuit) options.push({ value: 'pursuit', label: 'Finish' });
    }
    if (options.length === 0) {
      wrap.style.display = 'none';
      return;
    }
    // Decide the default: SailSys → first non-scratch (else first); Local
    // → last option (Pursuit when offered, else TCF).
    let defaultValue;
    if (isResultsClean()) {
      const nonScratch = options.find(o => !o.isScratch);
      defaultValue = (nonScratch || options[0]).value;
    } else {
      defaultValue = options[options.length - 1].value;
    }
    // Coerce a persisted-string SailSys id back into a number so equality
    // comparisons against the numeric option values work.
    if (isResultsClean() && typeof selectedHandicap === 'string'
        && /^\d+$/.test(selectedHandicap)) {
      selectedHandicap = Number(selectedHandicap);
    }
    const validValues = new Set(options.map(o => String(o.value)));
    if (selectedHandicap == null || !validValues.has(String(selectedHandicap))) {
      selectedHandicap = defaultValue;
    }
    sel.innerHTML = options.map(o =>
      '<option value="' + esc(String(o.value)) + '"'
      + (String(o.value) === String(selectedHandicap) ? ' selected' : '')
      + '>' + esc(o.label) + '</option>').join('');
    wrap.style.display = '';
    sel.onchange = () => {
      const raw = sel.value;
      selectedHandicap = (raw === 'scratch' || raw === 'pursuit' || raw === 'tcf')
        ? raw : Number(raw);
      sessionSaveForm();
      renderEntrants();
    };
  }

  function renderEntrants() {
    const tbody = document.getElementById('entrants-tbody');
    const cols = activeCols();
    populateHandicapSelector();
    recomputePlaces();
    const rows = orderedEntrants();
    tbody.innerHTML = rows.map(e => {
      const boatId = e.boat && e.boat.id;
      const cells = cols.map(c => {
        const cls = c.cellClass ? ' class="' + c.cellClass + '"' : '';
        if (c.render) {
          return '<td' + cls + '>' + c.render(e) + '</td>';
        }
        const v = c.get(e);
        const display = (typeof v === 'number' && isNaN(v)) ? '' : v;
        return '<td' + cls + '>' + esc(display) + '</td>';
      }).join('');
      const dragAttrs = IS_EDITABLE ? ' draggable="true"' : '';
      return '<tr data-boat-id="' + esc(boatId) + '"' + dragAttrs + '>' + cells + '</tr>';
    }).join('');

    if (IS_EDITABLE) {
      wireTcfInputs();
      wireTimeInputs();
      wireDrag();
      wireEntrantsKeyHandlers();
      wireFlagCells();
    }
  }

  // Click-to-edit flag editor. The Flags column cells get a click handler
  // that opens a popover anchored to the cell with one checkbox per
  // KNOWN_FLAGS entry. Auto-derived flags (from flagsForEntrant) appear
  // checked + disabled; SailSys-supplied flags appear checked + italic;
  // user toggles freely add/remove flags from dirtyFlags[boatId]. Closing
  // (click outside or Esc) re-renders and fires updateSaveBar so the
  // Save bar appears and the Handicap selector swaps to local mode.
  function wireFlagCells() {
    document.querySelectorAll('td.flag-cell').forEach(td => {
      // Results published → flags are locked. Drop the click affordance so
      // the popover can't open.
      if (resultsPublished) { td.classList.remove('flag-cell'); td.onclick = null; return; }
      td.onclick = () => {
        const tr = td.closest('tr');
        if (!tr) return;
        const boatId = tr.dataset.boatId;
        const e = entrantData.find(x => String(x.boat && x.boat.id) === String(boatId));
        if (!e) return;
        openFlagPopover(td, e);
      };
    });
  }

  let openPopoverCleanup = null;   // call to dismiss the currently-open popover

  function openFlagPopover(anchorCell, entrant) {
    if (openPopoverCleanup) openPopoverCleanup();
    const id = String(entrant.boat && entrant.boat.id);
    const autoSet = new Set(flagsForEntrant(entrant));
    const ssArr = sailsysResults[id] && sailsysResults[id].flags;
    const ssSet = new Set(Array.isArray(ssArr) ? ssArr : []);
    const overrideBaseline = new Set([...autoSet, ...ssSet]);
    const effective = new Set(effectiveFlagsForEntrant(entrant));

    const pop = document.createElement('div');
    pop.className = 'flag-popover';
    pop.innerHTML = '<div class="flag-popover-title">Flags</div>'
      + KNOWN_FLAGS.map(f => {
          const isAuto = autoSet.has(f);
          const isSailsys = !isAuto && ssSet.has(f);
          const checked = effective.has(f) ? ' checked' : '';
          const disabled = isAuto ? ' disabled' : '';
          const cls = isAuto ? ' flag-auto' : (isSailsys ? ' flag-sailsys' : '');
          const title = isAuto
            ? ' title="auto-derived from captured times — edit the times to change it"'
            : (isSailsys ? ' title="from SailSys"' : '');
          return '<label class="flag-row' + cls + '"' + title + '>'
            + '<input type="checkbox" data-flag="' + esc(f) + '"'
              + checked + disabled + '> ' + esc(f) + '</label>';
        }).join('');

    // Anchor to the cell. Position is computed relative to viewport, then
    // converted to document-absolute so the popover stays put on scroll.
    const rect = anchorCell.getBoundingClientRect();
    pop.style.position = 'absolute';
    pop.style.left = (window.scrollX + rect.left) + 'px';
    pop.style.top  = (window.scrollY + rect.bottom + 2) + 'px';
    document.body.appendChild(pop);

    pop.querySelectorAll('input[type="checkbox"]').forEach(inp => {
      inp.onchange = () => {
        const f = inp.dataset.flag;
        const ov = dirtyFlags.get(id) || { added: [], removed: [] };
        // Normalise toward minimal representation:
        //   checked && !baseline  → added += f, removed -= f
        //   !checked && baseline  → removed += f, added -= f
        //   checked && baseline   → cancel any removed.includes(f)
        //   !checked && !baseline → cancel any added.includes(f)
        const baseline = overrideBaseline.has(f);
        let added = (ov.added || []).filter(x => x !== f);
        let removed = (ov.removed || []).filter(x => x !== f);
        if (inp.checked && !baseline) added.push(f);
        if (!inp.checked && baseline) removed.push(f);
        if (added.length === 0 && removed.length === 0) {
          dirtyFlags.delete(id);
        } else {
          dirtyFlags.set(id, { added, removed });
        }
        sessionSaveForm();
