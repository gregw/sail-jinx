        if (e.division && e.division.spinnakerType != null) return e.division.spinnakerType;
        return 1;
      }
      const updates = [];
      for (const [boatId, value] of dirtyTcf) {
        updates.push({ boatId, value, spinnakerType: spinnakerTypeFor(boatId) });
      }
      summary.textContent = 'Saving ' + updates.length + ' TCF update'
        + (updates.length === 1 ? '' : 's') + '...';
      const r = await postJson('/api/series/' + encodeURIComponent(seriesIdForSave) + '/tcfs',
        { updates });
      if (!r.ok) {
        messages.push('TCF save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        const results = (r.body && r.body.results) || [];
        const failed = results.filter(x => !x.ok);
        if (failed.length === 0) {
          messages.push('Saved ' + results.length + ' TCF update'
            + (results.length === 1 ? '' : 's') + ' to SailSys.');
          dirtyTcf.clear();
        } else {
          messages.push('Saved ' + (results.length - failed.length) + '/' + results.length
            + ' TCF updates. Failed boats: '
            + failed.map(f => f.boatId + ' (' + (f.error || 'unknown') + ')').join(', '));
          anyError = true;
          const failedIds = new Set(failed.map(f => f.boatId));
          for (const id of Array.from(dirtyTcf.keys())) {
            if (!failedIds.has(id)) dirtyTcf.delete(id);
          }
        }
      }
    }

    // --- Race times (writes to local JSON) ---
    if (isTimesDirty()) {
      const payload = currentTimesPayload();
      summary.textContent = 'Saving race times...';
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/times', payload);
      if (!r.ok) {
        messages.push('Times save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        messages.push('Saved race times.');
        originalTimesJson = JSON.stringify(payload.times);
        originalOrderJson = JSON.stringify(payload.boatOrder);
        originalDutyBoatId = payload.dutyBoatId;
      }
    }

    // --- Division starts (writes to SailSys — non-pursuit only) ---
    // Push any edited per-division gun times directly to SailSys's
    // divisionTiming via /api/races/{id}/division-starts. After a
    // successful push the values become the new "scheduled" for the next
    // load, so we clear the local edit map and re-render with the fresh
    // status the handler echoed back.
    if (!isPursuit && isDivisionStartsDirty()) {
      const starts = {};
      for (const [divIdStr, val] of divisionStartsMap) {
        if (!val) continue;
        const sched = divisionScheduledStart(Number(divIdStr));
        const canon = reformatTime(val) || val;
        if (!timeStringsEqual(canon, sched)) starts[divIdStr] = canon;
      }
      if (Object.keys(starts).length > 0) {
        summary.textContent = 'Saving division starts to SailSys...';
        const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/division-starts',
          { starts });
        if (!r.ok) {
          messages.push('Division starts save failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
          anyError = true;
        } else {
          const n = Object.keys(starts).length;
          messages.push('Saved ' + n + ' division start' + (n === 1 ? '' : 's') + ' to SailSys.');
          divisionStartsMap.clear();
          if (r.body && r.body.status) {
            renderStatus(r.body.status, raceIdGlobal);
          }
        }
      }
    }

    // --- Push results to SailSys (came → startedRace, finish → finishTime,
    //     flags → penalties). The start times stay local-only — SailSys
    //     handles starts via the timing/processing pipeline, not as a
    //     captured actualStart. Always push if there's anything to send.
    {
      const boats = {};
      for (const e of entrantData) {
        const id = e.boat && e.boat.id;
        if (id == null) continue;
        const t = getTimes(id);
        boats[String(id)] = {
          came: !!t.came,
          finish: t.finish || null,
          // AVG is intentionally included so the server can choose to drop
          // it (no SailSys penalty); other flags map 1:1 to penalty defs.
          flags: flagsForEntrant(e)
        };
      }
      summary.textContent = 'Pushing results to SailSys...';
      const r = await postJson('/api/races/' + encodeURIComponent(raceIdGlobal) + '/push-results',
        { boats });
      if (!r.ok) {
        messages.push('Results push failed: ' + ((r.body && r.body.error) || ('HTTP ' + r.status)));
        anyError = true;
      } else {
        messages.push('Pushed results to SailSys.');
        // SailSys-computed results are now stale (requiresResultCalculation
        // will be true). Clear the cache so the columns fall back to local
        // values, and re-render status so the Process Results button appears.
        sailsysResults = {};
        if (r.body && r.body.status) {
          renderStatus(r.body.status, raceIdGlobal);
        }
      }
    }

    btn.disabled = false;

    state.className = anyError ? 'banner banner-warn' : 'banner banner-ok';
    state.textContent = messages.join(' ');

    // Refresh TCFs from server only if any TCFs were saved (cheap re-fetch).
    if (dirtyTcf.size === 0 && messages.some(m => m.startsWith('Saved') && m.includes('TCF'))) {
      await loadEntrants();
    }
    updateSaveBar();
  }

  function snapshotTimes(saved) {
    timesMap = new Map();
    if (saved && saved.times) {
      for (const [id, t] of Object.entries(saved.times)) {
        // Normalise legacy "HH:MM:SS.sss" → "HH:MM:SS" on load so the dirty
        // baseline matches what we'll re-serialize.
        timesMap.set(String(id), {
          came: !!t.came,
          actualStart: t.actualStart ? (reformatTime(t.actualStart) || t.actualStart) : null,
          finish: t.finish ? (reformatTime(t.finish) || t.finish) : null
        });
      }
    }
    boatOrder = (saved && Array.isArray(saved.boatOrder)) ? saved.boatOrder.map(String) : [];
    dutyBoatId = (saved && saved.dutyBoatId) ? String(saved.dutyBoatId) : null;
    // divisionStartsMap is in-memory only — populated either by user edits
    // (this session) or by sessionRestoreForm from sessionStorage. Server
    // JSON no longer carries it; SailSys's divisionTiming is the source.
    divisionStartsMap = new Map();
    // Seed empty entries for any entrants we haven't seen yet so getTimes works.
    for (const e of entrantData) {
      const id = String(e.boat && e.boat.id);
      if (!timesMap.has(id)) timesMap.set(id, emptyTimes());
    }
    // Snapshot for dirty detection — use the same shape currentTimesPayload produces.
    const payload = currentTimesPayload();
    originalTimesJson = JSON.stringify(payload.times);
    originalOrderJson = JSON.stringify(payload.boatOrder);
    originalDutyBoatId = payload.dutyBoatId;
  }

  // NOW log section is current-race-only — live timing isn't relevant when
  // editing a finalized race's results. Hidden by default; revealed below
  // (after status loads and we know isCurrentRace) by updateNowLogSection.
  document.getElementById('now-log').style.display = 'none';

  function updateNowLogSection() {
    const section = document.getElementById('now-log');
    if (isCurrentRace) {
      section.style.display = '';
      document.getElementById('now-log-btn').onclick = logNowUnattached;
      renderNowLog();
    } else {
      section.style.display = 'none';
    }
  }

  // Compute isOurHandicap from the loaded entrants by checking whether any
  // entrant carries a current handicap whose definition matches the
  // configured handicapDefinitionId. SailSys's `handicap.currentHandicaps[]`
  // entries variously use `definitionId` (flat int) or `definition.id`
  // (nested object); both are checked.
  function computeIsOurHandicap() {
    if (configHandicapId == null) return false;
    const want = Number(configHandicapId);
    return entrantData.some(e => {
      const list = e && e.handicap && e.handicap.currentHandicaps;
      if (!Array.isArray(list)) return false;
      return list.some(h => {
        if (!h) return false;
        if (h.definitionId != null) return Number(h.definitionId) === want;
        if (h.definition != null) {
          const idv = (typeof h.definition === 'object') ? h.definition.id : h.definition;
          return Number(idv) === want;
        }
        return false;
      });
    });
  }

  // Compute isPursuit from the race status's divisionTiming. A race is
  // pursuit iff every division's raceType is 0. Missing/unknown defaults
  // to pursuit (matches the original MYC use case and keeps per-entrant
  // affordances visible until we see otherwise).
  function computeIsPursuit(status) {
    if (!status || !Array.isArray(status.divisionTiming) || status.divisionTiming.length === 0) {
      return true;
    }
    return status.divisionTiming.every(d => d && d.raceType === 0);
  }

  // SailSys finishTime is an ISO-ish local string like
  // "2026-05-26T19:07:11.000". Extract the HH:MM:SS portion for the
  // canonical local-storage form used by timesMap.
  function parseSailsysFinishTime(s) {
    if (!s) return null;
    const m = String(s).match(/(?:^|T)(\d{1,2}):(\d{1,2}):(\d{1,2})/);
    if (!m) return null;
    const pad = (n) => String(n).padStart(2, '0');
    return pad(Number(m[1])) + ':' + pad(Number(m[2])) + ':' + pad(Number(m[3]));
  }

  (async () => {
    const state = document.getElementById('race-state');

    // URL param wins; otherwise the last raceId we looked at.
    let raceId = PARAMS.get('raceId');
    if (raceId) localStorage.setItem('sail-jinx.lastRaceId', raceId);
    else raceId = localStorage.getItem('sail-jinx.lastRaceId');

    if (!raceId) {
      state.className = 'banner banner-warn';
      state.innerHTML = 'No race selected. Pick one on the <a href="/races.html">Races tab</a>.';
      return;
    }
    raceIdGlobal = raceId;

    state.textContent = 'Loading race ' + raceId + '…';

    // Resolve auth + config first so activeCols() and the
    // isOurHandicap/isPursuit gates can settle before the first render.
    const [authData, cfg] = await Promise.all([awaitAuth(), getConfig()]);
    if (cfg && cfg.sailsys) configHandicapId = cfg.sailsys.handicapDefinitionId;

    const fetches = [
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/status'),
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/entrants'),
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/times'),
      // SailSys-computed results — best-effort. Empty/missing is fine;
      // isResultsClean() handles it and columns fall back to local values.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/computed-results'),
      // SailSys-owned per-boat came/finish — overlaid on top of local JSON
      // below so SailSys is the source of truth for those fields.
      fetchJson('/api/races/' + encodeURIComponent(raceId) + '/finishers')
    ];
    const [statusR, entrantsR, timesR, resultsR, finishersR] = await Promise.all(fetches);

    if (statusR.status === 401 || entrantsR.status === 401) {
      state.className = 'banner banner-warn';
      state.innerHTML = 'You are not signed in. <a href="/">Sign in to SailSys</a> first.';
      return;
    }

    if (!statusR.ok) {
      state.className = 'banner banner-err';
      state.textContent = 'Could not load status: '
        + ((statusR.body && statusR.body.error) || ('HTTP ' + statusR.status));
      return;
    }

    renderStatus(statusR.body && statusR.body.status, raceId);

    if (!entrantsR.ok) {
      state.className = 'banner banner-err';
      state.textContent = 'Could not load entrants: '
        + ((entrantsR.body && entrantsR.body.error) || ('HTTP ' + entrantsR.status));
      return;
    }

    entrantData = (entrantsR.body && Array.isArray(entrantsR.body.entrants))
      ? entrantsR.body.entrants : [];
    isOurHandicap = computeIsOurHandicap();

    // Overlay SailSys finishers onto the local JSON BEFORE snapshotTimes so
    // the SailSys-derived values are the dirty baseline (not "edits"). For
    // each boat that SailSys knows about: startedRace → came (always trust
    // SailSys, since it's a boolean with no missing-vs-false distinction);
    // finishTime → finish only when SailSys has a value (else local JSON's
    // finish remains, per the source-of-truth-with-local-fallback rule).
    // A penalty entry with {averagePoints: true} marks the duty boat —
    // SailSys is the authority on who that is when we load.
    const localTimes = (timesR && timesR.ok && timesR.body.times) ? timesR.body.times : {};
    const baseTimes = (timesR && timesR.ok && timesR.body.times) ? timesR.body.times : {};
    let sailsysDutyBoatId = null;
    if (finishersR && finishersR.ok && Array.isArray(finishersR.body.finishers)) {
      for (const f of finishersR.body.finishers) {
        const boatId = f && f.boatId != null ? String(f.boatId) : null;
        if (!boatId) continue;
        const sailFinish = parseSailsysFinishTime(f.finishTime);
        const existing = baseTimes[boatId] || { came: false, actualStart: null, finish: null };
        baseTimes[boatId] = {
          came: !!f.startedRace,
          actualStart: existing.actualStart || null,
          finish: sailFinish || existing.finish || null
        };
        if (Array.isArray(f.penalties)
            && f.penalties.some(p => p && p.averagePoints === true)) {
          sailsysDutyBoatId = boatId;
        }
      }
    }
    // Local-saved dutyBoatId loses to SailSys when SailSys says one — SailSys
    // is the source of truth for the duty boat once it's been pushed. Local
    // JSON's dutyBoatId still wins when SailSys has no AVG-flagged boat
    // (e.g. a never-pushed in-progress edit).
    const overlaidDutyBoatId = sailsysDutyBoatId
      || (timesR && timesR.ok && timesR.body.dutyBoatId)
      || null;
    const overlaidSaved = {
      times: baseTimes,
      boatOrder: (timesR && timesR.ok && timesR.body.boatOrder) || [],
      dutyBoatId: overlaidDutyBoatId,
      divisionStarts: (timesR && timesR.ok && timesR.body.divisionStarts) || null
    };

    // Server snapshot (with SailSys overlay) first — establishes the dirty
    // baseline. Then overlay any unsaved edits from this tab's
    // sessionStorage; those changes will correctly re-register as dirty
    // against the (now SailSys-anchored) baseline.
    snapshotTimes(overlaidSaved);
    sessionRestoreForm();
    if (isCurrentRace) {
      sessionRestoreNowLog();
      renderNowLog();
    }
    // Seed sailsysResults cache from the optional fetch. Empty if the race
    // hasn't been processed yet — that's fine; isResultsClean() handles it.
    if (resultsR && resultsR.ok && resultsR.body && resultsR.body.results) {
      sailsysResults = parseSailsysResults(resultsR.body.results);
    }

    state.className = 'banner banner-ok';
    state.textContent = entrantData.length + ' entrants loaded'
      + (IS_EDITABLE
          ? ' — edit TCFs and capture times; click a header to sort, or drag rows to set a manual order. SAVE appears once something changes.'
          : ' — click a column header to sort.');
    document.getElementById('entrants-count').textContent = '(' + entrantData.length + ')';
    document.getElementById('race-entrants').style.display = '';

    // Hide-DNC filter: editable-only; the Came column isn't shown in read-only
    // mode so the filter has nothing to act on. Initialise from sessionStorage
    // (restored by sessionRestoreForm above) and wire the checkbox.
    if (IS_EDITABLE) {
      const toggle = document.getElementById('hide-dnc-toggle');
      const cb = document.getElementById('hide-dnc');
      toggle.style.display = '';
      cb.checked = hideDnc;
      cb.onchange = () => {
        hideDnc = cb.checked;
        renderEntrants();
        sessionSaveForm();
      };
    }

    renderEntrantsHead();
    renderEntrants();
    updateNowLogSection();

    document.getElementById('save-btn').onclick = doSave;
    document.getElementById('reset-btn').onclick = doReset;

    // The first renderStatus() call ran BEFORE snapshotTimes and before
    // entrantData was assigned, so its dirty baseline was empty (every field
    // looked dirty → status selector permanently disabled) and the duty-boat
    // <select> had no <option>s. Re-render now that the state is set up so
    // both controls reflect reality.
    if (currentStatus) renderStatus(currentStatus, raceIdGlobal);

    // sessionRestoreForm() may have rehydrated unsaved edits from a prior
    // tab session — surface the SAVE bar immediately if so. Without this
    // the bar only appears after the next interactive mutation.
    updateSaveBar();
  })();
</script>
</body>
</html>
